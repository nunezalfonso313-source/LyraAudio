name: Lyra Audio Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          cat <<'EOF' > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew \
            -o gradlew 2>/dev/null || \
          cat <<'GRADLEW' > gradlew
          #!/bin/sh
          exec gradle "$@"
          GRADLEW
          chmod +x gradlew

      - name: Write build scripts
        run: |
          cat <<'EOF' > settings.gradle
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF

          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "com.lyra.audiokernel"
              compileSdk 34
              defaultConfig {
                  applicationId "com.lyra.audiokernel"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.7"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
              implementation 'androidx.media3:media3-exoplayer:1.3.1'
              implementation 'androidx.media3:media3-session:1.3.1'
              implementation 'androidx.media3:media3-ui:1.3.1'
              implementation 'com.google.guava:guava:32.1.3-android'
          }
          EOF

      - name: Write AndroidManifest
        run: |
          mkdir -p app/src/main
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <application android:label="Lyra Audio" android:theme="@style/AppTheme" android:allowBackup="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".LyraPlaybackService"
                      android:foregroundServiceType="mediaPlayback"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="androidx.media3.session.MediaSessionService"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

      - name: Write resources
        run: |
          mkdir -p app/src/main/res/values
          cat <<'EOF' > app/src/main/res/values/styles.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#0A0A0A</item>
                  <item name="android:statusBarColor">#0A0A0A</item>
                  <item name="android:navigationBarColor">#0A0A0A</item>
              </style>
          </resources>
          EOF
          cat <<'EOF' > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="amber">#E8900A</color>
              <color name="nixie_orange">#FF6B0A</color>
              <color name="cyan_bar">#00BCD4</color>
              <color name="green_led">#00E676</color>
              <color name="bg_dark">#0A0A0A</color>
          </resources>
          EOF

      - name: Write item_track.xml
        run: |
          mkdir -p app/src/main/res/layout
          cat <<'EOF' > app/src/main/res/layout/item_track.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="horizontal" android:padding="8dp" android:gravity="center_vertical">
              <TextView android:id="@+id/item_number" android:layout_width="32dp" android:layout_height="wrap_content" android:textColor="#444444" android:textSize="12sp" android:gravity="center"/>
              <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:paddingStart="4dp">
                  <TextView android:id="@+id/item_title" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#FFFFFF" android:textSize="13sp" android:singleLine="true" android:ellipsize="end"/>
                  <TextView android:id="@+id/item_artist" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#888888" android:textSize="11sp" android:singleLine="true"/>
              </LinearLayout>
              <TextView android:id="@+id/item_duration" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#555555" android:textSize="11sp" android:paddingStart="8dp"/>
          </LinearLayout>
          EOF

      - name: Write item_playlist.xml
        run: |
          cat <<'EOF' > app/src/main/res/layout/item_playlist.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="horizontal" android:padding="12dp" android:gravity="center_vertical">
              <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical">
                  <TextView android:id="@+id/pl_item_name" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#FFFFFF" android:textSize="14sp"/>
                  <TextView android:id="@+id/pl_item_count" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#888888" android:textSize="11sp"/>
              </LinearLayout>
              <Button android:id="@+id/pl_item_delete" android:layout_width="36dp" android:layout_height="36dp" android:text="✕" android:background="@android:color/transparent" android:textColor="#FF4444" android:textSize="14sp"/>
          </LinearLayout>
          EOF

      - name: Write activity_main.xml
        run: |
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.coordinatorlayout.widget.CoordinatorLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#0A0A0A">
              <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:padding="12dp" android:background="#111111">
                      <ImageView android:id="@+id/album_art" android:layout_width="80dp" android:layout_height="80dp" android:scaleType="centerCrop" android:background="#222222" android:src="@android:drawable/ic_media_play"/>
                      <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:paddingStart="12dp" android:gravity="center_vertical">
                          <TextView android:id="@+id/track_title" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Cargando..." android:textColor="#FFFFFF" android:textSize="15sp" android:textStyle="bold" android:ellipsize="marquee" android:singleLine="true"/>
                          <TextView android:id="@+id/track_artist" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#00BFFF" android:textSize="13sp" android:singleLine="true"/>
                          <TextView android:id="@+id/track_album" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#888888" android:textSize="12sp" android:singleLine="true"/>
                          <TextView android:id="@+id/track_meta" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#00FF00" android:textSize="11sp"/>
                      </LinearLayout>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="96dp" android:orientation="horizontal" android:background="#0D0D0D" android:paddingStart="8dp" android:paddingEnd="8dp" android:paddingTop="6dp" android:paddingBottom="6dp">
                      <com.lyra.audiokernel.VUMeterView android:id="@+id/vu_left" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginEnd="4dp"/>
                      <com.lyra.audiokernel.VUMeterView android:id="@+id/vu_right" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:layout_marginStart="4dp"/>
                  </LinearLayout>
                  <com.lyra.audiokernel.NixieDisplayView android:id="@+id/nixie_display" android:layout_width="match_parent" android:layout_height="72dp" android:paddingStart="16dp" android:paddingEnd="16dp" android:paddingTop="4dp" android:paddingBottom="4dp"/>
                  <SeekBar android:id="@+id/seek_bar" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_marginStart="8dp" android:layout_marginEnd="8dp" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:paddingStart="12dp" android:paddingEnd="12dp" android:paddingBottom="2dp">
                      <TextView android:id="@+id/time_current" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:text="0:00" android:textColor="#00FF00" android:textSize="11sp"/>
                      <TextView android:id="@+id/track_number" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:gravity="center" android:textColor="#888888" android:textSize="11sp"/>
                      <TextView android:id="@+id/time_total" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:gravity="end" android:textColor="#00FF00" android:textSize="11sp"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="56dp" android:orientation="horizontal" android:gravity="center_vertical">
                      <Button android:id="@+id/btn_shuffle" android:layout_width="0dp" android:layout_weight="1" android:text="⇀" android:background="@android:color/transparent" android:textColor="#555555"/>
                      <Button android:id="@+id/btn_prev" android:layout_width="0dp" android:layout_weight="1" android:text="⏮" android:background="@android:color/transparent" android:textColor="#CCCCCC"/>
                      <Button android:id="@+id/btn_play" android:layout_width="0dp" android:layout_weight="1.2" android:text="▶" android:textColor="#00FF00" android:background="@android:color/transparent" android:textSize="22sp"/>
                      <Button android:id="@+id/btn_next" android:layout_width="0dp" android:layout_weight="1" android:text="⏭" android:background="@android:color/transparent" android:textColor="#CCCCCC"/>
                      <Button android:id="@+id/btn_repeat" android:layout_width="0dp" android:layout_weight="1" android:text="↺" android:background="@android:color/transparent" android:textColor="#555555"/>
                  </LinearLayout>
                  <com.lyra.audiokernel.SpectrumView android:id="@+id/spectrum_view" android:layout_width="match_parent" android:layout_height="110dp" android:layout_marginStart="4dp" android:layout_marginEnd="4dp" android:layout_marginBottom="4dp"/>
                  <LinearLayout android:id="@+id/eq_panel" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:background="#111111" android:padding="8dp" android:visibility="gone">
                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                          <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center_horizontal">
                              <TextView android:id="@+id/eq_label0" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="60Hz" android:textColor="#888888" android:textSize="10sp"/>
                              <SeekBar android:id="@+id/eq_band0" android:layout_width="match_parent" android:layout_height="wrap_content" android:max="20" android:progress="10"/>
                              <TextView android:id="@+id/eq_val0" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center_horizontal">
                              <TextView android:id="@+id/eq_label1" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="230Hz" android:textColor="#888888" android:textSize="10sp"/>
                              <SeekBar android:id="@+id/eq_band1" android:layout_width="match_parent" android:layout_height="wrap_content" android:max="20" android:progress="10"/>
                              <TextView android:id="@+id/eq_val1" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center_horizontal">
                              <TextView android:id="@+id/eq_label2" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="910Hz" android:textColor="#888888" android:textSize="10sp"/>
                              <SeekBar android:id="@+id/eq_band2" android:layout_width="match_parent" android:layout_height="wrap_content" android:max="20" android:progress="10"/>
                              <TextView android:id="@+id/eq_val2" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center_horizontal">
                              <TextView android:id="@+id/eq_label3" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="3.6kHz" android:textColor="#888888" android:textSize="10sp"/>
                              <SeekBar android:id="@+id/eq_band3" android:layout_width="match_parent" android:layout_height="wrap_content" android:max="20" android:progress="10"/>
                              <TextView android:id="@+id/eq_val3" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center_horizontal">
                              <TextView android:id="@+id/eq_label4" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="14kHz" android:textColor="#888888" android:textSize="10sp"/>
                              <SeekBar android:id="@+id/eq_band4" android:layout_width="match_parent" android:layout_height="wrap_content" android:max="20" android:progress="10"/>
                              <TextView android:id="@+id/eq_val4" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp"/>
                          </LinearLayout>
                      </LinearLayout>
                      <Button android:id="@+id/btn_eq_reset" android:layout_width="match_parent" android:layout_height="32dp" android:text="RESET EQ" android:backgroundTint="#1A1A1A" android:textColor="#888888" android:textSize="11sp"/>
                  </LinearLayout>
                  <LinearLayout android:id="@+id/search_bar" android:layout_width="match_parent" android:layout_height="wrap_content" android:visibility="gone" android:padding="8dp">
                      <EditText android:id="@+id/search_input" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:hint="Buscar..." android:background="#1A1A1A" android:textColor="#FFFFFF" android:paddingStart="8dp"/>
                      <Button android:id="@+id/btn_search_clear" android:layout_width="36dp" android:layout_height="36dp" android:text="✕" android:background="@android:color/transparent" android:textColor="#AAAAAA"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="8dp">
                      <Button android:id="@+id/btn_eq" android:layout_width="0dp" android:layout_weight="1" android:text="EQ" android:backgroundTint="#1A1A1A" android:textColor="#CCCCCC" android:textSize="12sp"/>
                      <Button android:id="@+id/btn_sort" android:layout_width="0dp" android:layout_weight="1" android:text="AZ ARTISTA" android:backgroundTint="#1A1A1A" android:textColor="#CCCCCC" android:textSize="12sp"/>
                      <Button android:id="@+id/btn_search" android:layout_width="0dp" android:layout_weight="1" android:text="BUSCAR" android:backgroundTint="#1A1A1A" android:textColor="#CCCCCC" android:textSize="12sp"/>
                      <Button android:id="@+id/btn_playlists" android:layout_width="0dp" android:layout_weight="1" android:text="PL" android:backgroundTint="#1A1A1A" android:textColor="#CCCCCC" android:textSize="12sp"/>
                  </LinearLayout>
                  <TextView android:id="@+id/library_label" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="LISTA DE REPRODUCCIÓN" android:textColor="#444444" android:textSize="10sp" android:paddingStart="12dp" android:paddingBottom="2dp"/>
                  <ListView android:id="@+id/playlist_view" android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:divider="#1A1A1A" android:dividerHeight="1dp"/>
              </LinearLayout>
              <LinearLayout android:id="@+id/pl_scrim" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#99000000" android:visibility="gone"/>
              <LinearLayout android:id="@+id/pl_drawer" android:layout_width="match_parent" android:layout_height="400dp" android:layout_gravity="bottom" android:background="#111111" android:visibility="gone" android:orientation="vertical">
                  <LinearLayout android:id="@+id/pl_name_bar" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:padding="8dp" android:visibility="gone">
                      <EditText android:id="@+id/pl_name_input" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:hint="Nombre de playlist..." android:background="#1A1A1A" android:textColor="#FFFFFF" android:paddingStart="8dp"/>
                      <Button android:id="@+id/btn_pl_save" android:layout_width="wrap_content" android:layout_height="36dp" android:text="OK" android:backgroundTint="#00FF00" android:textColor="#000000"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                      <Button android:id="@+id/btn_pl_new" android:layout_width="0dp" android:layout_weight="1" android:text="+ NUEVA PLAYLIST" android:backgroundTint="#00FF00" android:textColor="#000000"/>
                      <Button android:id="@+id/btn_pl_close" android:layout_width="48dp" android:layout_height="wrap_content" android:text="✕" android:background="@android:color/transparent" android:textColor="#AAAAAA"/>
                  </LinearLayout>
                  <ListView android:id="@+id/pl_list" android:layout_width="match_parent" android:layout_height="match_parent"/>
              </LinearLayout>
          </androidx.coordinatorlayout.widget.CoordinatorLayout>
          EOF

      - name: Write TrackInfo.java
        run: |
          mkdir -p app/src/main/java/com/lyra/audiokernel
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/TrackInfo.java
          package com.lyra.audiokernel;
          import android.graphics.Bitmap;
          import androidx.media3.common.MediaItem;

          public class TrackInfo {
              public MediaItem mediaItem;
              public String title, artist, album, meta, duration;
              public Bitmap albumArt;
              public android.net.Uri uri;

              public TrackInfo(MediaItem mediaItem, String title, String artist, String album,
                               String meta, String duration, Bitmap albumArt, android.net.Uri uri) {
                  this.mediaItem = mediaItem; this.title = title; this.artist = artist;
                  this.album = album; this.meta = meta; this.duration = duration;
                  this.albumArt = albumArt; this.uri = uri;
              }
          }
          EOF

      - name: Write LyraPlaylist.java
        run: |
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/LyraPlaylist.java
          package com.lyra.audiokernel;
          import java.util.ArrayList;
          import java.util.List;

          public class LyraPlaylist {
              public String name;
              public List<String> uris = new ArrayList<>();
              public LyraPlaylist(String name) { this.name = name; }
          }
          EOF

      - name: Write TrackAdapter.java
        run: |
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/TrackAdapter.java
          package com.lyra.audiokernel;
          import android.content.Context;
          import android.graphics.Color;
          import android.view.LayoutInflater;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.ArrayAdapter;
          import android.widget.TextView;
          import java.util.List;

          public class TrackAdapter extends ArrayAdapter<TrackInfo> {
              private int currentIndex = -1;
              private boolean addMode = false;
              public interface OnAddClickListener { void onAdd(int position); }
              private OnAddClickListener addListener;

              public TrackAdapter(Context context, List<TrackInfo> tracks) { super(context, 0, tracks); }

              public void setCurrentIndex(int index) { this.currentIndex = index; notifyDataSetChanged(); }
              public void setAddMode(boolean addMode, OnAddClickListener listener) {
                  this.addMode = addMode; this.addListener = listener; notifyDataSetChanged();
              }

              @Override
              public View getView(int position, View convertView, ViewGroup parent) {
                  if (convertView == null)
                      convertView = LayoutInflater.from(getContext()).inflate(R.layout.item_track, parent, false);
                  TrackInfo track = getItem(position);
                  TextView number   = convertView.findViewById(R.id.item_number);
                  TextView title    = convertView.findViewById(R.id.item_title);
                  TextView artist   = convertView.findViewById(R.id.item_artist);
                  TextView duration = convertView.findViewById(R.id.item_duration);
                  if (addMode) {
                      convertView.setBackgroundColor(Color.TRANSPARENT);
                      number.setText("+"); number.setTextColor(Color.parseColor("#00BFFF"));
                      title.setTextColor(Color.WHITE);
                      convertView.setOnClickListener(v -> { if (addListener != null) addListener.onAdd(position); });
                  } else if (position == currentIndex) {
                      convertView.setBackgroundColor(Color.parseColor("#1A2A1A"));
                      number.setText("▶"); number.setTextColor(Color.parseColor("#00FF00"));
                      title.setTextColor(Color.parseColor("#00FF00"));
                  } else {
                      convertView.setBackgroundColor(Color.TRANSPARENT);
                      number.setText(String.valueOf(position + 1));
                      number.setTextColor(Color.parseColor("#444444"));
                      title.setTextColor(Color.WHITE);
                  }
                  if (track != null) {
                      title.setText(track.title); artist.setText(track.artist); duration.setText(track.duration);
                  }
                  return convertView;
              }
          }
          EOF

      - name: Write PlaylistAdapter.java
        run: |
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/PlaylistAdapter.java
          package com.lyra.audiokernel;
          import android.content.Context;
          import android.view.LayoutInflater;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.ArrayAdapter;
          import android.widget.Button;
          import android.widget.TextView;
          import java.util.List;

          public class PlaylistAdapter extends ArrayAdapter<LyraPlaylist> {
              private final List<LyraPlaylist> playlists;
              private final Context context;

              public PlaylistAdapter(Context context, List<LyraPlaylist> playlists) {
                  super(context, 0, playlists); this.context = context; this.playlists = playlists;
              }

              @Override
              public View getView(int position, View convertView, ViewGroup parent) {
                  if (convertView == null)
                      convertView = LayoutInflater.from(context).inflate(R.layout.item_playlist, parent, false);
                  LyraPlaylist pl = getItem(position);
                  TextView name  = convertView.findViewById(R.id.pl_item_name);
                  TextView count = convertView.findViewById(R.id.pl_item_count);
                  Button delete  = convertView.findViewById(R.id.pl_item_delete);
                  if (pl != null) { name.setText(pl.name); count.setText(pl.uris.size() + " pistas"); }
                  delete.setOnClickListener(v -> { playlists.remove(position); notifyDataSetChanged(); });
                  return convertView;
              }
          }
          EOF

      - name: Write LyraVisualizer.java
        run: |
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/LyraVisualizer.java
          package com.lyra.audiokernel;
          import android.media.audiofx.Visualizer;

          public class LyraVisualizer {
              private static final int CAPTURE_SIZE = 512;
              private Visualizer visualizer;
              private VUMeterView vuLeft, vuRight;
              private SpectrumView spectrumView;
              private boolean active = false;

              public interface VisualizerReadyCallback {
                  void onReady();
                  void onError(String msg);
              }

              public LyraVisualizer(VUMeterView left, VUMeterView right, SpectrumView spectrum) {
                  this.vuLeft = left; this.vuRight = right; this.spectrumView = spectrum;
              }

              public void init(int audioSessionId, VisualizerReadyCallback callback) {
                  release();
                  try {
                      visualizer = new Visualizer(audioSessionId);
                      int[] range = Visualizer.getCaptureSizeRange();
                      int size = Math.max(range[0], Math.min(CAPTURE_SIZE, range[1]));
                      visualizer.setCaptureSize(size);
                      final int captureSize = visualizer.getCaptureSize();
                      visualizer.setDataCaptureListener(new Visualizer.OnDataCaptureListener() {
                          @Override
                          public void onWaveFormDataCapture(Visualizer v, byte[] waveform, int samplingRate) {
                              if (!active || waveform == null) return;
                              int half = waveform.length / 2;
                              float rmsL = computeRMS(waveform, 0, half);
                              float rmsR = computeRMS(waveform, half, waveform.length);
                              float normL = Math.min(1f, rmsL / 64f);
                              float normR = Math.min(1f, rmsR / 64f);
                              if (vuLeft  != null) vuLeft.post(() -> vuLeft.setLevel(normL));
                              if (vuRight != null) vuRight.post(() -> vuRight.setLevel(normR));
                          }
                          @Override
                          public void onFftDataCapture(Visualizer v, byte[] fft, int sr) {
                              if (active && fft != null && spectrumView != null)
                                  spectrumView.updateFromFFT(fft, captureSize);
                          }
                      }, Math.min(Visualizer.getMaxCaptureRate(), 30000), true, true);
                      visualizer.setEnabled(true);
                      active = true;
                      if (callback != null) callback.onReady();
                  } catch (Exception e) { if (callback != null) callback.onError(e.getMessage()); }
              }

              private float computeRMS(byte[] data, int from, int to) {
                  long sum = 0;
                  for (int i = from; i < to; i++) { int v = data[i]; sum += v * v; }
                  return (float) Math.sqrt((double) sum / (to - from));
              }

              public void start() { if (visualizer != null) { visualizer.setEnabled(true); active = true; } }
              public void stop()  { if (visualizer != null) { visualizer.setEnabled(false); active = false; } }
              public void release() { active = false; if (visualizer != null) { visualizer.release(); visualizer = null; } }
          }
          EOF

