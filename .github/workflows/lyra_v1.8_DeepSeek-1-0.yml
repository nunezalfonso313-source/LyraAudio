              private void initVisualizer() {
                  if (!serviceBound || lyraService == null) return;
                  int sessionId = lyraService.getAudioSessionId();
                  if (sessionId == 0) { handler.postDelayed(this::initVisualizer, 500); return; }
                  lyraVisualizer.init(sessionId, new LyraVisualizer.VisualizerReadyCallback() {
                      @Override public void onReady() { visualizerReady = true; if (mediaController != null && mediaController.isPlaying()) lyraVisualizer.start(); }
