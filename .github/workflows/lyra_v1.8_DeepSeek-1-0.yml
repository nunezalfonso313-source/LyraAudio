                              short level = (short)(range[0] + (span * p / 20));
                              lyraService.setBandLevel(band, level);
                              int db = level / 100;
                              eqVals[band].setText((db >= 0 ? "+" : "") + db + "dB");
                          }
                          @Override public void onStartTrackingTouch(SeekBar sb) {}
                          @Override public void onStopTrackingTouch(SeekBar sb) {}
                      });
                  }
                  loadPlaylists();
                  plAdapter = new PlaylistAdapter(this, playlists); plList.setAdapter(plAdapter);
                  adapter = new TrackAdapter(this, displayedTracks); playlistView.setAdapter(adapter);
                  seekBar.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar sb, int p, boolean fromUser) { if (fromUser && mediaController != null) mediaController.seekTo(p); }
                      @Override public void onStartTrackingTouch(SeekBar sb) {}
                      @Override public void onStopTrackingTouch(SeekBar sb) {}
                  });
                  playlistView.setOnItemClickListener((parent, view, position, id) -> {
                      if (addingToPlaylist) return;
