              private void enterAddMode(String plName) {
                  addingToPlaylist = true; closePlDrawer();
                  libraryLabel.setText("TOCA + PARA AGREGAR A: " + plName.toUpperCase());
                  libraryLabel.setTextColor(0xFF00BFFF);
                  adapter.setAddMode(true, position -> {
                      TrackInfo t = displayedTracks.get(position);
                      addTrackToPlaylist(plName, t);
                      Toast.makeText(this, "Agregada: " + t.title, Toast.LENGTH_SHORT).show();
                  });
                  Button btnDone = new Button(this); btnDone.setText("✓ LISTO"); btnDone.setTag("done_btn");
                  btnDone.setOnClickListener(v -> exitAddMode());
                  LinearLayout root = (LinearLayout) playlistView.getParent();
                  root.addView(btnDone, root.indexOfChild(libraryLabel));
              }

              private void exitAddMode() {
                  addingToPlaylist = false; pendingPlaylistName = null;
                  libraryLabel.setText("LISTA DE REPRODUCCIÓN"); libraryLabel.setTextColor(0xFF444444);
                  adapter.setAddMode(false, null);
                  LinearLayout root = (LinearLayout) playlistView.getParent();
                  View doneBtn = root.findViewWithTag("done_btn");
                  if (doneBtn != null) root.removeView(doneBtn);
                  savePlaylists(); plAdapter.notifyDataSetChanged();
              }

              private void addTrackToPlaylist(String plName, TrackInfo t) {
                  for (LyraPlaylist pl : playlists) { if (pl.name.equals(plName)) { pl.uris.add(t.uri.toString()); return; } }
                  LyraPlaylist pl = new LyraPlaylist(plName); pl.uris.add(t.uri.toString()); playlists.add(pl);
              }

              private void loadPlaylistIntoQueue(LyraPlaylist pl) {
                  List<TrackInfo> plTracks = new ArrayList<>();
                  for (String uriStr : pl.uris) { Uri uri = Uri.parse(uriStr); for (TrackInfo t : allTracks) { if (t.uri.equals(uri)) { plTracks.add(t); break; } } }
                  if (plTracks.isEmpty()) { Toast.makeText(this, "Playlist vacía", Toast.LENGTH_SHORT).show(); return; }
                  displayedTracks.clear(); displayedTracks.addAll(plTracks); adapter.notifyDataSetChanged();
                  libraryLabel.setText("▶ " + pl.name.toUpperCase() + " — " + plTracks.size() + " pistas");
                  libraryLabel.setTextColor(0xFF00FF00);
                  List<MediaItem> items = plTracks.stream().map(t -> t.mediaItem).collect(Collectors.toList());
                  mediaController.setMediaItems(items, 0, 0); mediaController.prepare();
                  currentIndex = 0; updateUI(0); closePlDrawer();
              }

              private void togglePlDrawer() {
                  plDrawerVisible = !plDrawerVisible;
                  plDrawer.setVisibility(plDrawerVisible ? View.VISIBLE : View.GONE);
                  plScrim.setVisibility(plDrawerVisible ? View.VISIBLE : View.GONE);
                  if (plDrawerVisible) plAdapter.notifyDataSetChanged();
              }

              private void closePlDrawer() {
                  plDrawerVisible = false; plDrawer.setVisibility(View.GONE);
                  plScrim.setVisibility(View.GONE); plNameBar.setVisibility(View.GONE);
              }

              private void cycleSort() {
                  sortMode = (sortMode + 1) % 3;
                  switch (sortMode) {
                      case 0: Collections.sort(allTracks, Comparator.comparing(t -> t.title.toLowerCase())); btnSort.setText("AZ TÍTULO"); break;
                      case 1: Collections.sort(allTracks, Comparator.comparing(t -> t.artist.toLowerCase())); btnSort.setText("AZ ARTISTA"); break;
                      case 2: Collections.sort(allTracks, Comparator.comparing(t -> t.album.toLowerCase())); btnSort.setText("AZ ÁLBUM"); break;
                  }
                  filterTracks(searchInput.getText().toString());
              }

              private void toggleSearch() {
                  searchVisible = !searchVisible;
                  searchBar.setVisibility(searchVisible ? View.VISIBLE : View.GONE);
                  btnSearch.setTextColor(searchVisible ? 0xFF00FF00 : 0xFFFFFFFF);
                  if (searchVisible) { searchInput.requestFocus(); ((InputMethodManager) getSystemService(INPUT_METHOD_SERVICE)).showSoftInput(searchInput, InputMethodManager.SHOW_IMPLICIT); }
                  else { searchInput.setText(""); filterTracks(""); hideSoftKeyboard(); }
              }

              private void filterTracks(String query) {
                  displayedTracks.clear();
                  if (query.isEmpty()) { displayedTracks.addAll(allTracks); libraryLabel.setText("LISTA DE REPRODUCCIÓN"); libraryLabel.setTextColor(0xFF444444); }
                  else {
                      String low = query.toLowerCase();
                      for (TrackInfo t : allTracks) { if (t.title.toLowerCase().contains(low) || t.artist.toLowerCase().contains(low)) displayedTracks.add(t); }
                      libraryLabel.setText("RESULTADOS: " + displayedTracks.size()); libraryLabel.setTextColor(0xFF00BFFF);
                  }
                  adapter.notifyDataSetChanged();
              }

              private void hideSoftKeyboard() {
                  InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                  View focus = getCurrentFocus();
                  if (focus != null) imm.hideSoftInputFromWindow(focus.getWindowToken(), 0);
              }

              private void savePlaylists() {
                  try {
                      JSONArray arr = new JSONArray();
                      for (LyraPlaylist pl : playlists) {
                          JSONObject obj = new JSONObject(); obj.put("name", pl.name);
                          JSONArray uriArr = new JSONArray();
                          for (String u : pl.uris) uriArr.put(u);
                          obj.put("uris", uriArr); arr.put(obj);
                      }
                      getSharedPreferences(PREFS, MODE_PRIVATE).edit().putString(KEY_PLAYLISTS, arr.toString()).apply();
                  } catch (Exception ignored) {}
              }

              private void loadPlaylists() {
                  playlists.clear();
                  try {
                      String json = getSharedPreferences(PREFS, MODE_PRIVATE).getString(KEY_PLAYLISTS, "[]");
                      JSONArray arr = new JSONArray(json);
                      for (int i = 0; i < arr.length(); i++) {
                          JSONObject obj = arr.getJSONObject(i);
                          LyraPlaylist pl = new LyraPlaylist(obj.getString("name"));
                          JSONArray uriArr = obj.getJSONArray("uris");
                          for (int j = 0; j < uriArr.length(); j++) pl.uris.add(uriArr.getString(j));
                          playlists.add(pl);
                      }
                  } catch (Exception ignored) {}
              }

              private void initEqUI() {
                  if (eqInitialized || !serviceBound) return;
                  eqInitialized = true;
                  short numBands = lyraService.getNumBands();
                  short[] range = lyraService.getBandLevelRange();
                  for (short i = 0; i < Math.min(numBands, 5); i++) {
                      int freqHz = lyraService.getBandFreq(i) / 1000;
                      eqLabels[i].setText(freqHz >= 1000 ? (freqHz/1000)+"kHz" : freqHz+"Hz");
                      short current = lyraService.getBandLevel(i);
                      int span = range[1] - range[0];
                      int progress = span > 0 ? (int)(((current - range[0]) * 20.0f) / span) : 10;
                      eqBands[i].setProgress(Math.max(0, Math.min(20, progress)));
                      int db = current / 100;
                      eqVals[i].setText((db >= 0 ? "+" : "") + db + "dB");
                  }
              }

              private void checkPermissionAndLoad() {
                  String perm = Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU
                      ? Manifest.permission.READ_MEDIA_AUDIO : Manifest.permission.READ_EXTERNAL_STORAGE;
                  if (ContextCompat.checkSelfPermission(this, perm) == PackageManager.PERMISSION_GRANTED) loadMediaStore();
                  else permissionLauncher.launch(perm);
              }

              private void loadMediaStore() {
                  allTracks.clear(); displayedTracks.clear();
                  new Thread(() -> {
                      Uri collection = MediaStore.Audio.Media.EXTERNAL_CONTENT_URI;
                      String[] projection = { MediaStore.Audio.Media._ID, MediaStore.Audio.Media.TITLE, MediaStore.Audio.Media.ARTIST, MediaStore.Audio.Media.ALBUM, MediaStore.Audio.Media.DURATION, MediaStore.Audio.Media.SIZE, MediaStore.Audio.Media.MIME_TYPE };
                      try (Cursor cursor = getContentResolver().query(collection, projection, MediaStore.Audio.Media.IS_MUSIC + " != 0", null, null)) {
                          if (cursor != null) {
                              while (cursor.moveToNext()) {
                                  long id = cursor.getLong(0); String tit = cursor.getString(1);
                                  String art = cursor.getString(2); String alb = cursor.getString(3);
                                  long durMs = cursor.getLong(4); long sizeKb = cursor.getLong(5) / 1024;
                                  String mime = cursor.getString(6);
                                  String ext = mime != null ? mime.substring(mime.lastIndexOf("/")+1).toUpperCase() : "AUDIO";
                                  String meta = ext + " | " + String.format(Locale.US, "%.1f MB", sizeKb/1024.0);
                                  Uri uri = Uri.withAppendedPath(MediaStore.Audio.Media.EXTERNAL_CONTENT_URI, String.valueOf(id));
                                  allTracks.add(new TrackInfo(MediaItem.fromUri(uri), tit, art, alb, meta, formatTime(durMs), null, uri));
                              }
                          }
                      } catch (Exception ignored) {}
                      runOnUiThread(() -> {
                          displayedTracks.addAll(allTracks); adapter.notifyDataSetChanged();
                          if (!allTracks.isEmpty()) {
                              currentIndex = getSharedPreferences(PREFS, MODE_PRIVATE).getInt(KEY_INDEX, 0);
                              List<MediaItem> items = allTracks.stream().map(t -> t.mediaItem).collect(Collectors.toList());
                              mediaController.setMediaItems(items, currentIndex, 0); mediaController.prepare();
                              updateUI(currentIndex); handler.postDelayed(this::initVisualizer, 800);
                          }
                      });
                  }).start();
              }

              private void loadAlbumArt(int index) {
                  if (index >= allTracks.size()) return;
                  TrackInfo t = allTracks.get(index);
                  new Thread(() -> {
                      Bitmap art = null;
                      try {
                          MediaMetadataRetriever mmr = new MediaMetadataRetriever();
                          mmr.setDataSource(getApplicationContext(), t.uri);
                          byte[] bytes = mmr.getEmbeddedPicture(); mmr.release();
                          if (bytes != null) art = BitmapFactory.decodeByteArray(bytes, 0, bytes.length);
                      } catch (Exception ignored) {}
                      t.albumArt = art;
                      final Bitmap finalArt = art;
                      runOnUiThread(() -> { if (currentIndex == index) { if (finalArt != null) albumArt.setImageBitmap(finalArt); else albumArt.setImageResource(android.R.drawable.ic_media_play); } });
                  }).start();
              }

              private void updateUI(int index) {
                  currentIndex = index; if (index >= allTracks.size()) return;
                  TrackInfo t = allTracks.get(index);
                  trackTitle.setText(t.title); trackArtist.setText(t.artist.isEmpty() ? "Artista desconocido" : t.artist);
                  trackAlbum.setText(t.album); trackMeta.setText(t.meta);
                  trackNumber.setText((index+1) + " / " + allTracks.size()); timeTotal.setText(t.duration);
                  adapter.setCurrentIndex(displayedTracks.indexOf(t)); loadAlbumArt(index);
                  getSharedPreferences(PREFS, MODE_PRIVATE).edit().putInt(KEY_INDEX, index).apply();
              }

              private void playAt(int index) { if (mediaController == null) return; mediaController.seekToDefaultPosition(index); mediaController.play(); }
              private void advanceTrack(int direction) { if (allTracks.isEmpty()) return; playAt((currentIndex + direction + allTracks.size()) % allTracks.size()); }
              private void toggleShuffle() { isShuffled = !isShuffled; btnShuffle.setTextColor(isShuffled ? 0xFF00FF00 : 0xFF555555); }
              private void cycleRepeat() { repeatMode = (repeatMode+1)%3; btnRepeat.setTextColor(repeatMode==0 ? 0xFF555555 : (repeatMode==1 ? 0xFF00FF00 : 0xFF00BFFF)); }
              private String formatTime(long ms) { long s = ms/1000; return String.format(Locale.US, "%d:%02d", s/60, s%60); }

              @Override
              protected void onDestroy() {
                  super.onDestroy(); handler.removeCallbacks(updateProgress); lyraVisualizer.release();
                  if (serviceBound) unbindService(eqConnection); MediaController.releaseFuture(controllerFuture);
              }
          }
          EOF

      - name: Write VUMeterView.java
        run: |
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/VUMeterView.java
          package com.lyra.audiokernel;

          import android.content.Context;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.Paint;
          import android.graphics.RadialGradient;
          import android.graphics.RectF;
          import android.graphics.Shader;
          import android.util.AttributeSet;
          import android.view.View;

          public class VUMeterView extends View {

              private float rawLevel = 0f, displayLevel = 0f;
              private static final float ATTACK = 0.45f, DECAY = 0.05f;
              private static final float ANGLE_MIN = -50f, ANGLE_MAX = 50f;
              private String label = "L";
              private Paint bgPaint, arcGreenPaint, arcRedPaint, tickPaint;
              private Paint needlePaint, needleShadowPaint, pivotPaint, labelPaint, glowPaint;
              private RectF arcRect = new RectF();
              private float cx, pivotY, arcRadius;

              public VUMeterView(Context context, AttributeSet attrs) { super(context, attrs); init(); setLayerType(LAYER_TYPE_SOFTWARE, null); }
              public VUMeterView(Context context) { super(context); init(); setLayerType(LAYER_TYPE_SOFTWARE, null); }

              private void init() {
                  bgPaint = new Paint(Paint.ANTI_ALIAS_FLAG); bgPaint.setColor(Color.parseColor("#1C1200")); bgPaint.setStyle(Paint.Style.FILL);
                  arcGreenPaint = new Paint(Paint.ANTI_ALIAS_FLAG); arcGreenPaint.setStyle(Paint.Style.STROKE); arcGreenPaint.setStrokeWidth(5f); arcGreenPaint.setColor(Color.parseColor("#44BB44")); arcGreenPaint.setAlpha(120);
                  arcRedPaint = new Paint(Paint.ANTI_ALIAS_FLAG); arcRedPaint.setStyle(Paint.Style.STROKE); arcRedPaint.setStrokeWidth(5f); arcRedPaint.setColor(Color.parseColor("#FF3300")); arcRedPaint.setAlpha(140);
                  tickPaint = new Paint(Paint.ANTI_ALIAS_FLAG); tickPaint.setStrokeWidth(1.2f);
                  needleShadowPaint = new Paint(Paint.ANTI_ALIAS_FLAG); needleShadowPaint.setColor(Color.parseColor("#CC2200")); needleShadowPaint.setStrokeWidth(4f); needleShadowPaint.setAlpha(80);
                  needlePaint = new Paint(Paint.ANTI_ALIAS_FLAG); needlePaint.setStrokeWidth(2f); needlePaint.setShadowLayer(6f,0f,0f,Color.parseColor("#FF4400")); needlePaint.setStyle(Paint.Style.STROKE); needlePaint.setStrokeCap(Paint.Cap.ROUND);
                  pivotPaint = new Paint(Paint.ANTI_ALIAS_FLAG); pivotPaint.setColor(Color.parseColor("#888888")); pivotPaint.setStyle(Paint.Style.FILL);
                  labelPaint = new Paint(Paint.ANTI_ALIAS_FLAG); labelPaint.setColor(Color.parseColor("#E89009")); labelPaint.setTextSize(18f); labelPaint.setTextAlign(Paint.Align.CENTER); labelPaint.setTypeface(android.graphics.Typeface.MONOSPACE); labelPaint.setShadowLayer(6f,0f,0f,Color.parseColor("#FF8800"));
                  glowPaint = new Paint(Paint.ANTI_ALIAS_FLAG); glowPaint.setStyle(Paint.Style.FILL);
              }

              @Override
              protected void onSizeChanged(int w, int h, int oldW, int oldH) {
                  super.onSizeChanged(w, h, oldW, oldH);
                  cx = w/2f; pivotY = h*1.05f; arcRadius = pivotY - h*0.12f;
                  arcRect.set(cx-arcRadius, pivotY-arcRadius, cx+arcRadius, pivotY+arcRadius);
                  glowPaint.setShader(new RadialGradient(cx, h*0.5f, w*0.6f, Color.parseColor("#22180800"), Color.parseColor("#00000000"), Shader.TileMode.CLAMP));
              }

              public void setLevel(float level) {
                  rawLevel = Math.max(0f, Math.min(1f, level));
                  float diff = rawLevel - displayLevel;
                  displayLevel += (diff > 0) ? diff*ATTACK : diff*DECAY;
                  postInvalidateOnAnimation();
              }

              public void setChannelLabel(String l) { this.label = l; invalidate(); }

              @Override
              protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  int w = getWidth(), h = getHeight();
                  canvas.drawRoundRect(new RectF(0,0,w,h), 12f, 12f, bgPaint);
                  canvas.drawRoundRect(new RectF(0,0,w,h), 12f, 12f, glowPaint);
                  float startAngle = 270f+ANGLE_MIN, sweep = ANGLE_MAX-ANGLE_MIN;
                  canvas.drawArc(arcRect, startAngle, sweep*0.75f, false, arcGreenPaint);
                  canvas.drawArc(arcRect, startAngle+sweep*0.75f, sweep*0.25f, false, arcRedPaint);
                  for (int i = 0; i <= 9; i++) {
                      float frac = (float)i/9;
                      double rad = Math.toRadians(270f+ANGLE_MIN+frac*sweep);
                      float ox=cx+(float)((arcRadius+4f)*Math.cos(rad)), oy=pivotY+(float)((arcRadius+4f)*Math.sin(rad));
                      float ix=cx+(float)((arcRadius-(i%2==0?10f:6f))*Math.cos(rad)), iy=pivotY+(float)((arcRadius-(i%2==0?10f:6f))*Math.sin(rad));
                      tickPaint.setColor(frac>0.75f?Color.parseColor("#FF4400"):Color.parseColor("#AA8833"));
                      tickPaint.setStrokeWidth(i%2==0?1.5f:1f);
                      canvas.drawLine(ox,oy,ix,iy,tickPaint);
                  }
                  double rad = Math.toRadians(270f+ANGLE_MIN+displayLevel*sweep);
                  float tipX=cx+(float)((arcRadius-8f)*Math.cos(rad)), tipY=pivotY+(float)((arcRadius-8f)*Math.sin(rad));
                  canvas.drawLine(cx,pivotY,tipX+1f,tipY+1f,needleShadowPaint);
                  needlePaint.setColor(displayLevel>0.8f?Color.parseColor("#FF2200"):Color.parseColor("#DDCCBB"));
                  canvas.drawLine(cx,pivotY,tipX,tipY,needlePaint);
                  canvas.drawCircle(cx,pivotY,5f,pivotPaint);
                  Paint inner=new Paint(Paint.ANTI_ALIAS_FLAG); inner.setColor(Color.parseColor("#222222"));
                  canvas.drawCircle(cx,pivotY,2.5f,inner);
                  canvas.drawText("VU",cx,h-4f,labelPaint);
                  Paint ch=new Paint(labelPaint); ch.setTextSize(13f); ch.setColor(Color.parseColor("#AA7722"));
                  canvas.drawText(label,14f,h-6f,ch);
              }
          }
