                  playlistView = findViewById(R.id.playlist_view); btnPlay = findViewById(R.id.btn_play);
                  btnShuffle = findViewById(R.id.btn_shuffle); btnRepeat = findViewById(R.id.btn_repeat);
                  btnEq = findViewById(R.id.btn_eq); btnSort = findViewById(R.id.btn_sort);
                  btnSearch = findViewById(R.id.btn_search); eqPanel = findViewById(R.id.eq_panel);
                  searchBar = findViewById(R.id.search_bar); searchInput = findViewById(R.id.search_input);
                  plDrawer = findViewById(R.id.pl_drawer); plScrim = findViewById(R.id.pl_scrim);
                  plNameBar = findViewById(R.id.pl_name_bar); plNameInput = findViewById(R.id.pl_name_input);
                  plList = findViewById(R.id.pl_list);
                  Button btnPrev = findViewById(R.id.btn_prev); Button btnNext = findViewById(R.id.btn_next);
                  Button btnEqReset = findViewById(R.id.btn_eq_reset); Button btnPlNew = findViewById(R.id.btn_pl_new);
                  Button btnPlClose = findViewById(R.id.btn_pl_close); Button btnPlSave = findViewById(R.id.btn_pl_save);
                  Button btnSearchClear = findViewById(R.id.btn_search_clear);
                  int[] bandIds  = {R.id.eq_band0,R.id.eq_band1,R.id.eq_band2,R.id.eq_band3,R.id.eq_band4};
                  int[] valIds   = {R.id.eq_val0,R.id.eq_val1,R.id.eq_val2,R.id.eq_val3,R.id.eq_val4};
                  int[] labelIds = {R.id.eq_label0,R.id.eq_label1,R.id.eq_label2,R.id.eq_label3,R.id.eq_label4};
