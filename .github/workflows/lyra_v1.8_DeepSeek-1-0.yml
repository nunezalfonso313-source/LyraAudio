      - name: Write SpectrumView.java
        run: |
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/SpectrumView.java
          package com.lyra.audiokernel;

          import android.content.Context;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.LinearGradient;
          import android.graphics.Paint;
          import android.graphics.RectF;
          import android.graphics.Shader;
          import android.util.AttributeSet;
          import android.view.View;

          public class SpectrumView extends View {

              private static final int BANDS=32, PEAK_HOLD=35;
              private static final float ATTACK=0.40f, DECAY=0.07f;
              private float[] rawBands=new float[BANDS], smoothBands=new float[BANDS], peaks=new float[BANDS];
              private int[] peakTimers=new int[BANDS];
              private Paint gridPaint, peakPaint, bgPaint, barPaint;
              private RectF barRect=new RectF();

              public SpectrumView(Context context, AttributeSet attrs) { super(context,attrs); init(); }
              public SpectrumView(Context context) { super(context); init(); }

              private void init() {
                  bgPaint=new Paint(Paint.ANTI_ALIAS_FLAG); bgPaint.setColor(Color.parseColor("#050A0D"));
                  gridPaint=new Paint(Paint.ANTI_ALIAS_FLAG); gridPaint.setColor(Color.parseColor("#0D2020")); gridPaint.setStyle(Paint.Style.STROKE); gridPaint.setStrokeWidth(1f);
                  barPaint=new Paint(Paint.ANTI_ALIAS_FLAG);
                  peakPaint=new Paint(Paint.ANTI_ALIAS_FLAG); peakPaint.setStyle(Paint.Style.FILL);
              }

              @Override
              protected void onSizeChanged(int w, int h, int oldW, int oldH) {
                  super.onSizeChanged(w,h,oldW,oldH);
                  barPaint.setShader(new LinearGradient(0,h,0,0,
                      new int[]{Color.parseColor("#00BCD4"),Color.parseColor("#00E676"),Color.parseColor("#AAFF00"),Color.parseColor("#FF8800"),Color.parseColor("#FF2200")},
                      new float[]{0f,0.45f,0.72f,0.88f,1f}, Shader.TileMode.CLAMP));
              }

              public void updateFromFFT(byte[] fft, int size) {
                  int n=Math.min(BANDS,size/2);
                  for (int i=0;i<n;i++) {
                      float re=fft[i*2], im=(i*2+1<size)?fft[i*2+1]:0f;
                      rawBands[i]=(float)Math.min(1.0,Math.log10(Math.hypot(re,im)+1)/2.5);
                  }
                  postInvalidateOnAnimation();
              }

              public void updateBands(float[] normalized) {
                  System.arraycopy(normalized,0,rawBands,0,Math.min(BANDS,normalized.length));
                  postInvalidateOnAnimation();
              }

              @Override
              protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  int w=getWidth(), h=getHeight();
                  canvas.drawRect(0,0,w,h,bgPaint);
                  for (int i=1;i<=4;i++) canvas.drawLine(0,h*(i/4f),w,h*(i/4f),gridPaint);
                  float barW=(w-1.5f*(BANDS-1))/BANDS;
                  for (int i=0;i<BANDS;i++) {
                      float diff=rawBands[i]-smoothBands[i];
                      smoothBands[i]=Math.max(0f,Math.min(1f,smoothBands[i]+(diff>0?diff*ATTACK:diff*DECAY)));
                      if (smoothBands[i]>=peaks[i]) { peaks[i]=smoothBands[i]; peakTimers[i]=PEAK_HOLD; }
                      else if (peakTimers[i]>0) peakTimers[i]--;
                      else peaks[i]=Math.max(0f,peaks[i]-0.006f);
                      float x0=i*(barW+1.5f), barH=smoothBands[i]*h;
                      barRect.set(x0,h-barH,x0+barW,h); canvas.drawRect(barRect,barPaint);
                      if (barH>3f) { Paint t=new Paint(Paint.ANTI_ALIAS_FLAG); t.setColor(Color.argb(60,255,255,255)); canvas.drawRect(x0,h-barH,x0+barW,h-barH+2f,t); }
                      float py=h-peaks[i]*h;
                      peakPaint.setColor(peaks[i]>0.88f?Color.parseColor("#FF2200"):peaks[i]>0.65f?Color.parseColor("#AAFF00"):Color.parseColor("#00E676"));
                      canvas.drawRect(x0,py,x0+barW,py+2.5f,peakPaint);
                  }
              }
          }
          EOF

      - name: Write NixieDisplayView.java
        run: |
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/NixieDisplayView.java
          package com.lyra.audiokernel;

          import android.content.Context;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.Paint;
          import android.graphics.RadialGradient;
          import android.graphics.RectF;
          import android.graphics.Shader;
          import android.graphics.Typeface;
          import android.util.AttributeSet;
          import android.view.View;

          public class NixieDisplayView extends View {

              private String displayStr="0000";
              private boolean sepVisible=true;
              private long lastBlink=0;
              private Paint tubeBgPaint,tubeGlowPaint,digitPaint,dimDigitPaint,sepPaint,outerGlowPaint,glassPaint;
              private float tubeW,tubeH,tubeRadius,digitSize;
              private float[] tubeX=new float[4];
              private float sepX;

              public NixieDisplayView(Context context, AttributeSet attrs) { super(context,attrs); init(); setLayerType(LAYER_TYPE_SOFTWARE,null); }
              public NixieDisplayView(Context context) { super(context); init(); setLayerType(LAYER_TYPE_SOFTWARE,null); }

              private void init() {
                  tubeBgPaint=new Paint(Paint.ANTI_ALIAS_FLAG); tubeBgPaint.setColor(Color.parseColor("#120A00")); tubeBgPaint.setStyle(Paint.Style.FILL);
                  tubeGlowPaint=new Paint(Paint.ANTI_ALIAS_FLAG); tubeGlowPaint.setColor(Color.parseColor("#FF8C00")); tubeGlowPaint.setStyle(Paint.Style.STROKE); tubeGlowPaint.setStrokeWidth(1.5f); tubeGlowPaint.setShadowLayer(10f,0f,0f,Color.parseColor("#FFAA00"));
                  digitPaint=new Paint(Paint.ANTI_ALIAS_FLAG); digitPaint.setColor(Color.parseColor("#FFB300")); digitPaint.setTextAlign(Paint.Align.CENTER); digitPaint.setTypeface(Typeface.MONOSPACE); digitPaint.setShadowLayer(16f,0f,0f,Color.parseColor("#FF8C00"));
                  dimDigitPaint=new Paint(digitPaint); dimDigitPaint.setColor(Color.parseColor("#2A1800")); dimDigitPaint.setShadowLayer(0,0,0,0); dimDigitPaint.setAlpha(60);
                  sepPaint=new Paint(digitPaint);
                  glassPaint=new Paint(Paint.ANTI_ALIAS_FLAG); glassPaint.setColor(Color.argb(18,255,255,255)); glassPaint.setStyle(Paint.Style.FILL);
                  outerGlowPaint=new Paint(Paint.ANTI_ALIAS_FLAG); outerGlowPaint.setStyle(Paint.Style.FILL);
              }

              @Override protected void onSizeChanged(int w,int h,int oldW,int oldH) { super.onSizeChanged(w,h,oldW,oldH); recalcLayout(w,h); }

              private void recalcLayout(int w,int h) {
                  float sepRatio=0.38f,gapRatio=0.12f;
                  tubeW=(w*0.92f)/(4f+sepRatio+4f*gapRatio);
                  tubeH=h*0.88f; tubeRadius=tubeW*0.18f; digitSize=tubeH*0.62f;
                  digitPaint.setTextSize(digitSize); dimDigitPaint.setTextSize(digitSize); sepPaint.setTextSize(digitSize*0.9f);
                  float gap=tubeW*gapRatio, offsetX=(w-(4*tubeW+(tubeW*sepRatio)+4*gap))/2f;
                  tubeX[0]=offsetX; tubeX[1]=tubeX[0]+tubeW+gap;
                  sepX=tubeX[1]+tubeW+gap*0.5f;
                  tubeX[2]=sepX+tubeW*sepRatio+gap*0.5f; tubeX[3]=tubeX[2]+tubeW+gap;
                  outerGlowPaint.setShader(new RadialGradient(tubeW/2f,tubeH/2f,tubeW*0.7f,Color.parseColor("#33FF8800"),Color.parseColor("#00000000"),Shader.TileMode.CLAMP));
              }

              public void setTime(long ms, boolean isPlaying) {
                  long s=ms/1000; displayStr=String.format("%02d%02d",(int)(s/60)%100,(int)(s%60));
                  if (isPlaying&&System.currentTimeMillis()-lastBlink>500) { sepVisible=!sepVisible; lastBlink=System.currentTimeMillis(); }
                  else if (!isPlaying) sepVisible=true;
                  postInvalidateOnAnimation();
              }

              @Override
              protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  int h=getHeight(); float tubeTop=(h-tubeH)/2f;
                  if (tubeW<=0) recalcLayout(getWidth(),h);
                  char[] digits=displayStr.length()==4?displayStr.toCharArray():new char[]{'0','0','0','0'};
                  for (int i=0;i<4;i++) drawTube(canvas,tubeX[i],tubeTop,digits[i]);
                  if (sepVisible) { sepPaint.setColor(Color.parseColor("#FFB300")); sepPaint.setShadowLayer(14f,0f,0f,Color.parseColor("#FF8C00")); }
                  else { sepPaint.setColor(Color.parseColor("#2A1800")); sepPaint.setShadowLayer(0f,0f,0f,0); }
                  canvas.drawText(":",sepX+(tubeW*0.38f)/2f,tubeTop+tubeH*0.68f,sepPaint);
              }

              private void drawTube(Canvas canvas,float x,float top,char d) {
                  RectF r=new RectF(x,top,x+tubeW,top+tubeH);
                  canvas.drawRoundRect(r,tubeRadius,tubeRadius,tubeBgPaint);
                  canvas.save(); canvas.translate(x,top);
                  canvas.drawRoundRect(new RectF(0,0,tubeW,tubeH),tubeRadius,tubeRadius,outerGlowPaint);
                  canvas.restore();
                  canvas.drawRoundRect(r,tubeRadius,tubeRadius,tubeGlowPaint);
                  canvas.drawRoundRect(new RectF(x+2,top+2,x+tubeW-2,top+tubeH*0.32f),tubeRadius,tubeRadius,glassPaint);
                  canvas.drawText("8",x+tubeW/2f,top+tubeH*0.70f,dimDigitPaint);
                  canvas.drawText(String.valueOf(d),x+tubeW/2f,top+tubeH*0.70f,digitPaint);
              }
          }
          EOF

