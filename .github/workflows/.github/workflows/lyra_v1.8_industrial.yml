name: Build Lyra Industrial v1.8
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Gradle Authority
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: AEGIS_Final_Attempt_Ignition
        run: |
          # 1. Limpieza total de residuos
          find . -mindepth 1 -maxdepth 1 ! -name '.github' -exec rm -rf {} +
          mkdir -p app/src/main/java/com/lyra/audiokernel
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 2. Settings.gradle con resolución explícita
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "LyraAudio"
          include ':app'
          EOF

          # 3. Build.gradle Raíz (Vacío para delegar autoridad)
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }" > build.gradle

          # 4. App Build.gradle (Estructura de Resistencia)
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.lyra.audiokernel'
              compileSdk 34
              defaultConfig { 
                  applicationId 'com.lyra.audiokernel'
                  minSdk 24
                  targetSdk 34
                  versionCode 14
                  versionName '1.8' 
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.0'
              implementation 'androidx.media3:media3-session:1.2.0'
          }
          EOF

          # 5. Manifiesto y Activos Críticos
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Lyra Ind" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
                  <service android:name=".LyraPlaybackService" android:foregroundServiceType="mediaPlayback" android:exported="false">
                      <intent-filter><action android:name="androidx.media3.session.MediaSessionService" /></intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          echo "package com.lyra.audiokernel; import android.os.Bundle; import androidx.appcompat.app.AppCompatActivity; public class MainActivity extends AppCompatActivity { protected void onCreate(Bundle b) { super.onCreate(b); } }" > app/src/main/java/com/lyra/audiokernel/MainActivity.java
          echo "package com.lyra.audiokernel; import androidx.media3.session.*; public class LyraPlaybackService extends MediaSessionService { public MediaSession onGetSession(MediaSession.ControllerInfo c) { return null; } }" > app/src/main/java/com/lyra/audiokernel/LyraPlaybackService.java
          echo "<resources><style name='Theme.AppCompat.NoActionBar' parent='Theme.AppCompat.DayNight.NoActionBar' /></resources>" > app/src/main/res/values/styles.xml
          echo "<LinearLayout xmlns:android='http://schemas.android.com/apk/res/android' android:layout_width='match_parent' android:layout_height='match_parent' android:background='#000'></LinearLayout>" > app/src/main/res/layout/activity_main.xml

          # 6. Ignición forzada con Gradle 8.5
          ./gradlew :app:assembleDebug --stacktrace

      - name: Deliver Lyra Industrial v1.8
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-v1.8-Industrial
          path: "app/build/outputs/apk/debug/*.apk"
