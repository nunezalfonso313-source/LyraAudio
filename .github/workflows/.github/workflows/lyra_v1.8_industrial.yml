name: Lyra_Omega_Ignition

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Lyra
        run: |

          # limpiar workspace
          find . -mindepth 1 -maxdepth 1 ! -name '.github' -exec rm -rf {} +

          # instalar gradle estable
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH=$PWD/gradle-8.5/bin:$PATH

          # estructura
          mkdir -p app/src/main/java/com/lyra/audiokernel
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # settings.gradle
          cat > settings.gradle <<'EOF'
          rootProject.name = "LyraAudio"
          include ':app'
          EOF

          # gradle.properties
          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2g
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # build.gradle raiz
          cat > build.gradle <<'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath "com.android.tools.build:gradle:8.1.4"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # build.gradle app
          cat > app/build.gradle <<'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace "com.lyra.audiokernel"
              compileSdk 34

              defaultConfig {
                  applicationId "com.lyra.audiokernel"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
          }
          EOF

          # manifest
          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.lyra.audiokernel">

              <application
                  android:label="LyraAudio"
                  android:theme="@style/Theme.AppCompat.NoActionBar">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>

                  </activity>

              </application>

          </manifest>
          EOF

          # actividad
          cat > app/src/main/java/com/lyra/audiokernel/MainActivity.java <<'EOF'
          package com.lyra.audiokernel;

          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
              }
          }
          EOF

          # styles
          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.DayNight.NoActionBar"/>
          </resources>
          EOF

          # layout
          cat > app/src/main/res/layout/activity_main.xml <<'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"/>
          EOF

          # build
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LyraAudio-debug
          path: app/build/outputs/apk/debug/*.apk
