          package com.lyra.audiokernel;
          import android.graphics.Bitmap;
          import androidx.media3.common.MediaItem;
          public class TrackInfo {
              public MediaItem mediaItem;
              public String title;
              public String artist;
              public String album;
              public String meta;
              public String duration;
              public Bitmap albumArt;
              public android.net.Uri uri;
              public TrackInfo(MediaItem mediaItem, String title, String artist, String album,
                               String meta, String duration, Bitmap albumArt, android.net.Uri uri) {
                  this.mediaItem = mediaItem;
                  this.title = title;
                  this.artist = artist;
                  this.album = album;
                  this.meta = meta;
                  this.duration = duration;
                  this.albumArt = albumArt;
                  this.uri = uri;
              }
          }
          JAVAEOF

          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/TrackAdapter.java
          package com.lyra.audiokernel;
          import android.content.Context;
          import android.graphics.Color;
          import android.view.LayoutInflater;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.ArrayAdapter;
          import android.widget.TextView;
          import java.util.List;
          public class TrackAdapter extends ArrayAdapter<TrackInfo> {
              private int currentIndex = -1;
              public TrackAdapter(Context context, List<TrackInfo> tracks) {
                  super(context, 0, tracks);
              }
              public void setCurrentIndex(int index) {
                  this.currentIndex = index;
                  notifyDataSetChanged();
              }
              @Override
              public View getView(int position, View convertView, ViewGroup parent) {
                  if (convertView == null) {
                      convertView = LayoutInflater.from(getContext())
                          .inflate(R.layout.item_track, parent, false);
                  }
                  TrackInfo track = getItem(position);
                  TextView number = convertView.findViewById(R.id.item_number);
                  TextView title = convertView.findViewById(R.id.item_title);
                  TextView artist = convertView.findViewById(R.id.item_artist);
                  TextView duration = convertView.findViewById(R.id.item_duration);
                  if (position == currentIndex) {
                      convertView.setBackgroundColor(Color.parseColor("#1A2A1A"));
                      number.setText("▶");
                      number.setTextColor(Color.parseColor("#00FF00"));
                      title.setTextColor(Color.parseColor("#00FF00"));
                  } else {
                      convertView.setBackgroundColor(Color.TRANSPARENT);
                      number.setText(String.valueOf(position + 1));
                      number.setTextColor(Color.parseColor("#444444"));
                      title.setTextColor(Color.WHITE);
                  }
                  if (track != null) {
                      title.setText(track.title);
                      artist.setText(track.artist);
                      duration.setText(track.duration);
                  }
                  return convertView;
              }
          }
          JAVAEOF

          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/LyraPlaybackService.java
          package com.lyra.audiokernel;
          import android.content.Intent;
          import android.media.audiofx.Equalizer;
          import android.os.Binder;
          import android.os.IBinder;
          import androidx.media3.exoplayer.ExoPlayer;
          import androidx.media3.session.MediaSession;
          import androidx.media3.session.MediaSessionService;
          public class LyraPlaybackService extends MediaSessionService {
              private MediaSession mediaSession;
              private ExoPlayer player;
              private Equalizer equalizer;
              private final LyraBinder binder = new LyraBinder();
              public class LyraBinder extends Binder {
                  public LyraPlaybackService getService() { return LyraPlaybackService.this; }
              }
              @Override
              public IBinder onBind(Intent intent) {
                  if (intent != null && "lyra.eq.bind".equals(intent.getAction())) {
                      return binder;
                  }
                  return super.onBind(intent);
              }
              @Override
              public void onCreate() {
                  super.onCreate();
                  player = new ExoPlayer.Builder(this).build();
                  mediaSession = new MediaSession.Builder(this, player).build();
                  try {
                      equalizer = new Equalizer(0, player.getAudioSessionId());
                      equalizer.setEnabled(true);
                  } catch (Exception ignored) {}
              }
              public short getNumBands() {
                  return equalizer != null ? equalizer.getNumberOfBands() : 5;
              }
              public int getBandFreq(short band) {
                  return equalizer != null ? equalizer.getCenterFreq(band) : 0;
              }
              public short[] getBandLevelRange() {
                  return equalizer != null ? equalizer.getBandLevelRange() : new short[]{-1500, 1500};
              }
              public short getBandLevel(short band) {
                  return equalizer != null ? equalizer.getBandLevel(band) : 0;
              }
              public void setBandLevel(short band, short levelMillibels) {
                  if (equalizer != null) equalizer.setBandLevel(band, levelMillibels);
              }
              public void resetEq() {
                  if (equalizer != null) {
                      short numBands = equalizer.getNumberOfBands();
                      for (short i = 0; i < numBands; i++) equalizer.setBandLevel(i, (short) 0);
                  }
              }
              @Override
              public MediaSession onGetSession(MediaSession.ControllerInfo controllerInfo) {
                  return mediaSession;
              }
              @Override
              public void onDestroy() {
                  if (equalizer != null) equalizer.release();
                  mediaSession.getPlayer().release();
                  mediaSession.release();
                  super.onDestroy();
              }
          }
          JAVAEOF

