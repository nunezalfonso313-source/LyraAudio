name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Hardened Architecture Rebuild
        run: |
          # Find the source folder wherever it is and move it to a safe place
          SRC_PATH=$(find . -name "src" -type d -not -path "*/app/src/*" | head -n 1)
          mkdir -p ./temp_src
          cp -r "$SRC_PATH"/* ./temp_src/
          
          # Clean root directory from any ghost folders or corrupt files
          find . -maxdepth 1 -not -name ".github" -not -name "temp_src" -not -name "." -exec rm -rf {} +
          
          # Rebuild the app module from scratch
          mkdir -p app/src
          mv ./temp_src/* app/src/
          rm -rf ./temp_src
          
          # Force root configuration files in plain English
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # Force app module identity (The Master Key)
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdk 33
              namespace "com.lyra.audio"
              defaultConfig {
                  applicationId "com.lyra.audio"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Force Master Compilation
        run: |
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Delivery
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-APK-Stable
          path: "app/build/outputs/apk/debug/*.apk"
