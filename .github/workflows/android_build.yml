              private void addTrackToPlaylist(String plName, TrackInfo t) {
                  for (LyraPlaylist pl : playlists) {
                      if (pl.name.equals(plName)) { pl.uris.add(t.uri.toString()); return; }
                  }
                  LyraPlaylist pl = new LyraPlaylist(plName);
                  pl.uris.add(t.uri.toString());
                  playlists.add(pl);
              }
              private void loadPlaylistIntoQueue(LyraPlaylist pl) {
                  List<TrackInfo> plTracks = new ArrayList<>();
                  for (String uriStr : pl.uris) {
                      Uri uri = Uri.parse(uriStr);
                      for (TrackInfo t : allTracks) {
                          if (t.uri.equals(uri)) { plTracks.add(t); break; }
                      }
                  }
                  if (plTracks.isEmpty()) { Toast.makeText(this, "Playlist vacía", Toast.LENGTH_SHORT).show(); return; }
                  displayedTracks.clear();
                  displayedTracks.addAll(plTracks);
                  adapter.notifyDataSetChanged();
                  libraryLabel.setText("▶ " + pl.name.toUpperCase() + " — " + plTracks.size() + " pistas");
                  libraryLabel.setTextColor(android.graphics.Color.parseColor("#00FF00"));
                  List<MediaItem> items = plTracks.stream().map(t -> t.mediaItem).collect(Collectors.toList());
                  mediaController.setMediaItems(items, 0, 0);
                  mediaController.prepare();
                  currentIndex = 0;
                  updateUI(0);
                  closePlDrawer();
              }
              private void togglePlDrawer() {
                  plDrawerVisible = !plDrawerVisible;
                  plDrawer.setVisibility(plDrawerVisible ? View.VISIBLE : View.GONE);
                  plScrim.setVisibility(plDrawerVisible ? View.VISIBLE : View.GONE);
                  if (plDrawerVisible) plAdapter.notifyDataSetChanged();
              }
              private void closePlDrawer() {
                  plDrawerVisible = false;
                  plDrawer.setVisibility(View.GONE);
                  plScrim.setVisibility(View.GONE);
                  plNameBar.setVisibility(View.GONE);
              }
              private void cycleSort() {
                  sortMode = (sortMode + 1) % 3;
                  switch (sortMode) {
                      case 0:
                          Collections.sort(allTracks, Comparator.comparing(t -> t.title.toLowerCase()));
                          btnSort.setText("AZ TÍTULO");
                          break;
                      case 1:
                          Collections.sort(allTracks, Comparator.comparing(t -> t.artist.toLowerCase()));
                          btnSort.setText("AZ ARTISTA");
                          break;
                      case 2:
                          Collections.sort(allTracks, Comparator.comparing(t -> t.album.toLowerCase()));
                          btnSort.setText("AZ ÁLBUM");
                          break;
                  }
                  String query = searchInput.getText().toString();
                  filterTracks(query);
                  if (query.isEmpty()) reloadQueueFromDisplayed();
              }
              private void reloadQueueFromDisplayed() {
                  if (mediaController == null || displayedTracks.isEmpty()) return;
                  List<MediaItem> items = displayedTracks.stream().map(t -> t.mediaItem).collect(Collectors.toList());
                  mediaController.setMediaItems(items, 0, 0);
                  mediaController.prepare();
                  currentIndex = 0;
              }
              private void toggleSearch() {
                  searchVisible = !searchVisible;
                  searchBar.setVisibility(searchVisible ? View.VISIBLE : View.GONE);
                  btnSearch.setTextColor(searchVisible
                      ? android.graphics.Color.parseColor("#00FF00")
                      : android.graphics.Color.WHITE);
                  if (searchVisible) {
                      searchInput.requestFocus();
                      InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                      imm.showSoftInput(searchInput, InputMethodManager.SHOW_IMPLICIT);
                  } else {
                      searchInput.setText("");
                      filterTracks("");
                      hideSoftKeyboard();
                  }
              }
              private void filterTracks(String query) {
                  displayedTracks.clear();
                  if (query.isEmpty()) {
                      displayedTracks.addAll(allTracks);
                      libraryLabel.setText("LISTA DE REPRODUCCIÓN");
                      libraryLabel.setTextColor(android.graphics.Color.parseColor("#444444"));
                  } else {
                      String low = query.toLowerCase();
                      for (TrackInfo t : allTracks) {
                          if (t.title.toLowerCase().contains(low) || t.artist.toLowerCase().contains(low))
                              displayedTracks.add(t);
                      }
                      libraryLabel.setText("RESULTADOS: " + displayedTracks.size());
                      libraryLabel.setTextColor(android.graphics.Color.parseColor("#00BFFF"));
                  }
                  adapter.notifyDataSetChanged();
              }
              private void hideSoftKeyboard() {
                  InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                  View focus = getCurrentFocus();
                  if (focus != null) imm.hideSoftInputFromWindow(focus.getWindowToken(), 0);
              }
              private void savePlaylists() {
                  try {
                      JSONArray arr = new JSONArray();
                      for (LyraPlaylist pl : playlists) {
                          JSONObject obj = new JSONObject();
                          obj.put("name", pl.name);
                          JSONArray uriArr = new JSONArray();
                          for (String u : pl.uris) uriArr.put(u);
                          obj.put("uris", uriArr);
                          arr.put(obj);
                      }
                      getSharedPreferences(PREFS, MODE_PRIVATE).edit().putString(KEY_PLAYLISTS, arr.toString()).apply();
                  } catch (Exception ignored) {}
              }
              private void loadPlaylists() {
                  playlists.clear();
                  try {
                      String json = getSharedPreferences(PREFS, MODE_PRIVATE).getString(KEY_PLAYLISTS, "[]");
                      JSONArray arr = new JSONArray(json);
                      for (int i = 0; i < arr.length(); i++) {
                          JSONObject obj = arr.getJSONObject(i);
                          LyraPlaylist pl = new LyraPlaylist(obj.getString("name"));
                          JSONArray uriArr = obj.getJSONArray("uris");
                          for (int j = 0; j < uriArr.length(); j++) pl.uris.add(uriArr.getString(j));
                          playlists.add(pl);
                      }
                  } catch (Exception ignored) {}
              }
              private class PlaylistAdapter extends ArrayAdapter<LyraPlaylist> {
                  public PlaylistAdapter() { super(MainActivity.this, 0, playlists); }
                  @Override
                  public View getView(int position, View convertView, ViewGroup parent) {
                      if (convertView == null)
                          convertView = LayoutInflater.from(getContext()).inflate(R.layout.item_playlist, parent, false);
                      LyraPlaylist pl = getItem(position);
                      TextView name  = convertView.findViewById(R.id.pl_item_name);
                      TextView count = convertView.findViewById(R.id.pl_item_count);
                      Button delete  = convertView.findViewById(R.id.pl_item_delete);
                      if (pl != null) {
                          name.setText(pl.name);
                          count.setText(pl.uris.size() + " pistas");
                      }
                      delete.setOnClickListener(v -> {
                          playlists.remove(position);
                          savePlaylists();
                          notifyDataSetChanged();
                      });
                      return convertView;
                  }
              }
              private void initEqUI() {
                  if (eqInitialized || !serviceBound) return;
                  eqInitialized = true;
                  short numBands = lyraService.getNumBands();
                  short[] range = lyraService.getBandLevelRange();
                  for (short i = 0; i < Math.min(numBands, 5); i++) {
                      int freqHz = lyraService.getBandFreq(i) / 1000;
                      eqLabels[i].setText(freqHz >= 1000 ? (freqHz / 1000) + "kHz" : freqHz + "Hz");
                      short current = lyraService.getBandLevel(i);
                      int span = range[1] - range[0];
                      int progress = span > 0 ? (int)(((current - range[0]) * 20.0f) / span) : 10;
                      eqBands[i].setProgress(Math.max(0, Math.min(20, progress)));
                      int db = current / 100;
                      eqVals[i].setText((db >= 0 ? "+" : "") + db + "dB");
                  }
              }
              private void checkPermissionAndLoad() {
                  String perm = Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU
                      ? Manifest.permission.READ_MEDIA_AUDIO
                      : Manifest.permission.READ_EXTERNAL_STORAGE;
                  if (ContextCompat.checkSelfPermission(this, perm) == PackageManager.PERMISSION_GRANTED) loadMediaStore();
                  else permissionLauncher.launch(perm);
              }
              private void loadMediaStore() {
                  allTracks.clear();
                  displayedTracks.clear();
                  new Thread(() -> {
                      Uri collection = MediaStore.Audio.Media.EXTERNAL_CONTENT_URI;
                      String[] projection = {
                          MediaStore.Audio.Media._ID, MediaStore.Audio.Media.TITLE,
                          MediaStore.Audio.Media.ARTIST, MediaStore.Audio.Media.ALBUM,
                          MediaStore.Audio.Media.DURATION, MediaStore.Audio.Media.SIZE,
                          MediaStore.Audio.Media.MIME_TYPE
                      };
                      try (Cursor cursor = getContentResolver().query(collection, projection,
                              MediaStore.Audio.Media.IS_MUSIC + " != 0", null,
                              MediaStore.Audio.Media.TITLE + " ASC")) {
                          if (cursor != null) {
                              int idC   = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media._ID);
                              int titC  = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media.TITLE);
                              int artC  = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media.ARTIST);
                              int albC  = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media.ALBUM);
                              int durC  = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media.DURATION);
                              int sizC  = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media.SIZE);
                              int mimC  = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media.MIME_TYPE);
                              while (cursor.moveToNext()) {
                                  long id     = cursor.getLong(idC);
                                  String tit  = cursor.getString(titC);
                                  String art  = cursor.getString(artC);
                                  String alb  = cursor.getString(albC);
                                  long durMs  = cursor.getLong(durC);
                                  long sizeKb = cursor.getLong(sizC) / 1024;
                                  String mime = cursor.getString(mimC);
                                  String ext  = mime != null ? mime.substring(mime.lastIndexOf("/") + 1).toUpperCase() : "AUDIO";
                                  String meta = ext + " | " + String.format(Locale.US, "%.1f MB", sizeKb / 1024.0);
                                  Uri uri = Uri.withAppendedPath(MediaStore.Audio.Media.EXTERNAL_CONTENT_URI, String.valueOf(id));
                                  if (tit == null || tit.isEmpty()) tit = "Sin título";
                                  if (art == null) art = "";
                                  if (alb == null) alb = "";
                                  allTracks.add(new TrackInfo(MediaItem.fromUri(uri), tit, art, alb, meta, formatTime(durMs), null, uri));
                              }
                          }
                      } catch (Exception ignored) {}
                      runOnUiThread(() -> {
                          displayedTracks.addAll(allTracks);
                          adapter.notifyDataSetChanged();
                          if (!allTracks.isEmpty()) {
                              int savedIndex = getSharedPreferences(PREFS, MODE_PRIVATE).getInt(KEY_INDEX, 0);
                              currentIndex = Math.min(savedIndex, allTracks.size() - 1);
                              trackNumber.setText("LIBRERÍA: " + allTracks.size() + " pistas");
                              List<MediaItem> items = allTracks.stream().map(t -> t.mediaItem).collect(Collectors.toList());
                              mediaController.setMediaItems(items, currentIndex, 0);
                              mediaController.prepare();
                              updateUI(currentIndex);
                          } else {
                              trackTitle.setText("Sin música encontrada");
                          }
                      });
                  }).start();
              }
              private void loadAlbumArt(int index) {
                  if (index >= allTracks.size()) return;
                  TrackInfo t = allTracks.get(index);
                  if (t.albumArt != null) { albumArt.setImageBitmap(t.albumArt); return; }
                  new Thread(() -> {
                      Bitmap art = null;
                      try {
                          MediaMetadataRetriever mmr = new MediaMetadataRetriever();
                          mmr.setDataSource(getApplicationContext(), t.uri);
                          byte[] bytes = mmr.getEmbeddedPicture();
                          mmr.release();
                          if (bytes != null) art = BitmapFactory.decodeByteArray(bytes, 0, bytes.length);
                      } catch (Exception ignored) {}
                      final Bitmap finalArt = art;
                      t.albumArt = finalArt;
                      runOnUiThread(() -> {
                          if (currentIndex == index) {
                              if (finalArt != null) albumArt.setImageBitmap(finalArt);
                              else albumArt.setImageResource(android.R.drawable.ic_media_play);
                          }
                      });
                  }).start();
              }
              private void updateUI(int index) {
                  currentIndex = index;
                  if (index >= allTracks.size()) return;
                  TrackInfo t = allTracks.get(index);
                  trackTitle.setText(t.title);
                  trackArtist.setText(t.artist.isEmpty() ? "Artista desconocido" : t.artist);
                  trackAlbum.setText(t.album);
                  trackMeta.setText(t.meta);
                  trackNumber.setText((index + 1) + " / " + allTracks.size());
                  timeCurrent.setText("0:00");
                  timeTotal.setText(t.duration.isEmpty() ? "0:00" : t.duration);
                  seekBar.setProgress(0);
                  albumArt.setImageResource(android.R.drawable.ic_media_play);
                  adapter.setCurrentIndex(displayedTracks.indexOf(t));
                  playlistView.smoothScrollToPosition(displayedTracks.indexOf(t));
                  loadAlbumArt(index);
                  getSharedPreferences(PREFS, MODE_PRIVATE).edit().putInt(KEY_INDEX, index).apply();
              }
              private void playAt(int index) {
                  if (index < 0 || index >= allTracks.size() || mediaController == null) return;
                  mediaController.seekToDefaultPosition(index);
                  mediaController.play();
                  updateUI(index);
              }
              private void advanceTrack(int direction) {
                  if (allTracks.isEmpty()) return;
                  if (repeatMode == 2) { playAt(currentIndex); return; }
                  int next = currentIndex + direction;
                  if (next >= allTracks.size()) next = repeatMode == 1 ? 0 : -1;
                  if (next < 0) next = repeatMode == 1 ? allTracks.size() - 1 : -1;
                  if (next >= 0) playAt(next);
              }
              private void toggleShuffle() {
                  isShuffled = !isShuffled;
                  btnShuffle.setTextColor(isShuffled ? android.graphics.Color.parseColor("#00FF00") : android.graphics.Color.parseColor("#555555"));
              }
              private void cycleRepeat() {
                  repeatMode = (repeatMode + 1) % 3;
                  switch (repeatMode) {
                      case 0: btnRepeat.setText("↺"); btnRepeat.setTextColor(android.graphics.Color.parseColor("#555555")); break;
                      case 1: btnRepeat.setText("↺"); btnRepeat.setTextColor(android.graphics.Color.parseColor("#00FF00")); break;
                      case 2: btnRepeat.setText("↻"); btnRepeat.setTextColor(android.graphics.Color.parseColor("#00BFFF")); break;
                  }
              }
              private String formatTime(long ms) {
                  long s = ms / 1000;
                  return String.format(Locale.US, "%d:%02d", s / 60, s % 60);
              }
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  handler.removeCallbacks(updateProgress);
                  if (serviceBound) { unbindService(eqConnection); serviceBound = false; }
                  MediaController.releaseFuture(controllerFuture);
              }
          }
          JAVAEOF

          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF

          echo "buildscript { repositories { google(); mavenCentral() } }" > build.gradle

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.0' }
          android {
              namespace 'com.lyra.audiokernel'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audiokernel'
                  minSdk 24
                  targetSdk 34
                  versionCode 7
                  versionName '1.6'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
              implementation 'androidx.documentfile:documentfile:1.0.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.0'
              implementation 'androidx.media3:media3-common:1.2.0'
              implementation 'androidx.media3:media3-session:1.2.0'
              implementation 'com.google.guava:guava:32.1.3-android'
          }
          EOF

