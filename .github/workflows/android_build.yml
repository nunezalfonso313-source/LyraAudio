name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS HUNTER - Manifest & Source Alignment
        run: |
          # 1. Locate the Manifest and Source files
          MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | head -n 1)
          SRC_JAVA_PATH=$(find . -name "java" -type d | head -n 1)
          
          # 2. Create the strict Industrial Structure
          mkdir -p app/src/main/java
          
          # 3. Move Manifest to its legal position
          if [ -n "$MANIFEST_PATH" ]; then
            mv "$MANIFEST_PATH" app/src/main/
          else
            echo "CRITICAL ERROR: AndroidManifest.xml not found in repo!"
            exit 1
          fi
          
          # 4. Move Java sources to their legal position
          if [ -n "$SRC_JAVA_PATH" ]; then
            cp -r "$SRC_JAVA_PATH"/* app/src/main/java/
          fi

          # 5. Clean root and inject configuration
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF
          
          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.lyra.audio'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audio'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Final Compilation Execution
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-APK-Stable
          path: "app/build/outputs/apk/debug/*.apk"
