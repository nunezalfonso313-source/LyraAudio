name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix directory structure
        run: |
          # Force moving the app folder to root if it exists inside LyraApp
          if [ -d "LyraApp/app" ]; then
            mv LyraApp/app .
            rm -rf LyraApp
          fi
          
          # Ensure essential root files are present and in English
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

      - name: Generate Wrapper and Compile
        run: |
          # Force download of Gradle 7.5 to avoid system version 9.3
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Output
          path: "app/build/outputs/apk/debug/*.apk"
