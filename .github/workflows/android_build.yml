name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Surgical File Alignment
        run: |
          # 1. Buscar donde demonios quedo el build.gradle y el src
          # Y moverlos a una carpeta limpia llamada 'app'
          mkdir -p ./app_new
          find . -name "src" -type d -exec cp -r {} ./app_new/ \;
          
          # 2. Limpiar la raiz para evitar conflictos
          find . -maxdepth 1 -not -name ".github" -not -name "app_new" -not -name "." -exec rm -rf {} +
          
          # 3. Restaurar estructura industrial
          mv app_new app
          
          # 4. Inyectar archivos de mando en INGLES PURO (Root)
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 5. Inyectar build.gradle del modulo (App)
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdk 33
              namespace "com.lyra.audio"
              defaultConfig {
                  applicationId "com.lyra.audio"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Final Build
        run: |
          gradle wrapper --gradle-version 7.6.1
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Audio-Player
          path: "**/*.apk"
