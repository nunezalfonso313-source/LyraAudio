name: Build Lyra Final Player
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS - Total Reconstruction & AndroidX Patch
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/lyra/audiokernel
          mkdir -p app/src/main/res/layout

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <application
                  android:allowBackup="true"
                  android:label="Lyra Player"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                  <activity android:name="com.lyra.audiokernel.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:background="#000000"
              android:padding="20dp">
              <TextView
                  android:id="@+id/track_number"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="LYRA SYSTEM READY"
                  android:textColor="#00FF00"
                  android:textSize="16sp"
                  android:layout_marginBottom="8dp"/>
              <TextView
                  android:id="@+id/track_name"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text=""
                  android:textColor="#FFFFFF"
                  android:textSize="20sp"
                  android:gravity="center"
                  android:ellipsize="marquee"
                  android:singleLine="true"
                  android:layout_marginBottom="8dp"/>
              <TextView
                  android:id="@+id/track_meta"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text=""
                  android:textColor="#00BFFF"
                  android:textSize="13sp"
                  android:layout_marginBottom="12dp"/>
              <SeekBar
                  android:id="@+id/seek_bar"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_marginBottom="4dp"/>
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginBottom="24dp">
                  <TextView
                      android:id="@+id/time_current"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="0:00"
                      android:textColor="#00FF00"
                      android:textSize="13sp"/>
                  <TextView
                      android:id="@+id/time_total"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="0:00"
                      android:textColor="#00FF00"
                      android:textSize="13sp"
                      android:gravity="end"/>
              </LinearLayout>
              <Button
                  android:id="@+id/btn_select"
                  android:layout_width="match_parent"
                  android:layout_height="60dp"
                  android:text="SELECT MUSIC FOLDER"/>
              <Button
                  android:id="@+id/btn_prev"
                  android:layout_width="match_parent"
                  android:layout_height="60dp"
                  android:text="PREVIOUS"/>
              <Button
                  android:id="@+id/btn_next"
                  android:layout_width="match_parent"
                  android:layout_height="60dp"
                  android:text="NEXT"/>
          </LinearLayout>
          EOF

          cat <<EOF > app/src/main/java/com/lyra/audiokernel/MainActivity.java
          package com.lyra.audiokernel;
          import android.content.Intent;
          import android.media.MediaMetadataRetriever;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.widget.Button;
          import android.widget.SeekBar;
          import android.widget.TextView;
          import androidx.activity.result.ActivityResultLauncher;
          import androidx.activity.result.contract.ActivityResultContracts;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.documentfile.provider.DocumentFile;
          import androidx.media3.common.MediaItem;
          import androidx.media3.common.Player;
          import androidx.media3.exoplayer.ExoPlayer;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private ExoPlayer player;
              private TextView trackNumber, trackName, trackMeta, timeCurrent, timeTotal;
              private SeekBar seekBar;
              private List<MediaItem> playlist = new ArrayList<>();
              private List<String> trackNames = new ArrayList<>();
              private List<String> trackMetas = new ArrayList<>();
              private List<DocumentFile> trackFiles = new ArrayList<>();
              private int currentIndex = 0;
              private final Handler handler = new Handler(Looper.getMainLooper());

              private final Runnable updateProgress = new Runnable() {
                  @Override
                  public void run() {
                      if (player != null && player.isPlaying()) {
                          long current = player.getCurrentPosition();
                          long total = player.getDuration();
                          if (total > 0) {
                              seekBar.setMax((int) total);
                              seekBar.setProgress((int) current);
                              timeCurrent.setText(formatTime(current));
                              timeTotal.setText(formatTime(total));
                          }
                      }
                      handler.postDelayed(this, 500);
                  }
              };

              private final ActivityResultLauncher<Uri> folderPickerLauncher = registerForActivityResult(
                  new ActivityResultContracts.OpenDocumentTree(),
                  uri -> {
                      if (uri != null) {
                          getContentResolver().takePersistableUriPermission(uri,
                              Intent.FLAG_GRANT_READ_URI_PERMISSION);
                          loadFromFolder(uri);
                      }
                  }
              );

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  player = new ExoPlayer.Builder(this).build();
                  trackNumber = findViewById(R.id.track_number);
                  trackName = findViewById(R.id.track_name);
                  trackMeta = findViewById(R.id.track_meta);
                  timeCurrent = findViewById(R.id.time_current);
                  timeTotal = findViewById(R.id.time_total);
                  seekBar = findViewById(R.id.seek_bar);
                  Button btnSelect = findViewById(R.id.btn_select);
                  Button btnPrev = findViewById(R.id.btn_prev);
                  Button btnNext = findViewById(R.id.btn_next);

                  player.addListener(new Player.Listener() {
                      @Override
                      public void onPlaybackStateChanged(int state) {
                          if (state == Player.STATE_ENDED) {
                              if (currentIndex < playlist.size() - 1) {
                                  currentIndex++;
                                  playAt(currentIndex);
                              }
                          }
                      }
                  });

                  seekBar.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override
                      public void onProgressChanged(SeekBar sb, int progress, boolean fromUser) {
                          if (fromUser) player.seekTo(progress);
                      }
                      @Override public void onStartTrackingTouch(SeekBar sb) {}
                      @Override public void onStopTrackingTouch(SeekBar sb) {}
                  });

                  btnSelect.setOnClickListener(v -> folderPickerLauncher.launch(null));
                  btnNext.setOnClickListener(v -> {
                      if (currentIndex < playlist.size() - 1) { currentIndex++; playAt(currentIndex); }
                  });
                  btnPrev.setOnClickListener(v -> {
                      if (currentIndex > 0) { currentIndex--; playAt(currentIndex); }
                  });

                  handler.post(updateProgress);
              }

              private void loadFromFolder(Uri treeUri) {
                  playlist.clear();
                  trackNames.clear();
                  trackMetas.clear();
                  trackFiles.clear();
                  currentIndex = 0;
                  DocumentFile folder = DocumentFile.fromTreeUri(this, treeUri);
                  if (folder != null) scanFolder(folder);
                  if (!playlist.isEmpty()) {
                      trackNumber.setText("LIBRARY: " + playlist.size() + " tracks");
                      playAt(0);
                  } else {
                      trackNumber.setText("NO AUDIO FILES FOUND");
                  }
              }

              private void scanFolder(DocumentFile folder) {
                  for (DocumentFile file : folder.listFiles()) {
                      if (file.isDirectory()) {
                          scanFolder(file);
                      } else {
                          String name = file.getName();
                          if (name != null && (name.endsWith(".mp3") || name.endsWith(".flac")
                              || name.endsWith(".m4a") || name.endsWith(".ogg"))) {
                              playlist.add(MediaItem.fromUri(file.getUri()));
                              String display = name.replaceAll("\\.(mp3|flac|m4a|ogg)$", "");
                              String ext = name.substring(name.lastIndexOf(".") + 1).toUpperCase();
                              trackNames.add(display);
                              trackFiles.add(file);
                              long sizeKb = file.length() / 1024;
                              String sizeMb = String.format(Locale.US, "%.1f MB", sizeKb / 1024.0);
                              trackMetas.add(ext + " | " + sizeMb);
                          }
                      }
                  }
              }

              private void playAt(int index) {
                  player.stop();
                  player.setMediaItem(playlist.get(index));
                  player.prepare();
                  player.play();
                  trackNumber.setText("Track " + (index + 1) + " of " + playlist.size());
                  trackName.setText(trackNames.get(index));
                  trackMeta.setText(trackMetas.get(index));
                  timeCurrent.setText("0:00");
                  timeTotal.setText("0:00");
                  seekBar.setProgress(0);

                  new Thread(() -> {
                      try {
                          MediaMetadataRetriever mmr = new MediaMetadataRetriever();
                          mmr.setDataSource(getApplicationContext(), trackFiles.get(index).getUri());
                          String bitrate = mmr.extractMetadata(MediaMetadataRetriever.METADATA_KEY_BITRATE);
                          mmr.release();
                          if (bitrate != null) {
                              int kbps = Integer.parseInt(bitrate) / 1000;
                              String ext = trackMetas.get(index).split(" \\| ")[0];
                              String size = trackMetas.get(index).split(" \\| ")[1];
                              String meta = ext + " | " + size + " | " + kbps + " kbps";
                              runOnUiThread(() -> trackMeta.setText(meta));
                          }
                      } catch (Exception e) {}
                  }).start();
              }

              private String formatTime(long ms) {
                  long seconds = ms / 1000;
                  long minutes = seconds / 60;
                  seconds = seconds % 60;
                  return String.format(Locale.US, "%d:%02d", minutes, seconds);
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  handler.removeCallbacks(updateProgress);
                  if (player != null) player.release();
              }
          }
          EOF

          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF

          echo "buildscript { repositories { google(); mavenCentral() } }" > build.gradle

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.0' }
          android {
              namespace 'com.lyra.audiokernel'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audiokernel'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.documentfile:documentfile:1.0.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.0'
              implementation 'androidx.media3:media3-common:1.2.0'
          }
          EOF

      - name: Master Compilation
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Deliver Functional Player
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Final-Functional
          path: "app/build/outputs/apk/debug/*.apk"
