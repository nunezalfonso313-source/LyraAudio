name: Build Lyra Safe Mode V2
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS SAFE-MODE - Global Alignment
        run: |
          # 1. Create Isolation Zone
          mkdir -p ./phantom_zone/src/main/java/com/lyra/audiokernel
          
          # 2. Global Search (No exclusions to find the lost files)
          MANIFEST_FILE=$(find . -name "AndroidManifest.xml" | head -n 1)
          JAVA_FILE=$(find . -name "MainActivity.java" | head -n 1)
          
          # 3. Validation and Extraction
          if [ -z "$MANIFEST_FILE" ] || [ -z "$JAVA_FILE" ]; then
            echo "CRITICAL: Files not found. Search logs:"
            find . -maxdepth 3
            exit 1
          fi
          
          echo "Files found: $MANIFEST_FILE and $JAVA_FILE"
          cp "$MANIFEST_FILE" ./phantom_zone/src/main/
          cp "$JAVA_FILE" ./phantom_zone/src/main/java/com/lyra/audiokernel/
          
          # 4. SURGERY: Disable C++ calls to prevent crash
          TARGET_JAVA="./phantom_zone/src/main/java/com/lyra/audiokernel/MainActivity.java"
          sed -i 's/System.loadLibrary/\/\/ System.loadLibrary/g' "$TARGET_JAVA"
          sed -i 's/tv.setText(stringFromJNI())/tv.setText("LYRA KERNEL V1: ONLINE")/g' "$TARGET_JAVA"
          sed -i 's/public native String stringFromJNI()/\/\/ public native String stringFromJNI()/g' "$TARGET_JAVA"
          
          # 5. Total Root Wipe (Except .github and phantom_zone)
          find . -maxdepth 1 -not -name ".github" -not -name "phantom_zone" -not -name "." -exec rm -rf {} +
          
          # 6. Restore Final Structure
          mkdir -p app
          mv ./phantom_zone/* app/
          rm -rf ./phantom_zone
          
          # 7. Inject Master Configs
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF
          
          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.lyra.audiokernel'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audiokernel'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Compilation Execution
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Artifact Delivery
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Safe-Mode-V2
          path: "app/build/outputs/apk/debug/*.apk"
