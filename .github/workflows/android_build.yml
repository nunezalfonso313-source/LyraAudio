
name: Build Lyra Final Player
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS - v1.6 Orden + Busqueda + Playlists
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name '.github' -exec rm -rf {} +
          mkdir -p app/src/main/java/com/lyra/audiokernel
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application
                  android:allowBackup="true"
                  android:label="Lyra Player"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name="com.lyra.audiokernel.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name="com.lyra.audiokernel.LyraPlaybackService"
                      android:foregroundServiceType="mediaPlayback"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="androidx.media3.session.MediaSessionService" />
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.coordinatorlayout.widget.CoordinatorLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#0A0A0A">
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical">
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:padding="12dp"
                      android:background="#111111">
                      <ImageView
                          android:id="@+id/album_art"
                          android:layout_width="80dp"
                          android:layout_height="80dp"
                          android:scaleType="centerCrop"
                          android:background="#222222"
                          android:src="@android:drawable/ic_media_play"/>
                      <LinearLayout
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:orientation="vertical"
                          android:paddingStart="12dp"
                          android:gravity="center_vertical">
                          <TextView
                              android:id="@+id/track_title"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="Cargando biblioteca..."
                              android:textColor="#FFFFFF"
                              android:textSize="15sp"
                              android:textStyle="bold"
                              android:ellipsize="marquee"
                              android:singleLine="true"/>
                          <TextView
                              android:id="@+id/track_artist"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text=""
                              android:textColor="#00BFFF"
                              android:textSize="13sp"
                              android:ellipsize="end"
                              android:singleLine="true"/>
                          <TextView
                              android:id="@+id/track_album"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text=""
                              android:textColor="#888888"
                              android:textSize="12sp"
                              android:ellipsize="end"
                              android:singleLine="true"/>
                          <TextView
                              android:id="@+id/track_meta"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text=""
                              android:textColor="#00FF00"
                              android:textSize="11sp"/>
                      </LinearLayout>
                  </LinearLayout>
                  <SeekBar
                      android:id="@+id/seek_bar"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:paddingStart="12dp"
                      android:paddingEnd="12dp"
                      android:progressTint="#00BFFF"
                      android:thumbTint="#00BFFF"/>
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:paddingStart="16dp"
                      android:paddingEnd="16dp"
                      android:paddingBottom="4dp">
                      <TextView
                          android:id="@+id/time_current"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="0:00"
                          android:textColor="#00FF00"
                          android:textSize="11sp"/>
                      <TextView
                          android:id="@+id/track_number"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text=""
                          android:textColor="#555555"
                          android:textSize="11sp"
                          android:gravity="center"/>
                      <TextView
                          android:id="@+id/time_total"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="0:00"
                          android:textColor="#00FF00"
                          android:textSize="11sp"
                          android:gravity="end"/>
                  </LinearLayout>
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="56dp"
                      android:orientation="horizontal"
                      android:background="#0D0D0D"
                      android:gravity="center_vertical">
                      <Button
                          android:id="@+id/btn_shuffle"
                          android:layout_width="0dp"
                          android:layout_height="40dp"
                          android:layout_weight="1"
                          android:layout_margin="4dp"
                          android:text="⇀"
                          android:textSize="18sp"
                          android:textColor="#555555"
                          android:background="@android:color/transparent"
                          android:padding="0dp"/>
                      <Button
                          android:id="@+id/btn_prev"
                          android:layout_width="0dp"
                          android:layout_height="40dp"
                          android:layout_weight="1"
                          android:layout_margin="4dp"
                          android:text="⏮"
                          android:textSize="18sp"
                          android:textColor="#FFFFFF"
                          android:background="@android:color/transparent"
                          android:padding="0dp"/>
                      <Button
                          android:id="@+id/btn_play"
                          android:layout_width="0dp"
                          android:layout_height="44dp"
                          android:layout_weight="1.2"
                          android:layout_margin="4dp"
