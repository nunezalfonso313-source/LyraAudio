name: Build Lyra Audio Player
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS - Hardened Versioning Injection
        run: |
          # 1. Limpieza absoluta
          rm -rf *
          mkdir -p app/src/main/java/com/lyra/audiokernel
          mkdir -p app/src/main/res/layout
          
          # 2. Manifiesto Blindado
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <application
                  android:allowBackup="true"
                  android:label="Lyra Player"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                  <activity android:name="com.lyra.audiokernel.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 3. Interfaz Visual
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:background="#000000">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="LYRA AUDIO PLAYER"
                  android:textColor="#00FF00"
                  android:textSize="24sp"
                  android:layout_marginBottom="20dp"/>
              <Button
                  android:id="@+id/btn_play"
                  android:layout_width="200dp"
                  android:layout_height="wrap_content"
                  android:text="PROBAR MOTOR" />
          </LinearLayout>
          EOF

          # 4. Codigo de MainActivity
          cat <<EOF > app/src/main/java/com/lyra/audiokernel/MainActivity.java
          package com.lyra.audiokernel;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  Button btnPlay = findViewById(R.id.btn_play);
                  btnPlay.setOnClickListener(v -> {
                      Toast.makeText(this, "Motor Lyra Activo", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

          # 5. Configuracion Maestra de Gradle (Solucion al error de version)
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF
          
          # Root build sin plugins conflictivos
          echo "buildscript { repositories { google(); mavenCentral() } }" > build.gradle

          # App build con VERSION EXPLÍCITA (Aqui esta el arreglo)
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application' version '8.2.0'
          }
          android {
              namespace 'com.lyra.audiokernel'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audiokernel'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Final Execution
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Deliver Functional APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Final-Functional
          path: "app/build/outputs/apk/debug/*.apk"
