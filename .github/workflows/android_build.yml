                      </LinearLayout>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="36dp" android:orientation="horizontal" android:gravity="center_vertical">
                          <TextView android:id="@+id/eq_label0" android:layout_width="44dp" android:layout_height="wrap_content" android:text="--" android:textColor="#555555" android:textSize="10sp"/>
                          <SeekBar android:id="@+id/eq_band0" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:max="20" android:progress="10" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                          <TextView android:id="@+id/eq_val0" android:layout_width="36dp" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp" android:gravity="end"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="36dp" android:orientation="horizontal" android:gravity="center_vertical">
                          <TextView android:id="@+id/eq_label1" android:layout_width="44dp" android:layout_height="wrap_content" android:text="--" android:textColor="#555555" android:textSize="10sp"/>
                          <SeekBar android:id="@+id/eq_band1" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:max="20" android:progress="10" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                          <TextView android:id="@+id/eq_val1" android:layout_width="36dp" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp" android:gravity="end"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="36dp" android:orientation="horizontal" android:gravity="center_vertical">
                          <TextView android:id="@+id/eq_label2" android:layout_width="44dp" android:layout_height="wrap_content" android:text="--" android:textColor="#555555" android:textSize="10sp"/>
                          <SeekBar android:id="@+id/eq_band2" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:max="20" android:progress="10" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                          <TextView android:id="@+id/eq_val2" android:layout_width="36dp" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp" android:gravity="end"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="36dp" android:orientation="horizontal" android:gravity="center_vertical">
                          <TextView android:id="@+id/eq_label3" android:layout_width="44dp" android:layout_height="wrap_content" android:text="--" android:textColor="#555555" android:textSize="10sp"/>
                          <SeekBar android:id="@+id/eq_band3" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:max="20" android:progress="10" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                          <TextView android:id="@+id/eq_val3" android:layout_width="36dp" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp" android:gravity="end"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="36dp" android:orientation="horizontal" android:gravity="center_vertical">
                          <TextView android:id="@+id/eq_label4" android:layout_width="44dp" android:layout_height="wrap_content" android:text="--" android:textColor="#555555" android:textSize="10sp"/>
                          <SeekBar android:id="@+id/eq_band4" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:max="20" android:progress="10" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                          <TextView android:id="@+id/eq_val4" android:layout_width="36dp" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp" android:gravity="end"/>
                      </LinearLayout>
