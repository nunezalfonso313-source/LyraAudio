- name: Extraer proyecto
  run: unzip LyraAudio/LyraProject.zip -d .

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar NDK y CMake
        run: |
          sdkmanager "ndk;25.2.9519653"
          sdkmanager "cmake;3.22.1"

      - name: Extraer proyecto
        run: unzip LyraProject.zip -d .

      - name: Inyectar archivos raiz
        run: |
          echo "include ':app'" > settings.gradle

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

      - name: Corregir lyra_kernel.cpp
        run: |
          cat > app/src/main/cpp/lyra_kernel.cpp << 'EOF'
          #include <string>

          class Decoder {
          public:
              void processFormat(std::string name, std::string ext) {}
          };

          class AudioEngine {
          public:
              float applyDSP(float sample, float bassGain) {
                  float out = sample * bassGain;
                  if (out > 1.0f) out = 1.0f;
                  return out;
              }
          };

          class Visualizer {
          public:
              void drawInterface(float level) {}
          };

          class LyraPlayer {
          public:
              Decoder reader;
              AudioEngine engine;
              Visualizer screen;
              std::string getStatus() {
                  return "LYRA KERNEL V1: ONLINE & BIT-PERFECT";
              }
          };
          EOF

      - name: Corregir AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.lyra.audiokernel">
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <application
                  android:label="Lyra Audio V1"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".AudioService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="mediaPlayback" />
              </application>
          </manifest>
          EOF

      - name: Corregir app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.lyra.audiokernel"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
                  externalNativeBuild {
                      cmake { cppFlags "-std=c++17" }
                  }
              }
              externalNativeBuild {
                  cmake { path "src/main/cpp/CMakeLists.txt" }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Generar Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=7.6.1
          chmod +x ./gradlew

      - name: Compilar APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Entregar APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Audio-Player
          path: app/build/outputs/apk/debug/app-debug.apk
