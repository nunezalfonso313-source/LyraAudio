name: Build Lyra Final Player
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS - Total Reconstruction & AndroidX Patch
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/lyra/audiokernel
          mkdir -p app/src/main/res/layout

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <application
                  android:allowBackup="true"
                  android:label="Lyra Player"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                  <activity android:name="com.lyra.audiokernel.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:background="#000000"
              android:padding="20dp">
              <TextView
                  android:id="@+id/status_text"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="LYRA SYSTEM READY"
                  android:textColor="#00FF00"
                  android:textSize="22sp"
                  android:layout_marginBottom="40dp"/>
              <Button
                  android:id="@+id/btn_play"
                  android:layout_width="match_parent"
                  android:layout_height="60dp"
                  android:text="PLAY"/>
              <Button
                  android:id="@+id/btn_prev"
                  android:layout_width="match_parent"
                  android:layout_height="60dp"
                  android:text="PREVIOUS"/>
              <Button
                  android:id="@+id/btn_next"
                  android:layout_width="match_parent"
                  android:layout_height="60dp"
                  android:text="NEXT"/>
          </LinearLayout>
          EOF

          cat <<EOF > app/src/main/java/com/lyra/audiokernel/MainActivity.java
          package com.lyra.audiokernel;
          import android.Manifest;
          import android.content.ContentUris;
          import android.content.pm.PackageManager;
          import android.database.Cursor;
          import android.net.Uri;
          import android.os.Bundle;
          import android.provider.MediaStore;
          import android.widget.Button;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import androidx.media3.common.MediaItem;
          import androidx.media3.exoplayer.ExoPlayer;
          import java.util.ArrayList;
          import java.util.List;

          public class MainActivity extends AppCompatActivity {
              private ExoPlayer player;
              private TextView statusText;
              private List<MediaItem> playlist = new ArrayList<>();
              private int currentIndex = 0;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  player = new ExoPlayer.Builder(this).build();
                  statusText = findViewById(R.id.status_text);
                  Button btnPlay = findViewById(R.id.btn_play);
                  Button btnPrev = findViewById(R.id.btn_prev);
                  Button btnNext = findViewById(R.id.btn_next);

                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_EXTERNAL_STORAGE)
                          != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this,
                          new String[]{Manifest.permission.READ_EXTERNAL_STORAGE}, 1);
                  } else {
                      loadLibrary();
                  }

                  btnPlay.setOnClickListener(v -> {
                      if (!playlist.isEmpty()) playAt(currentIndex);
                  });
                  btnNext.setOnClickListener(v -> {
                      if (currentIndex < playlist.size() - 1) {
                          currentIndex++;
                          playAt(currentIndex);
                      }
                  });
                  btnPrev.setOnClickListener(v -> {
                      if (currentIndex > 0) {
                          currentIndex--;
                          playAt(currentIndex);
                      }
                  });
              }

              private void loadLibrary() {
                  String[] projection = {MediaStore.Audio.Media._ID, MediaStore.Audio.Media.TITLE};
                  String selection = MediaStore.Audio.Media.IS_MUSIC + " != 0";
                  Cursor cursor = getContentResolver().query(
                      MediaStore.Audio.Media.EXTERNAL_CONTENT_URI,
                      projection, selection, null,
                      MediaStore.Audio.Media.TITLE + " ASC");
                  if (cursor != null) {
                      while (cursor.moveToNext()) {
                          long id = cursor.getLong(0);
                          Uri uri = ContentUris.withAppendedId(
                              MediaStore.Audio.Media.EXTERNAL_CONTENT_URI, id);
                          playlist.add(MediaItem.fromUri(uri));
                      }
                      cursor.close();
                  }
                  statusText.setText("LIBRARY: " + playlist.size() + " tracks");
              }

              private void playAt(int index) {
                  player.setMediaItem(playlist.get(index));
                  player.prepare();
                  player.play();
                  statusText.setText("Track " + (index + 1) + " of " + playlist.size());
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] results) {
                  super.onRequestPermissionsResult(requestCode, permissions, results);
                  if (requestCode == 1 && results.length > 0 && results[0] == PackageManager.PERMISSION_GRANTED) {
                      loadLibrary();
                  }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (player != null) player.release();
              }
          }
          EOF

          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF

          echo "buildscript { repositories { google(); mavenCentral() } }" > build.gradle

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.0' }
          android {
              namespace 'com.lyra.audiokernel'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audiokernel'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.0'
              implementation 'androidx.media3:media3-common:1.2.0'
          }
          EOF

      - name: Master Compilation
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Deliver Functional Player
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Final-Functional
          path: "app/build/outputs/apk/debug/*.apk"
