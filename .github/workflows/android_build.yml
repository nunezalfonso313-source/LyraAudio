name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Android Structure
        run: |
          # 1. Ensure root configuration exists
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 2. Force the app module to be an Android Application
          # This overwrites app/build.gradle with a working skeleton
          mkdir -p app
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdk 33
              namespace "com.lyra.audio"
              defaultConfig {
                  applicationId "com.lyra.audio"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

      - name: Master Compilation
        run: |
          gradle wrapper --gradle-version 7.6.1
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Audio-Player
          path: "app/build/outputs/apk/debug/*.apk"
