name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sincronizacion Estructural
        run: |
          unzip LyraProject.zip -d .
          # Si los archivos quedaron dentro de una carpeta, los sacamos a la raiz
          find . -maxdepth 2 -name "build.gradle" -exec cp {} . \;
          mkdir -p app
          # Movemos src y build.gradle a app/
          [ -d "src" ] && mv src app/
          [ -f "build.gradle" ] && cp build.gradle app/

      - name: Inyectar Mando Root
        run: |
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilacion Maestra
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Entrega de Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Audio-Player
          path: "**/*.apk"

