name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS RESOLUTE - Structural Fix
        run: |
          # 1. Isolate source code and protect it
          SRC_PATH=$(find . -name "src" -type d -not -path "*/app/src/*" | head -n 1)
          if [ -n "$SRC_PATH" ]; then
            mkdir -p ./temp_src
            cp -r "$SRC_PATH"/* ./temp_src/
          fi
          
          # 2. Complete Root Wipe to remove translation-corrupted files
          find . -maxdepth 1 -not -name ".github" -not -name "temp_src" -not -name "." -exec rm -rf {} +
          
          # 3. Create Industrial Structure
          mkdir -p app/src
          [ -d "./temp_src" ] && mv ./temp_src/* app/src/
          rm -rf ./temp_src
          
          # 4. Inject Master Settings with Plugin Management (The Absolute Fix)
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF
          
          # 5. Inject Modern Root Build
          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # 6. Inject App Module (Fixed Identity)
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.lyra.audio'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audio'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Force Master Compilation
        run: |
          # Force the use of stable Gradle 8.5
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
