name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extraer motor de audio
        run: unzip LyraProject.zip -d extracted/

      - name: Verificar estructura extraída
        run: find extracted/ -maxdepth 3 -type f | head -40

      - name: Mover contenido a raíz si hay carpeta intermedia
        run: |
          # Si el ZIP tiene carpeta interna, mueve su contenido a la raíz
          INNER=$(ls extracted/)
          if [ -d "extracted/$INNER/app" ]; then
            cp -r extracted/$INNER/. .
          else
            cp -r extracted/. .
          fi

      - name: Inyectar estructura faltante (Estrategia AEGIS)
        run: |
          if [ ! -f settings.gradle ]; then
            echo "include ':app'" > settings.gradle
          fi
          if [ ! -f build.gradle ]; then
            echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:7.4.2' } }" > build.gradle
            echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle
          fi

      - name: Dar permisos al Gradle wrapper
        run: chmod +x ./gradlew

      - name: Compilación Maestra
        run: ./gradlew assembleDebug

      - name: Entrega de Artefacto (APK)
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Audio-Player
          path: app/build/outputs/apk/debug/app-debug.apk
