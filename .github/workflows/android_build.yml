name: Build Lyra Hardened Kernel
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS - Hardened Core Injection
        run: |
          # 1. Crear estructura de carpetas limpia
          mkdir -p app/src/main/java/com/lyra/audiokernel
          
          # 2. INYECTAR MANIFIESTO MAESTRO (Sin errores de package)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Lyra Audio V1"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.Light">
                  <activity
                      android:name="com.lyra.audiokernel.MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 3. INYECTAR MAINACTIVITY BLINDADA (Sin C++ / Sin XML externos)
          cat <<EOF > app/src/main/java/com/lyra/audiokernel/MainActivity.java
          package com.lyra.audiokernel;
          import android.os.Bundle;
          import android.widget.TextView;
          import android.view.Gravity;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // Nucleo de interfaz generado por codigo para evitar errores de layout
                  TextView tv = new TextView(this);
                  tv.setText("LYRA AUDIO SYSTEM\nKERNEL V1: ONLINE\nSTATUS: STABLE");
                  tv.setTextSize(24);
                  tv.setGravity(Gravity.CENTER);
                  setContentView(tv);
              }
          }
          EOF

          # 4. Inyectar configuraciones de Gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF
          
          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.lyra.audiokernel'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audiokernel'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Master Compilation
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Deliver Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Hardened-Kernel
          path: "app/build/outputs/apk/debug/*.apk"
