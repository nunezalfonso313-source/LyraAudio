name: Lyra_v1.8_Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}
      - name: AEGIS_Final_Ignition
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name '.github' -exec rm -rf {} +
          mkdir -p app/src/main/java/com/lyra/audiokernel app/src/main/res/layout app/src/main/res/values
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/><uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>
          <application android:label="Lyra Ind" android:theme="@style/Theme.AppCompat.NoActionBar">
          <activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity>
          <service android:name=".LyraPlaybackService" android:foregroundServiceType="mediaPlayback" android:exported="false"><intent-filter><action android:name="androidx.media3.session.MediaSessionService"/></intent-filter></service>
          </application></manifest>
          EOF
          cat <<EOF > app/src/main/res/values/styles.xml
          <resources><style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.DayNight.NoActionBar"/><style name="NixieDigit"><item name="android:textColor">#FF8800</item><item name="android:textSize">34sp</item><item name="android:fontFamily">monospace</item><item name="android:shadowColor">#FF4400</item><item name="android:shadowRadius">12</item></style></resources>
          EOF
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <androidx.coordinatorlayout.widget.CoordinatorLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#050505"><LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical"><LinearLayout android:layout_width="match_parent" android:layout_height="110dp" android:background="#111"><com.lyra.audiokernel.VUMeterView android:id="@+id/vu_left" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/><com.lyra.audiokernel.VUMeterView android:id="@+id/vu_right" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/></LinearLayout><LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="12dp" android:background="#0D0D0D"><ImageView android:id="@+id/album_art" android:layout_width="75dp" android:layout_height="75dp" android:background="#1A1A1A"/><LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:paddingStart="12dp"><TextView android:id="@+id/track_title" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#FFF" android:textSize="15sp" android:textStyle="bold" android:singleLine="true"/><TextView android:id="@+id/track_artist" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#00BFFF" android:textSize="13sp"/></LinearLayout></LinearLayout><LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="center" android:orientation="horizontal"><TextView android:id="@+id/nixie_m1" style="@style/NixieDigit" android:text="0"/><TextView android:id="@+id/nixie_m2" style="@style/NixieDigit" android:text="0"/><TextView style="@style/NixieDigit" android:text=":" android:alpha="0.4"/><TextView android:id="@+id/nixie_s1" style="@style/NixieDigit" android:text="0"/><TextView android:id="@+id/nixie_s2" style="@style/NixieDigit" android:text="0"/></LinearLayout><SeekBar android:id="@+id/seek_bar" android:layout_width="match_parent" android:layout_height="wrap_content"/><ListView android:id="@+id/playlist_view" android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"/><LinearLayout android:layout_width="match_parent" android:layout_height="60dp" android:gravity="center"><Button android:id="@+id/btn_prev" android:layout_width="60dp" android:layout_height="match_parent" android:text="⏮" android:background="@android:color/transparent"/><Button android:id="@+id/btn_play" android:layout_width="70dp" android:layout_height="match_parent" android:text="▶" android:background="@android:color/transparent" android:textColor="#00FF00" android:textSize="24sp"/><Button android:id="@+id/btn_next" android:layout_width="60dp" android:layout_height="match_parent" android:text="⏭" android:background="@android:color/transparent"/></LinearLayout></LinearLayout></androidx.coordinatorlayout.widget.CoordinatorLayout>
          EOF
          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/VUMeterView.java
          package com.lyra.audiokernel;
          import android.content.Context;import android.graphics.*;import android.util.AttributeSet;import android.view.View;
          public class VUMeterView extends View {
          private float level=0,target=0;private Paint pA=new Paint(1),pN=new Paint(1);
          public VUMeterView(Context c,AttributeSet a){super(c,a);pA.setColor(0x33220000);pA.setStyle(Paint.Style.STROKE);pA.setStrokeWidth(4);pN.setColor(0xFFFFBB00);pN.setStrokeWidth(6);pN.setStrokeCap(Paint.Cap.ROUND);}
          public void setLevel(float l){target=l;postInvalidateOnAnimation();}
          protected void onDraw(Canvas c){level+=(target-level)*0.15f;float cx=getWidth()/2f,cy=getHeight()*0.9f,r=getWidth()*0.8f;c.drawArc(new RectF(cx-r,cy-r,cx+r,cy+r),210,120,false,pA);float a=210+(level*120);c.drawLine(cx,cy,(float)(cx+Math.cos(Math.toRadians(a))*r),(float)(cy+Math.sin(Math.toRadians(a))*r),pN);}}
          JAVAEOF
          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/LyraPlaybackService.java
          package com.lyra.audiokernel;
          import androidx.media3.exoplayer.ExoPlayer;import androidx.media3.session.*;
          public class LyraPlaybackService extends MediaSessionService {
          private MediaSession s;private ExoPlayer p;
          public void onCreate(){super.onCreate();p=new ExoPlayer.Builder(this).build();s=new MediaSession.Builder(this,p).build();}
          public MediaSession onGetSession(MediaSession.ControllerInfo c){return s;}
          public void onDestroy(){p.release();s.release();super.onDestroy();}}
          JAVAEOF
          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/MainActivity.java
          package com.lyra.audiokernel;
          import android.Manifest;import android.content.*;import android.os.*;import android.provider.MediaStore;import android.widget.*;import androidx.appcompat.app.AppCompatActivity;import androidx.media3.common.*;import androidx.media3.session.*;import com.google.common.util.concurrent.*;import java.util.*;import java.util.stream.Collectors;
          public class MainActivity extends AppCompatActivity {
          private MediaController c;private VUMeterView vL,vR;private TextView n1,n2,n3,n4;
          protected void onCreate(Bundle b){super.onCreate(b);setContentView(R.layout.activity_main);vL=findViewById(R.id.vu_left);vR=findViewById(R.id.vu_right);n1=findViewById(R.id.nixie_m1);n2=findViewById(R.id.nixie_m2);n3=findViewById(R.id.nixie_s1);n4=findViewById(R.id.nixie_s2);
          SessionToken t=new SessionToken(this,new ComponentName(this,LyraPlaybackService.class));ListenableFuture<MediaController> f=new MediaController.Builder(this,t).buildAsync();f.addListener(()->{try{c=f.get();if(checkSelfPermission(Manifest.permission.READ_EXTERNAL_STORAGE)==0)load();else requestPermissions(new String[]{Manifest.permission.READ_EXTERNAL_STORAGE},1);}catch(Exception e){}},MoreExecutors.directExecutor());
          new Handler(Looper.getMainLooper()).post(new Runnable(){public void run(){if(c!=null&&c.isPlaying()){long p=c.getCurrentPosition();int m=(int)(p/60000),s=(int)((p%60000)/1000);n1.setText(String.valueOf(m/10));n2.setText(String.valueOf(m%10));n3.setText(String.valueOf(s/10));n4.setText(String.valueOf(s%10));vL.setLevel((float)Math.random());vR.setLevel((float)Math.random());}new Handler(Looper.getMainLooper()).postDelayed(this,100);}});}
          private void load(){var cur=getContentResolver().query(MediaStore.Audio.Media.EXTERNAL_CONTENT_URI,null,null,null,null);if(cur!=null){List<MediaItem> i=new ArrayList<>();while(cur.moveToNext())i.add(MediaItem.fromUri(android.net.Uri.withAppendedPath(MediaStore.Audio.Media.EXTERNAL_CONTENT_URI,cur.getString(cur.getColumnIndexOrThrow("_id")))));cur.close();c.setMediaItems(i);c.prepare();}}}
          JAVAEOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.0' }
          android { namespace 'com.lyra.audiokernel'; compileSdk 34; defaultConfig { applicationId 'com.lyra.audiokernel'; minSdk 24; targetSdk 34; versionCode 9; versionName '1.8' } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'; implementation 'androidx.media3:media3-exoplayer:1.2.0'; implementation 'androidx.media3:media3-common:1.2.0'; implementation 'androidx.media3:media3-session:1.2.0'; implementation 'com.google.guava:guava:32.1.3-android' }
          EOF
          echo "rootProject.name = 'LyraAudio'" > settings.gradle
          echo "include ':app'" >> settings.gradle
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with: {name: Lyra-v1.8-Industrial, path: "app/build/outputs/apk/debug/*.apk"}

