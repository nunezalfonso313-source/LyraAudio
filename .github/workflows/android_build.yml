name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Surgical Rebirth (AEGIS OMEGA)
        run: |
          # 1. Protect the source code (src) and wipe corrupt configurations
          SRC_PATH=$(find . -name "src" -type d -not -path "*/app/src/*" | head -n 1)
          if [ -n "$SRC_PATH" ]; then
            mkdir -p ./temp_src
            cp -r "$SRC_PATH"/* ./temp_src/
          fi
          
          # Nuclear wipe of root to kill line 1 errors
          find . -maxdepth 1 -not -name ".github" -not -name "temp_src" -not -name "." -exec rm -rf {} +
          
          # 2. Reconstruct structure
          mkdir -p app/src
          [ -d "./temp_src" ] && mv ./temp_src/* app/src/
          rm -rf ./temp_src
          
          # 3. Inject Modern Master Files (English Pure)
          printf "rootProject.name = 'LyraAudio'\ninclude ':app'\n" > settings.gradle
          
          # Root Build with modern plugin management
          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # App Module with modern OMEGA syntax (Fixes Line 1 error)
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.lyra.audio'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audio'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Execute Hardened Compilation
        run: |
          # Force download of stable Gradle 8.5 to bypass the unstable 9.3 version
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
