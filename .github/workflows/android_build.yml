          public class MainActivity extends AppCompatActivity {
              private MediaController mediaController;
              private ListenableFuture<MediaController> controllerFuture;
              private LyraPlaybackService lyraService;
              private boolean serviceBound = false;
              private ImageView albumArt;
              private TextView trackTitle, trackArtist, trackAlbum, trackMeta;
              private TextView trackNumber, timeCurrent, timeTotal;
              private SeekBar seekBar;
              private ListView playlistView;
              private Button btnPlay, btnShuffle, btnRepeat, btnEq;
              private LinearLayout eqPanel;
              private SeekBar[] eqBands = new SeekBar[5];
              private TextView[] eqVals = new TextView[5];
              private TextView[] eqLabels = new TextView[5];
              private boolean eqVisible = false;
              private boolean eqInitialized = false;
              private List<TrackInfo> tracks = new ArrayList<>();
              private List<Integer> playOrder = new ArrayList<>();
              private int currentIndex = 0;
              private boolean isShuffled = false;
              private int repeatMode = 0;
              private TrackAdapter adapter;
              private final Handler handler = new Handler(Looper.getMainLooper());
              private static final String PREFS = "lyra_prefs";
              private static final String KEY_INDEX = "last_index";
              private final ServiceConnection eqConnection = new ServiceConnection() {
                  @Override
                  public void onServiceConnected(ComponentName name, IBinder binder) {
                      lyraService = ((LyraPlaybackService.LyraBinder) binder).getService();
                      serviceBound = true;
                      initEqUI();
                  }
                  @Override
                  public void onServiceDisconnected(ComponentName name) {
                      serviceBound = false;
                      lyraService = null;
                  }
              };
              private final Runnable updateProgress = new Runnable() {
                  @Override public void run() {
                      if (mediaController != null && mediaController.isPlaying()) {
                          long cur = mediaController.getCurrentPosition();
                          long tot = mediaController.getDuration();
                          if (tot > 0) {
                              seekBar.setMax((int) tot);
                              seekBar.setProgress((int) cur);
                              timeCurrent.setText(formatTime(cur));
                              timeTotal.setText(formatTime(tot));
                          }
                      }
                      handler.postDelayed(this, 500);
                  }
              };
              private final ActivityResultLauncher<String> permissionLauncher =
                  registerForActivityResult(new ActivityResultContracts.RequestPermission(), granted -> {
                      if (granted) loadMediaStore();
                      else trackTitle.setText("Permiso necesario para leer música");
                  });
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  albumArt    = findViewById(R.id.album_art);
                  trackTitle  = findViewById(R.id.track_title);
                  trackArtist = findViewById(R.id.track_artist);
                  trackAlbum  = findViewById(R.id.track_album);
                  trackMeta   = findViewById(R.id.track_meta);
                  trackNumber = findViewById(R.id.track_number);
                  timeCurrent = findViewById(R.id.time_current);
                  timeTotal   = findViewById(R.id.time_total);
                  seekBar     = findViewById(R.id.seek_bar);
                  playlistView= findViewById(R.id.playlist_view);
                  btnPlay     = findViewById(R.id.btn_play);
                  btnShuffle  = findViewById(R.id.btn_shuffle);
                  btnRepeat   = findViewById(R.id.btn_repeat);
                  btnEq       = findViewById(R.id.btn_eq);
                  eqPanel     = findViewById(R.id.eq_panel);
                  Button btnPrev = findViewById(R.id.btn_prev);
                  Button btnNext = findViewById(R.id.btn_next);
                  Button btnEqReset = findViewById(R.id.btn_eq_reset);
                  int[] bandIds  = {R.id.eq_band0, R.id.eq_band1, R.id.eq_band2, R.id.eq_band3, R.id.eq_band4};
                  int[] valIds   = {R.id.eq_val0,  R.id.eq_val1,  R.id.eq_val2,  R.id.eq_val3,  R.id.eq_val4};
                  int[] labelIds = {R.id.eq_label0,R.id.eq_label1,R.id.eq_label2,R.id.eq_label3,R.id.eq_label4};
                  for (int i = 0; i < 5; i++) {
                      eqBands[i]  = findViewById(bandIds[i]);
                      eqVals[i]   = findViewById(valIds[i]);
                      eqLabels[i] = findViewById(labelIds[i]);
                      final short band = (short) i;
                      eqBands[i].setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                          @Override public void onProgressChanged(SeekBar sb, int p, boolean fromUser) {
                              if (!fromUser || !serviceBound) return;
                              short[] range = lyraService.getBandLevelRange();
                              int span = range[1] - range[0];
                              short level = (short) (range[0] + (span * p / 20));
                              lyraService.setBandLevel(band, level);
                              int db = level / 100;
                              eqVals[band].setText((db >= 0 ? "+" : "") + db + "dB");
                          }
                          @Override public void onStartTrackingTouch(SeekBar sb) {}
                          @Override public void onStopTrackingTouch(SeekBar sb) {}
                      });
                  }
                  adapter = new TrackAdapter(this, tracks);
                  playlistView.setAdapter(adapter);
                  seekBar.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar sb, int p, boolean fromUser) {
                          if (fromUser && mediaController != null) mediaController.seekTo(p);
                      }
                      @Override public void onStartTrackingTouch(SeekBar sb) {}
                      @Override public void onStopTrackingTouch(SeekBar sb) {}
                  });
                  playlistView.setOnItemClickListener((parent, view, position, id) -> {
                      currentIndex = position;
                      playAt(currentIndex);
                  });
                  btnPlay.setOnClickListener(v -> {
                      if (mediaController == null) return;
                      if (mediaController.isPlaying()) mediaController.pause();
                      else mediaController.play();
                  });
                  btnPrev.setOnClickListener(v -> advanceTrack(-1));
                  btnNext.setOnClickListener(v -> advanceTrack(1));
                  btnShuffle.setOnClickListener(v -> toggleShuffle());
                  btnRepeat.setOnClickListener(v -> cycleRepeat());
                  btnEq.setOnClickListener(v -> {
                      eqVisible = !eqVisible;
                      eqPanel.setVisibility(eqVisible ? View.VISIBLE : View.GONE);
                      btnEq.setTextColor(eqVisible
                          ? android.graphics.Color.parseColor("#00FF00")
                          : android.graphics.Color.WHITE);
                  });
                  btnEqReset.setOnClickListener(v -> {
                      if (serviceBound) {
                          lyraService.resetEq();
                          for (int i = 0; i < 5; i++) {
                              eqBands[i].setProgress(10);
                              eqVals[i].setText("0dB");
                          }
                      }
                  });
                  Intent eqIntent = new Intent(this, LyraPlaybackService.class);
                  eqIntent.setAction("lyra.eq.bind");
                  bindService(eqIntent, eqConnection, Context.BIND_AUTO_CREATE);
                  SessionToken token = new SessionToken(this,
                      new ComponentName(this, LyraPlaybackService.class));
                  controllerFuture = new MediaController.Builder(this, token).buildAsync();
                  controllerFuture.addListener(() -> {
                      try {
                          mediaController = controllerFuture.get();
                          mediaController.addListener(new Player.Listener() {
                              @Override
                              public void onIsPlayingChanged(boolean playing) {
                                  btnPlay.setText(playing ? "⏸" : "▶");
                              }
                              @Override
                              public void onMediaItemTransition(MediaItem mediaItem, int reason) {
                                  int idx = mediaController.getCurrentMediaItemIndex();
                                  if (idx >= 0 && idx < tracks.size()) updateUI(idx);
                              }
                          });
                          checkPermissionAndLoad();
                      } catch (Exception e) {
                          trackTitle.setText("Error al iniciar servicio");
                      }
                  }, MoreExecutors.directExecutor());
                  handler.post(updateProgress);
              }
              private void initEqUI() {
                  if (eqInitialized || !serviceBound) return;
                  eqInitialized = true;
                  short numBands = lyraService.getNumBands();
                  short[] range = lyraService.getBandLevelRange();
                  for (short i = 0; i < Math.min(numBands, 5); i++) {
                      int freqHz = lyraService.getBandFreq(i) / 1000;
                      String label = freqHz >= 1000
                          ? (freqHz / 1000) + "kHz"
                          : freqHz + "Hz";
                      eqLabels[i].setText(label);
                      short current = lyraService.getBandLevel(i);
                      int span = range[1] - range[0];
            int progress = span > 0 ? (int)(((current - range[0]) * 20.0f) / span) : 10;
                      eqBands[i].setProgress(Math.max(0, Math.min(20, progress)));
                      int db = current / 100;
                      eqVals[i].setText((db >= 0 ? "+" : "") + db + "dB");
                  }
              }
              private void checkPermissionAndLoad() {
                  String perm = Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU
                      ? Manifest.permission.READ_MEDIA_AUDIO
                      : Manifest.permission.READ_EXTERNAL_STORAGE;
                  if (ContextCompat.checkSelfPermission(this, perm)
                          == PackageManager.PERMISSION_GRANTED) {
                      loadMediaStore();
                  } else {
                      permissionLauncher.launch(perm);
                  }
              }
              private void loadMediaStore() {
                  tracks.clear();
                  playOrder.clear();
                  new Thread(() -> {
                      Uri collection = MediaStore.Audio.Media.EXTERNAL_CONTENT_URI;
                      String[] projection = {
                          MediaStore.Audio.Media._ID,
                          MediaStore.Audio.Media.TITLE,
                          MediaStore.Audio.Media.ARTIST,
                          MediaStore.Audio.Media.ALBUM,
                          MediaStore.Audio.Media.DURATION,
                          MediaStore.Audio.Media.SIZE,
                          MediaStore.Audio.Media.MIME_TYPE
                      };
                      String selection = MediaStore.Audio.Media.IS_MUSIC + " != 0";
                      String sortOrder = MediaStore.Audio.Media.TITLE + " ASC";
                      try (Cursor cursor = getContentResolver().query(
                              collection, projection, selection, null, sortOrder)) {
                          if (cursor != null) {
                              int idCol     = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media._ID);
                              int titleCol  = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media.TITLE);
                              int artistCol = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media.ARTIST);
                              int albumCol  = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media.ALBUM);
                              int durCol    = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media.DURATION);
                              int sizeCol   = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media.SIZE);
                              int mimeCol   = cursor.getColumnIndexOrThrow(MediaStore.Audio.Media.MIME_TYPE);
                              while (cursor.moveToNext()) {
                                  long id      = cursor.getLong(idCol);
                                  String title = cursor.getString(titleCol);
                                  String artist= cursor.getString(artistCol);
                                  String album = cursor.getString(albumCol);
                                  long durMs   = cursor.getLong(durCol);
                                  long sizeKb  = cursor.getLong(sizeCol) / 1024;
                                  String mime  = cursor.getString(mimeCol);
                                  String ext   = mime != null ? mime.substring(mime.lastIndexOf("/") + 1).toUpperCase() : "AUDIO";
                                  String meta  = ext + " | " + String.format(Locale.US, "%.1f MB", sizeKb / 1024.0);
                                  Uri uri = Uri.withAppendedPath(
                                      MediaStore.Audio.Media.EXTERNAL_CONTENT_URI, String.valueOf(id));
                                  if (title == null || title.isEmpty()) title = "Sin título";
                                  if (artist == null) artist = "";
                                  if (album == null) album = "";
                                  tracks.add(new TrackInfo(MediaItem.fromUri(uri),
                                      title, artist, album, meta, formatTime(durMs), null, uri));
                              }
                          }
                      } catch (Exception ignored) {}
                      for (int i = 0; i < tracks.size(); i++) playOrder.add(i);
                      runOnUiThread(() -> {
                          adapter.notifyDataSetChanged();
                          if (!tracks.isEmpty()) {
                              int savedIndex = getSharedPreferences(PREFS, MODE_PRIVATE)
                                  .getInt(KEY_INDEX, 0);
                              currentIndex = Math.min(savedIndex, tracks.size() - 1);
                              trackNumber.setText("LIBRERÍA: " + tracks.size() + " pistas");
                              List<MediaItem> items = tracks.stream()
                                  .map(t -> t.mediaItem)
                                  .collect(Collectors.toList());
                              mediaController.setMediaItems(items, currentIndex, 0);
                              mediaController.prepare();
                              updateUI(currentIndex);
                          } else {
                              trackTitle.setText("Sin música encontrada");
                          }
                      });
                  }).start();
              }
              private void loadAlbumArt(int index) {
                  TrackInfo t = tracks.get(index);
                  if (t.albumArt != null) { albumArt.setImageBitmap(t.albumArt); return; }
                  new Thread(() -> {
                      Bitmap art = null;
                      try {
                          MediaMetadataRetriever mmr = new MediaMetadataRetriever();
                          mmr.setDataSource(getApplicationContext(), t.uri);
                          byte[] bytes = mmr.getEmbeddedPicture();
                          mmr.release();
                          if (bytes != null) art = BitmapFactory.decodeByteArray(bytes, 0, bytes.length);
                      } catch (Exception ignored) {}
                      final Bitmap finalArt = art;
                      t.albumArt = finalArt;
                      runOnUiThread(() -> {
                          if (currentIndex == index) {
                              if (finalArt != null) albumArt.setImageBitmap(finalArt);
                              else albumArt.setImageResource(android.R.drawable.ic_media_play);
                          }
                      });
                  }).start();
              }
              private void updateUI(int index) {
                  currentIndex = index;
                  TrackInfo t = tracks.get(index);
                  trackTitle.setText(t.title);
                  trackArtist.setText(t.artist.isEmpty() ? "Artista desconocido" : t.artist);
                  trackAlbum.setText(t.album);
                  trackMeta.setText(t.meta);
                  trackNumber.setText((index + 1) + " / " + tracks.size());
                  timeCurrent.setText("0:00");
                  timeTotal.setText(t.duration.isEmpty() ? "0:00" : t.duration);
                  seekBar.setProgress(0);
                  albumArt.setImageResource(android.R.drawable.ic_media_play);
                  adapter.setCurrentIndex(index);
                  playlistView.smoothScrollToPosition(index);
                  loadAlbumArt(index);
                  getSharedPreferences(PREFS, MODE_PRIVATE).edit()
                      .putInt(KEY_INDEX, index).apply();
              }
              private void playAt(int index) {
                  if (index < 0 || index >= tracks.size() || mediaController == null) return;
                  mediaController.seekToDefaultPosition(index);
                  mediaController.play();
                  updateUI(index);
              }
              private void advanceTrack(int direction) {
                  if (tracks.isEmpty()) return;
                  if (repeatMode == 2) { playAt(currentIndex); return; }
                  int next = currentIndex + direction;
                  if (next >= tracks.size()) next = repeatMode == 1 ? 0 : -1;
                  if (next < 0) next = repeatMode == 1 ? tracks.size() - 1 : -1;
                  if (next >= 0) playAt(next);
              }
              private void toggleShuffle() {
                  isShuffled = !isShuffled;
                  btnShuffle.setTextColor(isShuffled
                      ? android.graphics.Color.parseColor("#00FF00")
                      : android.graphics.Color.parseColor("#555555"));
                  if (isShuffled) Collections.shuffle(playOrder);
                  else { playOrder.clear(); for (int i = 0; i < tracks.size(); i++) playOrder.add(i); }
              }
              private void cycleRepeat() {
                  repeatMode = (repeatMode + 1) % 3;
                  switch (repeatMode) {
                      case 0: btnRepeat.setText("↺"); btnRepeat.setTextColor(android.graphics.Color.parseColor("#555555")); break;
                      case 1: btnRepeat.setText("↺"); btnRepeat.setTextColor(android.graphics.Color.parseColor("#00FF00")); break;
                      case 2: btnRepeat.setText("↻"); btnRepeat.setTextColor(android.graphics.Color.parseColor("#00BFFF")); break;
                  }
              }
              private String formatTime(long ms) {
                  long s = ms / 1000;
                  return String.format(Locale.US, "%d:%02d", s / 60, s % 60);
              }
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  handler.removeCallbacks(updateProgress);
                  if (serviceBound) { unbindService(eqConnection); serviceBound = false; }
                  MediaController.releaseFuture(controllerFuture);
              }
          }
          JAVAEOF

          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF

          echo "buildscript { repositories { google(); mavenCentral() } }" > build.gradle

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.0' }
          android {
              namespace 'com.lyra.audiokernel'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audiokernel'
                  minSdk 24
                  targetSdk 34
                  versionCode 6
                  versionName '1.5'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.documentfile:documentfile:1.0.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.0'
              implementation 'androidx.media3:media3-common:1.2.0'
              implementation 'androidx.media3:media3-session:1.2.0'
              implementation 'com.google.guava:guava:32.1.3-android'
          }
          EOF

      - name: Master Compilation
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Deliver Lyra v1.5
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-v1.5-Ecualizador
          path: "app/build/outputs/apk/debug/*.apk"
