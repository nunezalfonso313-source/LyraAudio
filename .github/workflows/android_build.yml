name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Alignment
        run: |
          # 1. Move files if they are inside LyraApp
          if [ -d "LyraApp/app" ]; then
            mv LyraApp/app .
            rm -rf LyraApp
          fi
          
          # 2. Create the MASTER root files
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 7.6.1
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Audio-Player
          path: "app/build/outputs/apk/debug/*.apk"
