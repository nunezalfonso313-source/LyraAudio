name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Nuclear Clean and Sync
        run: |
          # 1. Protect the ZIP and wipe everything else to fix "Inception" folders
          ZIP_FILE=$(ls *.zip | grep -i "Lyra" | head -n 1)
          mkdir .temp_safe
          cp "$ZIP_FILE" .temp_safe/
          rm -rf ./* ./.* 2>/dev/null || true
          mv .temp_safe/* .
          rm -rf .temp_safe

          # 2. Fresh Extraction
          unzip "$ZIP_FILE" -d .
          
          # 3. Intelligent folder normalization
          # We look for the folder that actually contains 'src'
          SRC_PATH=$(find . -name "src" -type d -path "*/app/src" | head -n 1)
          APP_BASE=$(dirname "$SRC_PATH")
          
          if [ -d "$APP_BASE" ] && [ "$APP_BASE" != "./app" ]; then
            rm -rf ./app # Delete any ghost app folder
            mv "$APP_BASE" ./app
          fi

      - name: Final Configuration
        run: |
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 7.6.1
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Audio-Player
          path: "**/*.apk"

