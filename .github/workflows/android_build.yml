name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Clean Configuration
        run: |
          # 1. Eliminar cualquier residuo de carpetas
          if [ -d "LyraApp/app" ]; then
            mv LyraApp/app .
            rm -rf LyraApp
          fi

          # 2. Inyectar Settings Root
          echo "include ':app'" > settings.gradle

          # 3. Inyectar Build Root
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 4. Inyectar App Module (REEMPLAZA TU EDICION MANUAL)
          mkdir -p app
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdk 33
              namespace "com.lyra.audio"
              defaultConfig {
                  applicationId "com.lyra.audio"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Final Build Execution
        run: |
          gradle wrapper --gradle-version 7.6.1
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
