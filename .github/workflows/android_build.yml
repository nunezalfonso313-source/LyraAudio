          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/TrackInfo.java
          package com.lyra.audiokernel;
          import android.graphics.Bitmap;
          import androidx.media3.common.MediaItem;

          public class TrackInfo {
              public MediaItem mediaItem;
              public String title;
              public String artist;
              public String album;
              public String meta;
              public String duration;
              public Bitmap albumArt;
              public android.net.Uri uri;

              public TrackInfo(MediaItem mediaItem, String title, String artist, String album,
                               String meta, String duration, Bitmap albumArt, android.net.Uri uri) {
                  this.mediaItem = mediaItem;
                  this.title = title;
                  this.artist = artist;
                  this.album = album;
                  this.meta = meta;
                  this.duration = duration;
                  this.albumArt = albumArt;
                  this.uri = uri;
              }
          }
          JAVAEOF

          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/TrackAdapter.java
          package com.lyra.audiokernel;
          import android.content.Context;
          import android.graphics.Color;
          import android.view.LayoutInflater;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.ArrayAdapter;
          import android.widget.TextView;
          import java.util.List;

          public class TrackAdapter extends ArrayAdapter<TrackInfo> {
              private int currentIndex = -1;

              public TrackAdapter(Context context, List<TrackInfo> tracks) {
                  super(context, 0, tracks);
              }

              public void setCurrentIndex(int index) {
                  this.currentIndex = index;
                  notifyDataSetChanged();
              }

              @Override
              public View getView(int position, View convertView, ViewGroup parent) {
                  if (convertView == null) {
                      convertView = LayoutInflater.from(getContext())
                          .inflate(R.layout.item_track, parent, false);
                  }
                  TrackInfo track = getItem(position);
                  TextView number = convertView.findViewById(R.id.item_number);
                  TextView title = convertView.findViewById(R.id.item_title);
                  TextView artist = convertView.findViewById(R.id.item_artist);
                  TextView duration = convertView.findViewById(R.id.item_duration);

                  if (position == currentIndex) {
                      convertView.setBackgroundColor(Color.parseColor("#1A2A1A"));
                      number.setText("▶");
                      number.setTextColor(Color.parseColor("#00FF00"));
                      title.setTextColor(Color.parseColor("#00FF00"));
                  } else {
                      convertView.setBackgroundColor(Color.TRANSPARENT);
                      number.setText(String.valueOf(position + 1));
                      number.setTextColor(Color.parseColor("#444444"));
                      title.setTextColor(Color.WHITE);
                  }

                  if (track != null) {
                      title.setText(track.title);
                      artist.setText(track.artist);
                      duration.setText(track.duration);
                  }
                  return convertView;
              }
          }
          JAVAEOF

          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/LyraPlaybackService.java
          package com.lyra.audiokernel;
          import androidx.media3.exoplayer.ExoPlayer;
          import androidx.media3.session.MediaSession;
          import androidx.media3.session.MediaSessionService;

          public class LyraPlaybackService extends MediaSessionService {
              private MediaSession mediaSession;

              @Override
              public void onCreate() {
                  super.onCreate();
                  ExoPlayer player = new ExoPlayer.Builder(this).build();
                  mediaSession = new MediaSession.Builder(this, player).build();
              }

              @Override
              public MediaSession onGetSession(MediaSession.ControllerInfo controllerInfo) {
                  return mediaSession;
              }

              @Override
              public void onDestroy() {
                  mediaSession.getPlayer().release();
                  mediaSession.release();
                  super.onDestroy();
              }
          }
          JAVAEOF

          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/MainActivity.java
          package com.lyra.audiokernel;
          import android.content.ComponentName;
          import android.content.Intent;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.media.AudioManager;
          import android.media.MediaMetadataRetriever;
          import android.media.audiofx.Equalizer;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.View;
          import android.widget.Button;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.ListView;
          import android.widget.SeekBar;
          import android.widget.TextView;
          import androidx.activity.result.ActivityResultLauncher;
          import androidx.activity.result.contract.ActivityResultContracts;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.documentfile.provider.DocumentFile;
          import androidx.media3.common.MediaItem;
          import androidx.media3.common.MediaMetadata;
          import androidx.media3.common.Player;
          import androidx.media3.session.MediaController;
          import androidx.media3.session.SessionToken;
          import com.google.common.util.concurrent.ListenableFuture;
          import com.google.common.util.concurrent.MoreExecutors;
          import java.util.ArrayList;
          import java.util.Collections;
          import java.util.List;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private MediaController mediaController;
              private ListenableFuture<MediaController> controllerFuture;

              private ImageView albumArt;
              private TextView trackTitle, trackArtist, trackAlbum, trackMeta;
              private TextView trackNumber, timeCurrent, timeTotal;
              private SeekBar seekBar;
              private ListView playlistView;
              private Button btnPlay, btnShuffle, btnRepeat, btnEq;
              private LinearLayout eqPanel;
              private SeekBar[] eqBands = new SeekBar[5];
              private TextView[] eqVals = new TextView[5];

              private List<TrackInfo> tracks = new ArrayList<>();
              private int currentIndex = 0;
              private boolean isShuffled = false;
              private int repeatMode = 0;
              private Equalizer equalizer;
              private boolean eqVisible = false;

              private TrackAdapter adapter;
              private final Handler handler = new Handler(Looper.getMainLooper());

              // Persistencia
              private static final String PREFS = "lyra_prefs";
              private static final String KEY_FOLDER = "last_folder";
              private static final String KEY_INDEX = "last_index";

              private final Runnable updateProgress = new Runnable() {
                  @Override public void run() {
                      if (mediaController != null && mediaController.isPlaying()) {
                          long cur = mediaController.getCurrentPosition();
                          long tot = mediaController.getDuration();
                          if (tot > 0) {
                              seekBar.setMax((int) tot);
                              seekBar.setProgress((int) cur);
                              timeCurrent.setText(formatTime(cur));
                              timeTotal.setText(formatTime(tot));
                          }
                      }
                      handler.postDelayed(this, 500);
                  }
              };

              private final ActivityResultLauncher<Uri> folderPicker = registerForActivityResult(
                  new ActivityResultContracts.OpenDocumentTree(),
                  uri -> {
                      if (uri != null) {
                          getContentResolver().takePersistableUriPermission(uri,
                              Intent.FLAG_GRANT_READ_URI_PERMISSION);
                          getSharedPreferences(PREFS, MODE_PRIVATE).edit()
                              .putString(KEY_FOLDER, uri.toString()).apply();
                          loadFolder(uri);
                      }
                  }
              );

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  albumArt    = findViewById(R.id.album_art);
                  trackTitle  = findViewById(R.id.track_title);
                  trackArtist = findViewById(R.id.track_artist);
                  trackAlbum  = findViewById(R.id.track_album);
                  trackMeta   = findViewById(R.id.track_meta);
                  trackNumber = findViewById(R.id.track_number);
                  timeCurrent = findViewById(R.id.time_current);
                  timeTotal   = findViewById(R.id.time_total);
                  seekBar     = findViewById(R.id.seek_bar);
                  playlistView= findViewById(R.id.playlist_view);
                  btnPlay     = findViewById(R.id.btn_play);
                  btnShuffle  = findViewById(R.id.btn_shuffle);
                  btnRepeat   = findViewById(R.id.btn_repeat);
                  btnEq       = findViewById(R.id.btn_eq);
                  eqPanel     = findViewById(R.id.eq_panel);

                  int[] bandIds = {R.id.eq_band0, R.id.eq_band1, R.id.eq_band2, R.id.eq_band3, R.id.eq_band4};
                  int[] valIds  = {R.id.eq_val0,  R.id.eq_val1,  R.id.eq_val2,  R.id.eq_val3,  R.id.eq_val4};
                  for (int i = 0; i < 5; i++) {
                      eqBands[i] = findViewById(bandIds[i]);
                      eqVals[i]  = findViewById(valIds[i]);
                      final int band = i;
                      eqBands[i].setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                          @Override public void onProgressChanged(SeekBar sb, int p, boolean fromUser) {
                              if (fromUser && equalizer != null) {
                                  int db = p - 10;
                                  eqVals[band].setText((db > 0 ? "+" : "") + db + "dB");
                                  equalizer.setBandLevel((short) band, (short) (db * 100));
                              }
                          }
                          @Override public void onStartTrackingTouch(SeekBar sb) {}
                          @Override public void onStopTrackingTouch(SeekBar sb) {}
                      });
                  }

                  adapter = new TrackAdapter(this, tracks);
                  playlistView.setAdapter(adapter);

                  seekBar.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar sb, int p, boolean fromUser) {
                          if (fromUser && mediaController != null) mediaController.seekTo(p);
                      }
                      @Override public void onStartTrackingTouch(SeekBar sb) {}
                      @Override public void onStopTrackingTouch(SeekBar sb) {}
                  });

                  playlistView.setOnItemClickListener((parent, view, position, id) -> {
                      currentIndex = position;
                      playAt(currentIndex);
                  });

                  findViewById(R.id.btn_select).setOnClickListener(v -> folderPicker.launch(null));
                  btnPlay.setOnClickListener(v -> {
                      if (mediaController == null) return;
                      if (mediaController.isPlaying()) mediaController.pause();
                      else mediaController.play();
                  });
                  findViewById(R.id.btn_prev).setOnClickListener(v -> advanceTrack(-1));
                  findViewById(R.id.btn_next).setOnClickListener(v -> advanceTrack(1));
                  btnShuffle.setOnClickListener(v -> toggleShuffle());
                  btnRepeat.setOnClickListener(v -> cycleRepeat());
                  btnEq.setOnClickListener(v -> {
                      eqVisible = !eqVisible;
                      eqPanel.setVisibility(eqVisible ? View.VISIBLE : View.GONE);
                      btnEq.setTextColor(eqVisible
                          ? android.graphics.Color.parseColor("#00FF00")
                          : android.graphics.Color.WHITE);
                  });

                  // Conectar al servicio
                  SessionToken token = new SessionToken(this,
                      new ComponentName(this, LyraPlaybackService.class));
                  controllerFuture = MediaController.Builder(this, token).buildAsync();
                  controllerFuture.addListener(() -> {
                      try {
                          mediaController = controllerFuture.get();
                          mediaController.addListener(new Player.Listener() {
                              @Override
                              public void onIsPlayingChanged(boolean playing) {
                                  btnPlay.setText(playing ? "⏸" : "▶");
                              }
                              @Override
                              public void onPlaybackStateChanged(int state) {
                                  if (state == Player.STATE_ENDED) advanceTrack(1);
                              }
                          });
                          // Restaurar última carpeta
                          String saved = getSharedPreferences(PREFS, MODE_PRIVATE)
                              .getString(KEY_FOLDER, null);
                          if (saved != null) loadFolder(Uri.parse(saved));
                      } catch (Exception e) {
                          trackTitle.setText("Error al conectar servicio");
                      }
                  }, MoreExecutors.directExecutor());

                  handler.post(updateProgress);
              }

              private void loadFolder(Uri treeUri) {
                  tracks.clear();
                  currentIndex = 0;
                  DocumentFile folder = DocumentFile.fromTreeUri(this, treeUri);
                  if (folder != null) scanFolder(folder);
                  adapter.notifyDataSetChanged();
                  if (!tracks.isEmpty()) {
                      int savedIndex = getSharedPreferences(PREFS, MODE_PRIVATE)
                          .getInt(KEY_INDEX, 0);
                      currentIndex = Math.min(savedIndex, tracks.size() - 1);
                      trackNumber.setText("LIBRERÍA: " + tracks.size() + " pistas");
                      playAt(currentIndex);
                  } else {
                      trackTitle.setText("Sin archivos de audio");
                  }
              }

              private void scanFolder(DocumentFile folder) {
                  for (DocumentFile file : folder.listFiles()) {
                      if (file.isDirectory()) { scanFolder(file); continue; }
                      String name = file.getName();
                      if (name == null) continue;
                      String low = name.toLowerCase();
                      if (!low.endsWith(".mp3") && !low.endsWith(".flac")
                          && !low.endsWith(".m4a") && !low.endsWith(".ogg")) continue;

                      String ext = name.substring(name.lastIndexOf(".") + 1).toUpperCase();
                      String display = name.substring(0, name.lastIndexOf("."));
                      long sizeKb = file.length() / 1024;
                      String meta = ext + " | " + String.format(Locale.US, "%.1f MB", sizeKb / 1024.0);
                      String title = display, artist = "", album = "", duration = "";
                      Bitmap art = null;

                      try {
                          MediaMetadataRetriever mmr = new MediaMetadataRetriever();
                          mmr.setDataSource(getApplicationContext(), file.getUri());
                          String t  = mmr.extractMetadata(MediaMetadataRetriever.METADATA_KEY_TITLE);
                          String ar = mmr.extractMetadata(MediaMetadataRetriever.METADATA_KEY_ARTIST);
                          String al = mmr.extractMetadata(MediaMetadataRetriever.METADATA_KEY_ALBUM);
                          String dur= mmr.extractMetadata(MediaMetadataRetriever.METADATA_KEY_DURATION);
                          String br = mmr.extractMetadata(MediaMetadataRetriever.METADATA_KEY_BITRATE);
                          byte[] artBytes = mmr.getEmbeddedPicture();
                          mmr.release();
                          if (t  != null && !t.isEmpty()) title = t;
                          if (ar != null) artist = ar;
                          if (al != null) album = al;
                          if (dur != null) duration = formatTime(Long.parseLong(dur));
                          if (br != null) {
                              int kbps = Integer.parseInt(br) / 1000;
                              meta = ext + " | " + kbps + " kbps | "
                                  + String.format(Locale.US, "%.1f MB", sizeKb / 1024.0);
                          }
                          if (artBytes != null)
                              art = BitmapFactory.decodeByteArray(artBytes, 0, artBytes.length);
                      } catch (Exception ignored) {}

                      tracks.add(new TrackInfo(MediaItem.fromUri(file.getUri()),
                          title, artist, album, meta, duration, art, file.getUri()));
                  }
              }

              private void playAt(int index) {
                  if (index < 0 || index >= tracks.size() || mediaController == null) return;
                  currentIndex = index;
                  TrackInfo t = tracks.get(index);

                  mediaController.setMediaItem(t.mediaItem);
                  mediaController.prepare();
                  mediaController.play();

                  // Persistir índice
                  getSharedPreferences(PREFS, MODE_PRIVATE).edit()
                      .putInt(KEY_INDEX, index).apply();

                  trackTitle.setText(t.title);
                  trackArtist.setText(t.artist.isEmpty() ? "Artista desconocido" : t.artist);
                  trackAlbum.setText(t.album);
                  trackMeta.setText(t.meta);
                  trackNumber.setText((index + 1) + " / " + tracks.size());
                  timeCurrent.setText("0:00");
                  timeTotal.setText(t.duration.isEmpty() ? "0:00" : t.duration);
                  seekBar.setProgress(0);

                  albumArt.setImageResource(android.R.drawable.ic_media_play);
                  if (t.albumArt != null) albumArt.setImageBitmap(t.albumArt);

                  adapter.setCurrentIndex(index);
                  playlistView.smoothScrollToPosition(index);

                  // Inicializar ecualizador con la sesión de audio
                  try {
                      if (equalizer != null) equalizer.release();
                      int sessionId = ((ExoPlayerWrapper) mediaController).getAudioSessionId();
                      equalizer = new Equalizer(0, sessionId);
                      equalizer.setEnabled(true);
                  } catch (Exception ignored) {}
              }

              private void advanceTrack(int direction) {
                  if (tracks.isEmpty()) return;
                  if (repeatMode == 2) { playAt(currentIndex); return; }
                  int next = currentIndex + direction;
                  if (next >= tracks.size()) next = repeatMode == 1 ? 0 : -1;
                  if (next < 0) next = repeatMode == 1 ? tracks.size() - 1 : -1;
                  if (next >= 0) playAt(next);
              }

              private void toggleShuffle() {
                  isShuffled = !isShuffled;
                  btnShuffle.setTextColor(isShuffled
                      ? android.graphics.Color.parseColor("#00FF00")
                      : android.graphics.Color.parseColor("#555555"));
              }

              private void cycleRepeat() {
                  repeatMode = (repeatMode + 1) % 3;
                  switch (repeatMode) {
                      case 0: btnRepeat.setText("↺"); btnRepeat.setTextColor(android.graphics.Color.parseColor("#555555")); break;
                      case 1: btnRepeat.setText("↺"); btnRepeat.setTextColor(android.graphics.Color.parseColor("#00FF00")); break;
                      case 2: btnRepeat.setText("↻"); btnRepeat.setTextColor(android.graphics.Color.parseColor("#00BFFF")); break;
                  }
              }

              private String formatTime(long ms) {
                  long s = ms / 1000;
                  return String.format(Locale.US, "%d:%02d", s / 60, s % 60);
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  handler.removeCallbacks(updateProgress);
                  if (equalizer != null) equalizer.release();
                  MediaController.releaseFuture(controllerFuture);
              }
          }
          JAVAEOF

          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF

          echo "buildscript { repositories { google(); mavenCentral() } }" > build.gradle

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.0' }
          android {
              namespace 'com.lyra.audiokernel'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audiokernel'
                  minSdk 24
                  targetSdk 34
                  versionCode 3
                  versionName '2.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.documentfile:documentfile:1.0.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.0'
              implementation 'androidx.media3:media3-common:1.2.0'
              implementation 'androidx.media3:media3-session:1.2.0'
              implementation 'com.google.guava:guava:32.1.3-android'
          }
          EOF

      - name: Master Compilation
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Deliver Lyra v2.0 Completo
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-v2-Completo
          path: "app/build/outputs/apk/debug/*.apk"
