name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extraer motor de audio
        run: unzip LyraProject.zip -d .

      - name: Inyectar estructura faltante (Estrategia AEGIS)
        run: |
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:7.4.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilación Maestra (Sistema Gradle)
        run: gradle assembleDebug

      - name: Entrega de Artefacto (APK)
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Audio-Player
          path: app/build/outputs/apk/debug/app-debug.apk

