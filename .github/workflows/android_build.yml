name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar NDK y CMake
        run: |
          sdkmanager "ndk;25.2.9519653"
          sdkmanager "cmake;3.22.1"

      - name: Reconstruir estructura correcta
        run: |
          mkdir -p correct/app/src/main/cpp
          mkdir -p correct/app/src/main/java/com/lyra/audiokernel

          find . -name "MainActivity.java" | head -1 | xargs -I{} cp {} correct/app/src/main/java/com/lyra/audiokernel/
          find . -name "lyra_kernel.cpp" | head -1 | xargs -I{} cp {} correct/app/src/main/cpp/
          find . -name "native-lib.cpp" | head -1 | xargs -I{} cp {} correct/app/src/main/cpp/
          find . -name "CMakeLists.txt" | head -1 | xargs -I{} cp {} correct/app/src/main/cpp/
          find . -name "AndroidManifest.xml" | head -1 | xargs -I{} cp {} correct/app/src/main/
          find . -name "build.gradle" | grep -v "correct" | head -1 | xargs -I{} cp {} correct/app/

          cp -r correct/app .

          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:7.4.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle

      - name: Generar Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=7.6.1
          chmod +x ./gradlew

      - name: Compilar APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Entregar APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Audio-Player
          path: app/build/outputs/apk/debug/app-debug.apk
