name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS TITAN - Infrastructure Assembly
        run: |
          # 1. Protect source code
          SRC_PATH=$(find . -name "src" -type d -not -path "*/app/src/*" | head -n 1)
          if [ -n "$SRC_PATH" ]; then
            mkdir -p ./temp_src
            cp -r "$SRC_PATH"/* ./temp_src/
          fi
          
          # 2. Nuclear wipe of ghost files
          find . -maxdepth 1 -not -name ".github" -not -name "temp_src" -not -name "." -exec rm -rf {} +
          
          # 3. Create Industrial Structure
          mkdir -p app/src
          [ -d "./temp_src" ] && mv ./temp_src/* app/src/
          rm -rf ./temp_src
          
          # 4. Inject Master Settings
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF
          
          # 5. Inject Root Build
          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # 6. Inject App Module
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.lyra.audio'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audio'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          # 7. THE FIX: Inject gradle.properties (The missing piece)
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Master Compilation
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
