name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Structural Alignment
        run: |
          # 1. Limpieza de carpetas fantasma
          find . -name "app" -type d -not -path "./app" -exec rm -rf {} +
          mkdir -p app/src
          
          # 2. Inyectar Settings Root (Inglés Técnico)
          printf "include ':app'\n" > settings.gradle
          
          # 3. Inyectar Build Root (Compatibilidad Total)
          printf "buildscript {\n    repositories { google(); mavenCentral() }\n    dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }\n}\nallprojects {\n    repositories { google(); mavenCentral() }\n}" > build.gradle

          # 4. Inyectar App Module (Reparación de Línea 1)
          printf "apply plugin: 'com.android.application'\n\nandroid {\n    compileSdk 33\n    namespace \"com.lyra.audio\"\n    defaultConfig {\n        applicationId \"com.lyra.audio\"\n        minSdk 21\n        targetSdk 33\n        versionCode 1\n        versionName \"1.0\"\n    }\n}\n\ndependencies {\n    implementation 'androidx.appcompat:appcompat:1.6.1'\n}" > app/build.gradle

      - name: Execute Master Build
        run: |
          # Usamos Java 17 para satisfacer al sistema, pero bajamos Gradle a 7.5 para tu APK
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
