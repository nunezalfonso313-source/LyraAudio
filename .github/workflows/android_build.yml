name: Build Lyra Operative Player
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS - Media Engine Injection
        run: |
          # 1. Purga y Reconstrucción de Rutas
          rm -rf *
          mkdir -p app/src/main/java/com/lyra/audiokernel
          mkdir -p app/src/main/res/layout
          
          # 2. Manifiesto con Permisos de Media
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <application
                  android:allowBackup="true"
                  android:label="Lyra Audio Player"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                  <activity android:name="com.lyra.audiokernel.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 3. Interfaz con Estado de Reproduccion
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:background="#000000"
              android:padding="20dp">
              <TextView
                  android:id="@+id/status_text"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="LYRA SYSTEM READY"
                  android:textColor="#00FF00"
                  android:textSize="22sp"
                  android:layout_marginBottom="40dp"/>
              <Button
                  android:id="@+id/btn_select"
                  android:layout_width="match_parent"
                  android:layout_height="60dp"
                  android:text="SELECCIONAR MUSICA" />
              <Button
                  android:id="@+id/btn_stop"
                  android:layout_width="match_parent"
                  android:layout_height="60dp"
                  android:text="DETENER"
                  android:layout_marginTop="10dp"
                  android:visibility="gone" />
          </LinearLayout>
          EOF

          # 4. MainActivity con Lógica de Reproducción Real
          cat <<EOF > app/src/main/java/com/lyra/audiokernel/MainActivity.java
          package com.lyra.audiokernel;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.View;
          import android.widget.Button;
          import android.widget.TextView;
          import androidx.activity.result.ActivityResultLauncher;
          import androidx.activity.result.contract.ActivityResultContracts;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.media3.common.MediaItem;
          import androidx.media3.exoplayer.ExoPlayer;

          public class MainActivity extends AppCompatActivity {
              private ExoPlayer player;
              private TextView statusText;
              private Button btnStop;

              private final ActivityResultLauncher<Intent> filePickerLauncher = registerForActivityResult(
                  new ActivityResultContracts.StartActivityForResult(),
                  result -> {
                      if (result.getResultCode() == RESULT_OK && result.getData() != null) {
                          Uri uri = result.getData().getData();
                          startPlayback(uri);
                      }
                  }
              );

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  player = new ExoPlayer.Builder(this).build();
                  statusText = findViewById(R.id.status_text);
                  btnStop = findViewById(R.id.btn_stop);
                  Button btnSelect = findViewById(R.id.btn_select);

                  btnSelect.setOnClickListener(v -> {
                      Intent intent = new Intent(Intent.ACTION_OPEN_DOCUMENT);
                      intent.addCategory(Intent.CATEGORY_OPENABLE);
                      intent.setType("audio/*");
                      filePickerLauncher.launch(intent);
                  });

                  btnStop.setOnClickListener(v -> {
                      player.stop();
                      btnStop.setVisibility(View.GONE);
                      statusText.setText("REPRODUCCION DETENIDA");
                  });
              }

              private void startPlayback(Uri uri) {
                  MediaItem mediaItem = MediaItem.fromUri(uri);
                  player.setMediaItem(mediaItem);
                  player.prepare();
                  player.play();
                  statusText.setText("REPRODUCIENDO...");
                  btnStop.setVisibility(View.VISIBLE);
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (player != null) player.release();
              }
          }
          EOF

          # 5. Gradle con dependencias de Media3
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF
          
          echo "buildscript { repositories { google(); mavenCentral() } }" > build.gradle

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.0' }
          android {
              namespace 'com.lyra.audiokernel'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audiokernel'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.0'
              implementation 'androidx.media3:media3-common:1.2.0'
          }
          EOF

      - name: Master Compilation
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Deliver Functional Player
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Operative-Player
          path: "app/build/outputs/apk/debug/*.apk"
