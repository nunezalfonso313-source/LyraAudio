name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Structural Alignment (AEGIS Protocol)
        run: |
          # 1. Limpieza Nuclear de residuos
          find . -name "app" -type d -not -path "./app" -exec rm -rf {} +
          mkdir -p app/src
          
          # 2. Inyectar Settings Root (Mapa Maestro)
          printf "include ':app'\n" > settings.gradle
          
          # 3. Inyectar Build Root (El Cerebro)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 4. Inyectar App Module (Reparación de Línea 1)
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdk 33
              namespace "com.lyra.audio"
              defaultConfig {
                  applicationId "com.lyra.audio"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Execute Master Build
        run: |
          # Forzamos la descarga de Gradle 7.5 (estable) ignorando el 9.3 del sistema
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
