name: Build Lyra Audio Kernel
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS KERNEL - Identity Alignment
        run: |
          # 1. Isolation and Protection
          mkdir -p ./phantom_zone/src/main/java/com/lyra/audiokernel
          
          # 2. Capture Manifest and Java (Ensuring correct package path)
          MANIFEST_FILE=$(find . -name "AndroidManifest.xml" -not -path "*/.github/*" | head -n 1)
          JAVA_FILE=$(find . -name "MainActivity.java" -not -path "./app/*" | head -n 1)
          
          if [ -n "$MANIFEST_FILE" ]; then cp "$MANIFEST_FILE" ./phantom_zone/src/main/; fi
          if [ -n "$JAVA_FILE" ]; then cp "$JAVA_FILE" ./phantom_zone/src/main/java/com/lyra/audiokernel/; fi
          
          # 3. Sanitization: Remove legacy package from XML and set correct name
          sed -i 's/package="[^"]*"//g' ./phantom_zone/src/main/AndroidManifest.xml
          
          # 4. Nuclear Wipe of Root
          find . -maxdepth 1 -not -name ".github" -not -name "phantom_zone" -not -name "." -exec rm -rf {} +
          
          # 5. Restore Industrial Structure
          mkdir -p app
          mv ./phantom_zone/* app/
          rm -rf ./phantom_zone
          
          # 6. Inject Configurations (SYNCED TO AUDIOKERNEL)
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF
          
          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.lyra.audiokernel'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audiokernel'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Master Compilation
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Kernel-V1
          path: "app/build/outputs/apk/debug/*.apk"
