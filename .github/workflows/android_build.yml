name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Overlord Architecture Rebuild
        run: |
          # 1. Search for the source code and protect it
          SRC_PATH=$(find . -name "src" -type d -not -path "*/app/src/*" | head -n 1)
          mkdir -p ./temp_src
          cp -r "$SRC_PATH"/* ./temp_src/
          
          # 2. Wipe everything to avoid "Inception" folders
          find . -maxdepth 1 -not -name ".github" -not -name "temp_src" -not -name "." -exec rm -rf {} +
          
          # 3. Create Industrial Structure
          mkdir -p app/src
          mv ./temp_src/* app/src/
          rm -rf ./temp_src
          
          # 4. Inject Master Settings
          echo "include ':app'" > settings.gradle
          
          # 5. Inject Master Root Build
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 6. Inject Master App Module (The Identity Fix)
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdk 33
              namespace "com.lyra.audio"
              defaultConfig {
                  applicationId "com.lyra.audio"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Force Compilation
        run: |
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Final-Build
          path: "app/build/outputs/apk/debug/*.apk"
