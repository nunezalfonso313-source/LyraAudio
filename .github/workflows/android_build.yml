name: Lyra_v1.8_Industrial

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS_Ignition
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name '.github' -exec rm -rf {} +
          mkdir -p app/src/main/java/com/lyra/audiokernel app/src/main/res/layout app/src/main/res/values
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
          <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>
          <application android:label="Lyra" android:theme="@style/Theme.AppCompat.NoActionBar">
          <activity android:name=".MainActivity" android:exported="true">
          <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
          </activity>
          <service android:name=".LyraPlaybackService" android:foregroundServiceType="mediaPlayback" android:exported="false">
          <intent-filter><action android:name="androidx.media3.session.MediaSessionService"/></intent-filter>
          </service>
          </application></manifest>
          EOF

          cat <<EOF > app/src/main/res/values/styles.xml
          <resources>
          <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.DayNight.NoActionBar"/>
          <style name="NixieDigit"><item name="android:textColor">#FF8800</item><item name="android:textSize">34sp</item><item name="android:fontFamily">monospace</item></style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <androidx.coordinatorlayout.widget.CoordinatorLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#050505">
          <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical">
          <LinearLayout android:id="@+id/panel" android:layout_width="match_parent" android:layout_height="120dp" android:background="#111">
          <com.lyra.audiokernel.VUMeterView android:id="@+id/vu_left" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
          </LinearLayout>
          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="20dp" android:gravity="center">
          <TextView android:id="@+id/nixie_m1" style="@style/NixieDigit" android:text="0"/><TextView android:id="@+id/nixie_m2" style="@style/NixieDigit" android:text="0"/>
          <TextView style="@style/NixieDigit" android:text=":"/><TextView android:id="@+id/nixie_s1" style="@style/NixieDigit" android:text="0"/>
          <TextView android:id="@+id/nixie_s2" style="@style/NixieDigit" android:text="0"/>
          </LinearLayout>
          <Button android:id="@+id/btn_play" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="PLAY" android:layout_gravity="center"/>
          </LinearLayout></androidx.coordinatorlayout.widget.CoordinatorLayout>
          EOF

          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/VUMeterView.java
          package com.lyra.audiokernel;
          import android.content.Context;import android.graphics.*;import android.util.AttributeSet;import android.view.View;
          public class VUMeterView extends View {
          private float level=0;private Paint p=new Paint(1);
          public VUMeterView(Context c,AttributeSet a){super(c,a);p.setColor(0xFFFFBB00);p.setStrokeWidth(6);}
          public void setLevel(float l){level=l;invalidate();}
          protected void onDraw(Canvas c){c.drawLine(getWidth()/2f,getHeight(),getWidth()/2f+(level*100),0,p);}}
          JAVAEOF

          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/LyraPlaybackService.java
          package com.lyra.audiokernel;
          import androidx.media3.exoplayer.ExoPlayer;import androidx.media3.session.*;
          public class LyraPlaybackService extends MediaSessionService {
          private MediaSession s;private ExoPlayer p;
          public void onCreate(){super.onCreate();p=new ExoPlayer.Builder(this).build();s=new MediaSession.Builder(this,p).build();}
          public MediaSession onGetSession(MediaSession.ControllerInfo c){return s;}
          public void onDestroy(){p.release();s.release();super.onDestroy();}}
          JAVAEOF

          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/MainActivity.java
          package com.lyra.audiokernel;
          import android.os.*;import android.widget.*;import androidx.appcompat.app.AppCompatActivity;import androidx.media3.session.*;import com.google.common.util.concurrent.*;
          public class MainActivity extends AppCompatActivity {
          protected void onCreate(Bundle b){super.onCreate(b);setContentView(R.layout.activity_main);
          SessionToken t=new SessionToken(this,new android.content.ComponentName(this,LyraPlaybackService.class));
          new MediaController.Builder(this,t).buildAsync();}
          }
          JAVAEOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.0' }
          android { namespace 'com.lyra.audiokernel'; compileSdk 34; defaultConfig { applicationId 'com.lyra.audiokernel'; minSdk 24; targetSdk 34; versionCode 10; versionName '1.8' } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'; implementation 'androidx.media3:media3-exoplayer:1.2.0'; implementation 'androidx.media3:media3-common:1.2.0'; implementation 'androidx.media3:media3-session:1.2.0'; implementation 'com.google.guava:guava:32.1.3-android' }
          EOF

          echo "include ':app'" > settings.gradle
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: Lyra-v1.8-Industrial
          path: "app/build/outputs/apk/debug/*.apk"
