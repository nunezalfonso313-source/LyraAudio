name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS NEUTRON - Manifest Sanitization
        run: |
          # 1. Isolation Zone
          mkdir -p ./phantom_zone/src/main/java
          
          # 2. Find and Capture Manifest
          MANIFEST_FILE=$(find . -name "AndroidManifest.xml" -not -path "*/.github/*" | head -n 1)
          if [ -n "$MANIFEST_FILE" ]; then
            cp "$MANIFEST_FILE" ./phantom_zone/src/main/
          else
            echo "FATAL: AndroidManifest.xml missing!" && exit 1
          fi
          
          # 3. CLEANING: Remove the legacy 'package' attribute to avoid conflict
          # This is the "Neutron" fix
          sed -i 's/package="[^"]*"//g' ./phantom_zone/src/main/AndroidManifest.xml
          
          # 4. Find and Capture Java Source
          JAVA_DIR=$(find . -name "java" -type d -not -path "./app/*" -not -path "./phantom_zone/*" | head -n 1)
          if [ -n "$JAVA_DIR" ]; then
            cp -r "$JAVA_DIR"/* ./phantom_zone/src/main/java/
          fi
          
          # 5. Nuclear Wipe & Restore
          find . -maxdepth 1 -not -name ".github" -not -name "phantom_zone" -not -name "." -exec rm -rf {} +
          mkdir -p app
          mv ./phantom_zone/* app/
          rm -rf ./phantom_zone
          
          # 6. Inject Master Configurations
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF
          
          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.lyra.audio'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lyra.audio'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Master Compilation
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Final-APK
          path: "app/build/outputs/apk/debug/*.apk"
