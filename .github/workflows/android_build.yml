
name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar NDK y CMake
        run: |
          sdkmanager "ndk;25.2.9519653"
          sdkmanager "cmake;3.22.1"

      - name: Inyectar archivos raiz
        run: |
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:7.4.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle

      - name: Generar Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=7.6.1
          chmod +x ./gradlew

      - name: Diagnostico archivos
        run: |
          echo "=== settings.gradle ==="
          cat settings.gradle
          echo "=== build.gradle raiz ==="
          cat build.gradle
          echo "=== app/build.gradle ==="
          cat app/build.gradle

      - name: Compilar APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Entregar APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyra-Audio-Player
          path: app/build/outputs/apk/debug/app-debug.apk
