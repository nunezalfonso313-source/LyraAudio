name: Build Lyra KERNEL v1.7
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS - v1.7 KERNEL — Nixie + VU Meters + Spectrum FFT
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name '.github' -exec rm -rf {} +
          mkdir -p app/src/main/java/com/lyra/audiokernel
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          # ─────────────────────────────────────────────
          # AndroidManifest.xml
          # ─────────────────────────────────────────────
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <application
                  android:allowBackup="true"
                  android:label="Lyra Player"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name="com.lyra.audiokernel.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name="com.lyra.audiokernel.LyraPlaybackService"
                      android:foregroundServiceType="mediaPlayback"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="androidx.media3.session.MediaSessionService" />
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          # ─────────────────────────────────────────────
          # activity_main.xml — layout con Nixie + VU + Spectrum
          # ─────────────────────────────────────────────
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.coordinatorlayout.widget.CoordinatorLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#0A0A0A">
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical">

                  <!-- ── HEADER: album art + track info ── -->
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:padding="12dp"
                      android:background="#111111">
                      <ImageView
                          android:id="@+id/album_art"
                          android:layout_width="80dp"
                          android:layout_height="80dp"
                          android:scaleType="centerCrop"
                          android:background="#222222"
                          android:src="@android:drawable/ic_media_play"/>
                      <LinearLayout
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:orientation="vertical"
                          android:paddingStart="12dp"
                          android:gravity="center_vertical">
                          <TextView
                              android:id="@+id/track_title"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="Cargando biblioteca..."
                              android:textColor="#FFFFFF"
                              android:textSize="15sp"
                              android:textStyle="bold"
                              android:ellipsize="marquee"
                              android:singleLine="true"/>
                          <TextView
                              android:id="@+id/track_artist"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text=""
                              android:textColor="#00BFFF"
                              android:textSize="13sp"
                              android:ellipsize="end"
                              android:singleLine="true"/>
                          <TextView
                              android:id="@+id/track_album"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text=""
                              android:textColor="#888888"
                              android:textSize="12sp"
                              android:ellipsize="end"
                              android:singleLine="true"/>
                          <TextView
                              android:id="@+id/track_meta"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text=""
                              android:textColor="#00FF00"
                              android:textSize="11sp"/>
                      </LinearLayout>
                  </LinearLayout>

                  <!-- ── VU METERS duales L/R ── -->
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="72dp"
                      android:orientation="horizontal"
                      android:background="#0D0D0D"
                      android:paddingStart="8dp"
                      android:paddingEnd="8dp"
                      android:paddingTop="6dp"
                      android:paddingBottom="4dp">
                      <com.lyra.audiokernel.VUMeterView
                          android:id="@+id/vu_left"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:layout_marginEnd="4dp"/>
                      <com.lyra.audiokernel.VUMeterView
                          android:id="@+id/vu_right"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:layout_marginStart="4dp"/>
                  </LinearLayout>

                  <!-- ── NIXIE DISPLAY: TRACK TIME ── -->
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"
                      android:background="#0A0A0A"
                      android:paddingTop="4dp"
                      android:paddingBottom="2dp"
                      android:gravity="center_horizontal">
                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="TRACK TIME"
                          android:textColor="#444444"
                          android:textSize="9sp"
                          android:letterSpacing="0.2"/>
                      <com.lyra.audiokernel.NixieDisplayView
                          android:id="@+id/nixie_display"
                          android:layout_width="wrap_content"
                          android:layout_height="56dp"
                          android:layout_marginTop="2dp"/>
                  </LinearLayout>

                  <!-- ── SEEKBAR + TIEMPOS ── -->
                  <SeekBar
                      android:id="@+id/seek_bar"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:paddingStart="12dp"
                      android:paddingEnd="12dp"
                      android:progressTint="#00BFFF"
                      android:thumbTint="#00BFFF"/>
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:paddingStart="16dp"
                      android:paddingEnd="16dp"
                      android:paddingBottom="4dp">
                      <TextView
                          android:id="@+id/time_current"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="0:00"
                          android:textColor="#00FF00"
                          android:textSize="11sp"/>
                      <TextView
                          android:id="@+id/track_number"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text=""
                          android:textColor="#555555"
                          android:textSize="11sp"
                          android:gravity="center"/>
                      <TextView
                          android:id="@+id/time_total"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="0:00"
                          android:textColor="#00FF00"
                          android:textSize="11sp"
                          android:gravity="end"/>
                  </LinearLayout>

                  <!-- ── CONTROLES DE TRANSPORTE ── -->
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="56dp"
                      android:orientation="horizontal"
                      android:background="#0D0D0D"
                      android:gravity="center_vertical">
                      <Button
                          android:id="@+id/btn_shuffle"
                          android:layout_width="0dp"
                          android:layout_height="40dp"
                          android:layout_weight="1"
                          android:layout_margin="4dp"
                          android:text="⇀"
                          android:textSize="18sp"
                          android:textColor="#555555"
                          android:background="@android:color/transparent"
                          android:padding="0dp"/>
                      <Button
                          android:id="@+id/btn_prev"
                          android:layout_width="0dp"
                          android:layout_height="40dp"
                          android:layout_weight="1"
                          android:layout_margin="4dp"
                          android:text="⏮"
                          android:textSize="18sp"
                          android:textColor="#FFFFFF"
                          android:background="@android:color/transparent"
                          android:padding="0dp"/>
                      <Button
                          android:id="@+id/btn_play"
                          android:layout_width="0dp"
                          android:layout_height="44dp"
                          android:layout_weight="1.2"
                          android:layout_margin="4dp"
                          android:text="▶"
                          android:textSize="22sp"
                          android:textColor="#00FF00"
                          android:background="@android:color/transparent"
                          android:padding="0dp"/>
                      <Button
                          android:id="@+id/btn_next"
                          android:layout_width="0dp"
                          android:layout_height="40dp"
                          android:layout_weight="1"
                          android:layout_margin="4dp"
                          android:text="⏭"
                          android:textSize="18sp"
                          android:textColor="#FFFFFF"
                          android:background="@android:color/transparent"
                          android:padding="0dp"/>
                      <Button
                          android:id="@+id/btn_repeat"
                          android:layout_width="0dp"
                          android:layout_height="40dp"
                          android:layout_weight="1"
                          android:layout_margin="4dp"
                          android:text="↺"
                          android:textSize="18sp"
                          android:textColor="#555555"
                          android:background="@android:color/transparent"
                          android:padding="0dp"/>
                  </LinearLayout>

                  <!-- ── SPECTRUM ANALYZER ── -->
                  <com.lyra.audiokernel.SpectrumView
                      android:id="@+id/spectrum_view"
                      android:layout_width="match_parent"
                      android:layout_height="80dp"
                      android:background="#080808"/>

                  <!-- ── EQ PANEL (colapsable) ── -->
                  <LinearLayout
                      android:id="@+id/eq_panel"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"
                      android:background="#0D0D0D"
                      android:paddingStart="12dp"
                      android:paddingEnd="12dp"
                      android:paddingBottom="8dp"
                      android:visibility="gone">
                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="horizontal"
                          android:paddingTop="6dp"
                          android:paddingBottom="2dp">
                          <TextView
                              android:layout_width="0dp"
                              android:layout_height="wrap_content"
                              android:layout_weight="1"
                              android:text="ECUALIZADOR"
                              android:textColor="#444444"
                              android:textSize="10sp"
                              android:letterSpacing="0.15"/>
                          <Button
                              android:id="@+id/btn_eq_reset"
                              android:layout_width="wrap_content"
                              android:layout_height="24dp"
                              android:text="RESET"
                              android:textSize="10sp"
                              android:textColor="#555555"
                              android:background="@android:color/transparent"
                              android:padding="0dp"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="36dp" android:orientation="horizontal" android:gravity="center_vertical">
                          <TextView android:id="@+id/eq_label0" android:layout_width="44dp" android:layout_height="wrap_content" android:text="--" android:textColor="#555555" android:textSize="10sp"/>
                          <SeekBar android:id="@+id/eq_band0" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:max="20" android:progress="10" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                          <TextView android:id="@+id/eq_val0" android:layout_width="36dp" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp" android:gravity="end"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="36dp" android:orientation="horizontal" android:gravity="center_vertical">
                          <TextView android:id="@+id/eq_label1" android:layout_width="44dp" android:layout_height="wrap_content" android:text="--" android:textColor="#555555" android:textSize="10sp"/>
                          <SeekBar android:id="@+id/eq_band1" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:max="20" android:progress="10" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                          <TextView android:id="@+id/eq_val1" android:layout_width="36dp" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp" android:gravity="end"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="36dp" android:orientation="horizontal" android:gravity="center_vertical">
                          <TextView android:id="@+id/eq_label2" android:layout_width="44dp" android:layout_height="wrap_content" android:text="--" android:textColor="#555555" android:textSize="10sp"/>
                          <SeekBar android:id="@+id/eq_band2" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:max="20" android:progress="10" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                          <TextView android:id="@+id/eq_val2" android:layout_width="36dp" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp" android:gravity="end"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="36dp" android:orientation="horizontal" android:gravity="center_vertical">
                          <TextView android:id="@+id/eq_label3" android:layout_width="44dp" android:layout_height="wrap_content" android:text="--" android:textColor="#555555" android:textSize="10sp"/>
                          <SeekBar android:id="@+id/eq_band3" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:max="20" android:progress="10" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                          <TextView android:id="@+id/eq_val3" android:layout_width="36dp" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp" android:gravity="end"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="match_parent" android:layout_height="36dp" android:orientation="horizontal" android:gravity="center_vertical">
                          <TextView android:id="@+id/eq_label4" android:layout_width="44dp" android:layout_height="wrap_content" android:text="--" android:textColor="#555555" android:textSize="10sp"/>
                          <SeekBar android:id="@+id/eq_band4" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:max="20" android:progress="10" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                          <TextView android:id="@+id/eq_val4" android:layout_width="36dp" android:layout_height="wrap_content" android:text="0dB" android:textColor="#00FF00" android:textSize="10sp" android:gravity="end"/>
                      </LinearLayout>
                  </LinearLayout>

                  <!-- ── BOTONES DE CONTROL ── -->
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:paddingStart="12dp"
                      android:paddingEnd="12dp"
                      android:paddingTop="4dp"
                      android:paddingBottom="2dp">
                      <Button
                          android:id="@+id/btn_eq"
                          android:layout_width="0dp"
                          android:layout_weight="1"
                          android:layout_height="36dp"
                          android:layout_marginEnd="4dp"
                          android:text="🎚 EQ"
                          android:textColor="#FFFFFF"
                          android:textSize="11sp"
                          android:backgroundTint="#1A1A1A"/>
                      <Button
                          android:id="@+id/btn_sort"
                          android:layout_width="0dp"
                          android:layout_weight="1"
                          android:layout_height="36dp"
                          android:layout_marginStart="4dp"
                          android:layout_marginEnd="4dp"
                          android:text="AZ TÍTULO"
                          android:textColor="#FFFFFF"
                          android:textSize="11sp"
                          android:backgroundTint="#1A1A1A"/>
                      <Button
                          android:id="@+id/btn_search"
                          android:layout_width="0dp"
                          android:layout_weight="1"
                          android:layout_height="36dp"
                          android:layout_marginStart="4dp"
                          android:layout_marginEnd="4dp"
                          android:text="🔍"
                          android:textColor="#FFFFFF"
                          android:textSize="16sp"
                          android:backgroundTint="#1A1A1A"/>
                      <Button
                          android:id="@+id/btn_playlists"
                          android:layout_width="0dp"
                          android:layout_weight="1"
                          android:layout_height="36dp"
                          android:layout_marginStart="4dp"
                          android:text="≡ PL"
                          android:textColor="#FFFFFF"
                          android:textSize="11sp"
                          android:backgroundTint="#1A1A1A"/>
                  </LinearLayout>

                  <!-- ── SEARCH BAR ── -->
                  <LinearLayout
                      android:id="@+id/search_bar"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:paddingStart="12dp"
                      android:paddingEnd="12dp"
                      android:paddingBottom="4dp"
                      android:visibility="gone">
                      <EditText
                          android:id="@+id/search_input"
                          android:layout_width="0dp"
                          android:layout_height="36dp"
                          android:layout_weight="1"
                          android:background="#1A1A1A"
                          android:textColor="#FFFFFF"
                          android:textColorHint="#555555"
                          android:hint="Buscar título o artista..."
                          android:textSize="13sp"
                          android:paddingStart="12dp"
                          android:paddingEnd="12dp"
                          android:inputType="text"
                          android:imeOptions="actionSearch"
                          android:singleLine="true"/>
                      <Button
                          android:id="@+id/btn_search_clear"
                          android:layout_width="36dp"
                          android:layout_height="36dp"
                          android:text="✕"
                          android:textColor="#555555"
                          android:textSize="14sp"
                          android:background="@android:color/transparent"
                          android:padding="0dp"/>
                  </LinearLayout>

                  <!-- ── LIBRARY LABEL ── -->
                  <TextView
                      android:id="@+id/library_label"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="LISTA DE REPRODUCCIÓN"
                      android:textColor="#444444"
                      android:textSize="10sp"
                      android:paddingStart="16dp"
                      android:paddingTop="4dp"
                      android:paddingBottom="4dp"
                      android:letterSpacing="0.15"/>

                  <!-- ── TRACK LIST ── -->
                  <ListView
                      android:id="@+id/playlist_view"
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:layout_weight="1"
                      android:divider="#1A1A1A"
                      android:dividerHeight="1dp"
                      android:scrollbars="none"/>
              </LinearLayout>

              <!-- ── PLAYLIST DRAWER SCRIM ── -->
              <LinearLayout
                  android:id="@+id/pl_scrim"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:background="#99000000"
                  android:visibility="gone"
                  android:orientation="vertical"/>

              <!-- ── PLAYLIST DRAWER ── -->
              <LinearLayout
                  android:id="@+id/pl_drawer"
                  android:layout_width="match_parent"
                  android:layout_height="480dp"
                  android:layout_gravity="bottom"
                  android:orientation="vertical"
                  android:background="#111111"
                  android:visibility="gone"
                  android:elevation="16dp">
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="48dp"
                      android:orientation="horizontal"
                      android:paddingStart="16dp"
                      android:paddingEnd="8dp"
                      android:gravity="center_vertical"
                      android:background="#161616">
                      <TextView
                          android:id="@+id/pl_drawer_title"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="PLAYLISTS"
                          android:textColor="#FFFFFF"
                          android:textSize="13sp"
                          android:textStyle="bold"
                          android:letterSpacing="0.1"/>
                      <Button
                          android:id="@+id/btn_pl_new"
                          android:layout_width="wrap_content"
                          android:layout_height="32dp"
                          android:text="+ NUEVA"
                          android:textSize="11sp"
                          android:textColor="#000000"
                          android:backgroundTint="#00FF00"
                          android:paddingStart="12dp"
                          android:paddingEnd="12dp"/>
                      <Button
                          android:id="@+id/btn_pl_close"
                          android:layout_width="40dp"
                          android:layout_height="40dp"
                          android:text="✕"
                          android:textColor="#555555"
                          android:textSize="16sp"
                          android:background="@android:color/transparent"
                          android:padding="0dp"/>
                  </LinearLayout>
                  <LinearLayout
                      android:id="@+id/pl_name_bar"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:paddingStart="12dp"
                      android:paddingEnd="12dp"
                      android:paddingTop="8dp"
                      android:paddingBottom="8dp"
                      android:background="#0D0D0D"
                      android:visibility="gone">
                      <EditText
                          android:id="@+id/pl_name_input"
                          android:layout_width="0dp"
                          android:layout_height="36dp"
                          android:layout_weight="1"
                          android:background="#1A1A1A"
                          android:textColor="#FFFFFF"
                          android:textColorHint="#555555"
                          android:hint="Nombre de la playlist..."
                          android:textSize="13sp"
                          android:paddingStart="12dp"
                          android:paddingEnd="12dp"
                          android:inputType="text"
                          android:singleLine="true"/>
                      <Button
                          android:id="@+id/btn_pl_save"
                          android:layout_width="wrap_content"
                          android:layout_height="36dp"
                          android:text="GUARDAR"
                          android:textSize="11sp"
                          android:textColor="#000000"
                          android:backgroundTint="#00BFFF"
                          android:layout_marginStart="8dp"
                          android:paddingStart="12dp"
                          android:paddingEnd="12dp"/>
                  </LinearLayout>
                  <ListView
                      android:id="@+id/pl_list"
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:layout_weight="1"
                      android:divider="#1A1A1A"
                      android:dividerHeight="1dp"
                      android:scrollbars="none"/>
              </LinearLayout>
          </androidx.coordinatorlayout.widget.CoordinatorLayout>
          EOF

          # ─────────────────────────────────────────────
          # item_track.xml
          # ─────────────────────────────────────────────
          cat <<'EOF' > app/src/main/res/layout/item_track.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="56dp"
              android:orientation="horizontal"
              android:paddingStart="16dp"
              android:paddingEnd="16dp"
              android:gravity="center_vertical"
              android:background="@android:color/transparent"
              android:descendantFocusability="blocksDescendants">
              <TextView
                  android:id="@+id/item_number"
                  android:layout_width="28dp"
                  android:layout_height="wrap_content"
                  android:text="1"
                  android:textColor="#444444"
                  android:textSize="12sp"
                  android:gravity="center"/>
              <LinearLayout
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:layout_weight="1"
                  android:orientation="vertical"
                  android:paddingStart="8dp">
                  <TextView
                      android:id="@+id/item_title"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Título"
                      android:textColor="#FFFFFF"
                      android:textSize="14sp"
                      android:ellipsize="end"
                      android:singleLine="true"/>
                  <TextView
                      android:id="@+id/item_artist"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text=""
                      android:textColor="#666666"
                      android:textSize="12sp"
