          # VUMeterView.java
          # VU Meter analógico (aguja + escala) con datos PCM del Visualizer
          # ─────────────────────────────────────────────
          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/VUMeterView.java
          package com.lyra.audiokernel;

          import android.content.Context;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.LinearGradient;
          import android.graphics.Paint;
          import android.graphics.Path;
          import android.graphics.RectF;
          import android.graphics.Shader;
          import android.util.AttributeSet;
          import android.view.View;

          public class VUMeterView extends View {

              private Paint bgPaint, borderPaint, scalePaint, needlePaint,
                            needleShadowPaint, labelPaint, peakPaint, redZonePaint;

              // Nivel actual normalizado [0.0 - 1.0], 0.0 = -20dB, 1.0 = +3dB
              private float level = 0f;
              // Peak hold
              private float peakLevel = 0f;
              private long peakHoldMs = 0;
              private static final long PEAK_HOLD_DURATION = 1500;
              private static final float PEAK_DECAY = 0.002f;

              // Suavizado de aguja
              private float displayLevel = 0f;
              private static final float ATTACK  = 0.35f;
              private static final float RELEASE = 0.08f;

              // Etiqueta del canal
              private String channelLabel = "L";

              public VUMeterView(Context context) { super(context); init(); }
              public VUMeterView(Context context, AttributeSet attrs) { super(context, attrs); init(); }
              public VUMeterView(Context context, AttributeSet attrs, int def) { super(context, attrs, def); init(); }

              private void init() {
                  setLayerType(LAYER_TYPE_SOFTWARE, null);

                  bgPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  bgPaint.setColor(Color.parseColor("#1A1000"));

                  borderPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  borderPaint.setColor(Color.parseColor("#444422"));
                  borderPaint.setStyle(Paint.Style.STROKE);
                  borderPaint.setStrokeWidth(1.5f);

                  scalePaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  scalePaint.setColor(Color.parseColor("#888855"));
                  scalePaint.setStrokeWidth(1f);
                  scalePaint.setStyle(Paint.Style.STROKE);

                  needlePaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  needlePaint.setColor(Color.parseColor("#DDDDCC"));
                  needlePaint.setStrokeWidth(1.8f);
                  needlePaint.setStyle(Paint.Style.STROKE);
                  needlePaint.setShadowLayer(4f, 0f, 1f, Color.parseColor("#FFAA00"));

                  needleShadowPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  needleShadowPaint.setColor(Color.parseColor("#44000000"));
                  needleShadowPaint.setStrokeWidth(3f);
                  needleShadowPaint.setStyle(Paint.Style.STROKE);

                  labelPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  labelPaint.setColor(Color.parseColor("#FFAA00"));
                  labelPaint.setTextSize(9f);
                  labelPaint.setTextAlign(Paint.Align.CENTER);

                  peakPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  peakPaint.setColor(Color.parseColor("#FFDD00"));
                  peakPaint.setStrokeWidth(2f);
                  peakPaint.setStyle(Paint.Style.STROKE);

                  redZonePaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  redZonePaint.setStyle(Paint.Style.FILL);
              }

              /**
               * Actualiza el nivel del VU meter.
               * @param rms valor RMS normalizado [0.0 - 1.0]
               */
              public void setLevel(float rms) {
                  level = Math.max(0f, Math.min(1f, rms));
                  // Suavizado attack/release
                  if (level > displayLevel) {
                      displayLevel += (level - displayLevel) * ATTACK;
                  } else {
                      displayLevel += (level - displayLevel) * RELEASE;
                  }
                  // Peak hold
                  long now = System.currentTimeMillis();
                  if (displayLevel >= peakLevel) {
                      peakLevel = displayLevel;
                      peakHoldMs = now;
                  } else if (now - peakHoldMs > PEAK_HOLD_DURATION) {
                      peakLevel = Math.max(0f, peakLevel - PEAK_DECAY);
                  }
                  invalidate();
              }

              public void setChannelLabel(String label) { channelLabel = label; }

              @Override
              protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  int w = getWidth();
                  int h = getHeight();
                  float pad = 4f;

                  // Fondo
                  RectF bg = new RectF(pad, pad, w - pad, h - pad);
                  canvas.drawRoundRect(bg, 6f, 6f, bgPaint);
                  canvas.drawRoundRect(bg, 6f, 6f, borderPaint);

                  // Centro del arco de la aguja (parte inferior)
                  float cx = w / 2f;
                  float cy = h + h * 0.3f; // centro fuera de la vista, para arco amplio
                  float radius = h * 1.1f;

                  // Arco de la escala: -60° a +60° (izq a der), siendo 0° = centro
                  // Mapeamos nivel [0,1] → ángulo [-55°, +55°]
                  float startAngle = -55f;
                  float endAngle   = +55f;

                  // Zona roja (>= 0.85 nivel)
                  float redStart = startAngle + (endAngle - startAngle) * 0.85f;
                  Paint redArc = new Paint(Paint.ANTI_ALIAS_FLAG);
                  redArc.setColor(Color.parseColor("#330000"));
                  redArc.setStyle(Paint.Style.STROKE);
                  redArc.setStrokeWidth(6f);
                  RectF arcRect = new RectF(cx - radius, cy - radius, cx + radius, cy + radius);
                  // Convertir a coordenadas standard de drawArc (0=right, 90=down)
                  float arcOffsetDeg = 270f; // apunta hacia arriba
                  canvas.drawArc(arcRect,
                      arcOffsetDeg + redStart, endAngle - redStart, false, redArc);

                  // Marcas de escala
                  float[] markLevels = {0f, 0.2f, 0.4f, 0.6f, 0.75f, 0.85f, 1.0f};
                  String[] markLabels = {"-20", "-10", "-5", "-2", "-1", "0", "+3"};
                  for (int i = 0; i < markLevels.length; i++) {
                      float angleDeg = startAngle + (endAngle - startAngle) * markLevels[i];
                      float angleRad = (float) Math.toRadians(angleDeg - 90f);
                      float mx = cx + radius * (float) Math.cos(angleRad);
                      float my = cy + radius * (float) Math.sin(angleRad);
                      float mx2 = cx + (radius - 8f) * (float) Math.cos(angleRad);
                      float my2 = cy + (radius - 8f) * (float) Math.sin(angleRad);
                      if (mx >= pad && mx <= w - pad && my >= pad && my <= h - pad) {
                          canvas.drawLine(mx, my, mx2, my2, scalePaint);
                      }
                      // Label
                      float lx = cx + (radius - 16f) * (float) Math.cos(angleRad);
                      float ly = cy + (radius - 16f) * (float) Math.sin(angleRad);
                      if (lx >= pad + 4 && lx <= w - pad - 4 && ly >= pad + 6 && ly <= h - pad) {
                          canvas.drawText(markLabels[i], lx, ly, labelPaint);
                      }
                  }

                  // Aguja — Peak hold
                  float peakAngleDeg = startAngle + (endAngle - startAngle) * peakLevel;
                  float peakRad = (float) Math.toRadians(peakAngleDeg - 90f);
                  float pkx = cx + (radius - 4f) * (float) Math.cos(peakRad);
                  float pky = cy + (radius - 4f) * (float) Math.sin(peakRad);
                  if (pkx >= pad && pkx <= w - pad && pky >= pad && pky <= h - pad) {
                      canvas.drawLine(cx, cy, pkx, pky, peakPaint);
                  }

                  // Aguja principal
                  float needleAngleDeg = startAngle + (endAngle - startAngle) * displayLevel;
                  float needleRad = (float) Math.toRadians(needleAngleDeg - 90f);
                  float nx = cx + (radius - 2f) * (float) Math.cos(needleRad);
                  float ny = cy + (radius - 2f) * (float) Math.sin(needleRad);

                  // Sombra de aguja
                  float snx = cx + (radius - 2f) * (float) Math.cos(needleRad + 0.03f);
                  float sny = cy + (radius - 2f) * (float) Math.sin(needleRad + 0.03f);
                  if (snx >= pad && snx <= w - pad) canvas.drawLine(cx, cy, snx, sny, needleShadowPaint);

                  if (nx >= pad && nx <= w - pad && ny >= pad && ny <= h - pad) {
                      canvas.drawLine(cx, cy, nx, ny, needlePaint);
                  }

                  // Pivot circle
                  Paint pivotPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  pivotPaint.setColor(Color.parseColor("#CCAA44"));
                  pivotPaint.setStyle(Paint.Style.FILL);
                  canvas.drawCircle(cx, cy, 4f, pivotPaint);

                  // Label "VU" y canal
                  Paint vuLabel = new Paint(Paint.ANTI_ALIAS_FLAG);
                  vuLabel.setColor(Color.parseColor("#FFAA00"));
                  vuLabel.setTextSize(11f);
                  vuLabel.setTextAlign(Paint.Align.CENTER);
                  canvas.drawText("VU  " + channelLabel, cx, h - 6f, vuLabel);
              }
          }
          JAVAEOF

          # ─────────────────────────────────────────────
          # SpectrumView.java
          # Spectrum analyzer FFT — barras verticales cyan/green
          # ─────────────────────────────────────────────
          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/SpectrumView.java
          package com.lyra.audiokernel;

          import android.content.Context;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.LinearGradient;
          import android.graphics.Paint;
          import android.graphics.RectF;
          import android.graphics.Shader;
          import android.util.AttributeSet;
          import android.view.View;

          public class SpectrumView extends View {

              // 12 bandas: FZ, 50, 100, 150, 200, 400, 1K, 2K, 5K, 8K, 10K, 12K
              private static final int BAND_COUNT = 12;
              private static final String[] BAND_LABELS = {
                  "FZ", "50", "100", "150", "200", "400", "1K", "2K", "5K", "8K", "10K", "12K"
              };

              // Nivel de cada banda [0.0-1.0]
              private float[] bands = new float[BAND_COUNT];
              // Peak hold por banda
              private float[] peaks = new float[BAND_COUNT];
              private long[] peakTimes = new long[BAND_COUNT];
              private static final long PEAK_HOLD = 1200;
              private static final float PEAK_DECAY = 0.003f;
              private static final float SMOOTHING = 0.25f;

              private Paint barPaint;
              private Paint peakPaint;
              private Paint labelPaint;
              private Paint gridPaint;
              private Paint bgPaint;

              // Gradiente por columna (se recalcula en onSizeChanged)
              private LinearGradient barGradient;

              public SpectrumView(Context context) { super(context); init(); }
              public SpectrumView(Context context, AttributeSet attrs) { super(context, attrs); init(); }
              public SpectrumView(Context context, AttributeSet attrs, int def) { super(context, attrs, def); init(); }

              private void init() {
                  setLayerType(LAYER_TYPE_SOFTWARE, null);

                  barPaint = new Paint(Paint.ANTI_ALIAS_FLAG);

                  peakPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  peakPaint.setColor(Color.parseColor("#00FF88"));
                  peakPaint.setStyle(Paint.Style.FILL);
                  peakPaint.setShadowLayer(4f, 0f, 0f, Color.parseColor("#00FF88"));

                  labelPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  labelPaint.setColor(Color.parseColor("#334444"));
                  labelPaint.setTextSize(8f);
                  labelPaint.setTextAlign(Paint.Align.CENTER);

                  gridPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  gridPaint.setColor(Color.parseColor("#111A1A"));
                  gridPaint.setStyle(Paint.Style.STROKE);
                  gridPaint.setStrokeWidth(0.5f);

                  bgPaint = new Paint();
                  bgPaint.setColor(Color.parseColor("#080808"));
              }

              @Override
              protected void onSizeChanged(int w, int h, int oldW, int oldH) {
                  super.onSizeChanged(w, h, oldW, oldH);
                  // Gradiente: verde abajo → cyan arriba
                  barGradient = new LinearGradient(
                      0, h, 0, 0,
                      new int[]{
                          Color.parseColor("#004466"),
                          Color.parseColor("#006688"),
                          Color.parseColor("#00AAAA"),
                          Color.parseColor("#00FFCC")
                      },
                      new float[]{0f, 0.4f, 0.75f, 1.0f},
                      Shader.TileMode.CLAMP
                  );
                  barPaint.setShader(barGradient);
              }

              /**
               * Actualiza los niveles de las bandas desde datos FFT.
               * @param fftData byte[] del Visualizer.OnDataCaptureListener
               * @param captureSize tamaño del FFT (típicamente 512)
               */
              public void updateFromFFT(byte[] fftData, int captureSize) {
                  if (fftData == null || fftData.length == 0) return;

                  // Mapeo de bins FFT a las 12 bandas del display
                  // captureSize/2 = número de bins reales
                  int bins = captureSize / 2;
                  // Límites de bins para cada banda (aproximado, 44100Hz sample rate)
                  int[] binLimits = {1, 2, 4, 6, 8, 16, 40, 80, 200, 320, 400, bins - 1};

                  float[] newBands = new float[BAND_COUNT];
                  int prevLimit = 0;
                  for (int b = 0; b < BAND_COUNT; b++) {
                      int limit = Math.min(binLimits[b], bins - 1);
                      float maxMag = 0f;
                      for (int i = prevLimit; i <= limit && i < fftData.length; i++) {
                          // FFT output: real[i], imag[i+1] — magnitud
                          float real = (i < fftData.length) ? fftData[i] : 0;
                          float imag = (i + 1 < fftData.length) ? fftData[i + 1] : 0;
                          float mag = (float) Math.sqrt(real * real + imag * imag);
                          if (mag > maxMag) maxMag = mag;
                      }
                      prevLimit = limit + 1;
                      // Normalizar: rango ~0-128 → 0-1, aplicar curva logarítmica
                      newBands[b] = Math.min(1f, (float)(Math.log1p(maxMag) / Math.log1p(128)));
                  }

                  long now = System.currentTimeMillis();
                  for (int b = 0; b < BAND_COUNT; b++) {
                      // Suavizado
                      bands[b] = bands[b] + (newBands[b] - bands[b]) * SMOOTHING;
                      // Peak hold
                      if (bands[b] >= peaks[b]) {
                          peaks[b] = bands[b];
                          peakTimes[b] = now;
                      } else if (now - peakTimes[b] > PEAK_HOLD) {
                          peaks[b] = Math.max(0f, peaks[b] - PEAK_DECAY);
                      }
                  }
                  postInvalidate();
              }

              /**
               * Versión simplificada: actualiza desde valores PCM (cuando FFT no está disponible)
               */
              public void updateFromPCM(byte[] pcm) {
                  if (pcm == null || pcm.length == 0) return;
                  // Distribución simple del RMS en bandas con pesos empíricos
                  float rms = 0f;
                  for (byte b : pcm) rms += Math.abs(b);
                  rms /= (pcm.length * 128f);
                  float[] weights = {1.0f, 0.9f, 0.85f, 0.75f, 0.7f, 0.65f, 0.6f, 0.55f, 0.45f, 0.35f, 0.25f, 0.15f};
                  for (int i = 0; i < BAND_COUNT; i++) {
                      bands[i] = Math.min(1f, rms * weights[i] * (1f + (float)Math.random() * 0.3f));
                  }
                  postInvalidate();
              }

              @Override
              protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  int w = getWidth();
                  int h = getHeight();
                  float labelH = 12f;
                  float drawH = h - labelH;

                  canvas.drawRect(0, 0, w, h, bgPaint);

                  // Líneas de grid horizontal: +12, +8, +4, 0, -12, -16, -20
                  float[] gridLevels = {1.0f, 0.85f, 0.7f, 0.5f, 0.3f, 0.15f, 0f};
                  String[] gridLabels = {"+12", "+8", "+4", "0", "-12", "-16", "-20"};
                  Paint gridLabelPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  gridLabelPaint.setColor(Color.parseColor("#223333"));
                  gridLabelPaint.setTextSize(7f);
                  gridLabelPaint.setTextAlign(Paint.Align.LEFT);
                  for (int g = 0; g < gridLevels.length; g++) {
                      float gy = drawH - drawH * gridLevels[g];
                      canvas.drawLine(0, gy, w, gy, gridPaint);
                      canvas.drawText(gridLabels[g], 2f, gy - 1f, gridLabelPaint);
                  }

                  float totalW = w;
                  float barW = (totalW / BAND_COUNT) * 0.65f;
                  float gapW = (totalW / BAND_COUNT) * 0.35f;

                  for (int b = 0; b < BAND_COUNT; b++) {
                      float x = b * (totalW / BAND_COUNT) + gapW / 2f;
                      float barH = drawH * bands[b];
                      float top = drawH - barH;

                      if (barH > 1f) {
                          RectF rect = new RectF(x, top, x + barW, drawH);
                          canvas.drawRoundRect(rect, 2f, 2f, barPaint);
                      }

                      // Peak dot
                      if (peaks[b] > 0.02f) {
                          float py = drawH - drawH * peaks[b];
                          RectF peakRect = new RectF(x, py - 2f, x + barW, py + 2f);
                          canvas.drawRoundRect(peakRect, 1f, 1f, peakPaint);
                      }

                      // Label de banda
                      float lx = x + barW / 2f;
                      canvas.drawText(BAND_LABELS[b], lx, h - 2f, labelPaint);
                  }
              }
          }
