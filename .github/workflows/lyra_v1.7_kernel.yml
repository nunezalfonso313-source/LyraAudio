          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/LyraVisualizer.java
          package com.lyra.audiokernel;

          import android.media.audiofx.Visualizer;

          /**
           * Gestiona la instancia del Visualizer de Android AudioFX.
           * Entrega datos PCM y FFT a VUMeterView y SpectrumView.
           *
           * Ciclo de vida:
           *   - Crear con audioSessionId del ExoPlayer
           *   - Llamar start() cuando el player comienza a reproducir
           *   - Llamar stop() cuando se pausa / destruye
           *   - Llamar release() en onDestroy de la Activity
           */
          public class LyraVisualizer {

              // Tamaño de captura FFT — potencia de 2, 512 balanceo rendimiento/resolución
              private static final int CAPTURE_SIZE = 512;

              private Visualizer visualizer;
              private VUMeterView vuLeft, vuRight;
              private SpectrumView spectrumView;
              private boolean active = false;

              public interface VisualizerReadyCallback {
                  void onReady();
                  void onError(String msg);
              }

              public LyraVisualizer(VUMeterView left, VUMeterView right, SpectrumView spectrum) {
                  this.vuLeft    = left;
                  this.vuRight   = right;
                  this.spectrumView = spectrum;
              }

              /**
               * Inicializa el Visualizer con el audioSessionId del ExoPlayer.
               * Debe llamarse desde el hilo principal, después de que el player esté preparado.
               */
              public void init(int audioSessionId, VisualizerReadyCallback callback) {
                  release(); // liberar instancia previa si existe
                  try {
                      visualizer = new Visualizer(audioSessionId);
                      // Configurar tamaño de captura
                      int[] range = Visualizer.getCaptureSizeRange();
                      int size = Math.max(range[0], Math.min(CAPTURE_SIZE, range[1]));
                      visualizer.setCaptureSize(size);

                      final int captureSize = visualizer.getCaptureSize();

                      visualizer.setDataCaptureListener(new Visualizer.OnDataCaptureListener() {
                          @Override
                          public void onWaveFormDataCapture(Visualizer v, byte[] waveform, int samplingRate) {
                              if (!active || waveform == null) return;

                              // Calcular RMS del canal izquierdo (primera mitad) y derecho (segunda mitad)
                              int half = waveform.length / 2;
                              float rmsL = computeRMS(waveform, 0, half);
                              float rmsR = computeRMS(waveform, half, waveform.length);

                              // Normalizar: PCM byte va de -128 a 127, RMS normalizada a [0, 1]
                              float normL = Math.min(1f, rmsL / 64f);
                              float normR = Math.min(1f, rmsR / 64f);

                              if (vuLeft  != null) vuLeft.post(() -> vuLeft.setLevel(normL));
                              if (vuRight != null) vuRight.post(() -> vuRight.setLevel(normR));
                          }

                          @Override
                          public void onFftDataCapture(Visualizer v, byte[] fft, int samplingRate) {
                              if (!active || fft == null) return;
                              if (spectrumView != null) {
                                  spectrumView.updateFromFFT(fft, captureSize);
                              }
                          }
                      },
                      // Tasa de captura: Visualizer.getMaxCaptureRate() suele ser 20000 (20 kHz)
                      // Usamos ~30fps = 33ms → 1000000/33 ≈ 30303 micros, limitado al máximo
                      Math.min(Visualizer.getMaxCaptureRate(), 30000),
                      true,   // waveform
                      true);  // FFT

                      visualizer.setEnabled(true);
                      active = true;
                      if (callback != null) callback.onReady();

                  } catch (Exception e) {
                      active = false;
                      if (callback != null) callback.onError(e.getMessage());
                  }
              }

              private float computeRMS(byte[] data, int from, int to) {
                  long sum = 0;
                  int count = to - from;
                  if (count <= 0) return 0f;
                  for (int i = from; i < to; i++) {
                      int v = data[i];
                      sum += v * v;
                  }
                  return (float) Math.sqrt((double) sum / count);
              }

              public void start() {
                  if (visualizer != null && !active) {
                      try { visualizer.setEnabled(true); active = true; } catch (Exception ignored) {}
                  }
              }

              public void stop() {
                  if (visualizer != null && active) {
                      try { visualizer.setEnabled(false); active = false; } catch (Exception ignored) {}
                  }
                  // Poner VU a cero
                  if (vuLeft  != null) vuLeft.post(() -> vuLeft.setLevel(0f));
                  if (vuRight != null) vuRight.post(() -> vuRight.setLevel(0f));
              }

              public void release() {
                  active = false;
                  if (visualizer != null) {
                      try { visualizer.setEnabled(false); visualizer.release(); } catch (Exception ignored) {}
                      visualizer = null;
                  }
              }

              public boolean isActive() { return active; }
          }
