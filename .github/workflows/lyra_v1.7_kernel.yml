          # ─────────────────────────────────────────────
          # NixieDisplayView.java
          # Renderiza dígitos estilo tubo nixie con glow ámbar
          # ─────────────────────────────────────────────
          cat <<'JAVAEOF' > app/src/main/java/com/lyra/audiokernel/NixieDisplayView.java
          package com.lyra.audiokernel;

          import android.content.Context;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.Paint;
          import android.graphics.RectF;
          import android.graphics.Typeface;
          import android.util.AttributeSet;
          import android.view.View;

          public class NixieDisplayView extends View {

              // Cada dígito se dibuja en su propia "cápsula" con fondo ámbar oscuro
              private static final int DIGIT_COUNT = 5; // MM:SS + separador
              private static final float DIGIT_W  = 48f;
              private static final float DIGIT_H  = 52f;
              private static final float SEP_W    = 20f;
              private static final float GAP      = 6f;
              private static final float CORNER   = 8f;

              private Paint bgPaint;      // fondo cápsula
              private Paint glowPaint;    // glow exterior
              private Paint digitPaint;   // dígito activo
              private Paint dimPaint;     // dígitos fantasma
              private Paint sepPaint;     // separador ":"

              // Tiempos en milisegundos
              private long currentMs = 0;
              private String displayStr = "00:00";

              // Animación de parpadeo del separador
              private boolean sepVisible = true;
              private long lastBlink = 0;

              public NixieDisplayView(Context context) { super(context); init(); }
              public NixieDisplayView(Context context, AttributeSet attrs) { super(context, attrs); init(); }
              public NixieDisplayView(Context context, AttributeSet attrs, int defStyle) { super(context, attrs, defStyle); init(); }

              private void init() {
                  // Fondo de cápsula: ámbar muy oscuro
                  bgPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  bgPaint.setColor(Color.parseColor("#1A0F00"));
                  bgPaint.setStyle(Paint.Style.FILL);

                  // Borde con glow naranja
                  glowPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  glowPaint.setColor(Color.parseColor("#FF8C00"));
                  glowPaint.setStyle(Paint.Style.STROKE);
                  glowPaint.setStrokeWidth(1.5f);
                  glowPaint.setShadowLayer(8f, 0f, 0f, Color.parseColor("#FFAA00"));
                  setLayerType(LAYER_TYPE_SOFTWARE, null); // necesario para shadowLayer

                  // Dígito activo: ámbar brillante
                  digitPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  digitPaint.setColor(Color.parseColor("#FFB300"));
                  digitPaint.setTextSize(36f);
                  digitPaint.setTextAlign(Paint.Align.CENTER);
                  digitPaint.setTypeface(Typeface.MONOSPACE);
                  digitPaint.setShadowLayer(12f, 0f, 0f, Color.parseColor("#FF8C00"));

                  // Dígitos fantasma (tubos nixie superponen todos los dígitos a baja intensidad)
                  dimPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  dimPaint.setColor(Color.parseColor("#3D2800"));
                  dimPaint.setTextSize(36f);
                  dimPaint.setTextAlign(Paint.Align.CENTER);
                  dimPaint.setTypeface(Typeface.MONOSPACE);

                  // Separador ":"
                  sepPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  sepPaint.setColor(Color.parseColor("#FFB300"));
                  sepPaint.setTextSize(32f);
                  sepPaint.setTextAlign(Paint.Align.CENTER);
                  sepPaint.setTypeface(Typeface.MONOSPACE);
                  sepPaint.setShadowLayer(10f, 0f, 0f, Color.parseColor("#FF8C00"));
              }

              /**
               * Actualiza el tiempo mostrado. Llamar desde el hilo UI.
               * @param ms tiempo en milisegundos
               * @param isPlaying true para activar parpadeo del separador
               */
              public void setTime(long ms, boolean isPlaying) {
                  currentMs = ms;
                  long totalSec = ms / 1000;
                  long min = totalSec / 60;
                  long sec = totalSec % 60;
                  displayStr = String.format("%02d:%02d", Math.min(min, 99), sec);

                  // Parpadeo del ":" cada 500ms cuando está reproduciendo
                  long now = System.currentTimeMillis();
                  if (isPlaying && now - lastBlink > 500) {
                      sepVisible = !sepVisible;
                      lastBlink = now;
                  } else if (!isPlaying) {
                      sepVisible = true;
                  }
                  invalidate();
              }

              @Override
              protected void onMeasure(int widthSpec, int heightSpec) {
                  // Ancho total: 4 dígitos + 1 separador + gaps
                  float totalW = 4 * DIGIT_W + SEP_W + 5 * GAP;
                  float totalH = DIGIT_H + 4f; // pequeño margen vertical
                  setMeasuredDimension((int) totalW, (int) totalH);
              }

              @Override
              protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);

                  // displayStr siempre tiene formato "MM:SS"
                  // Posiciones: d[0] d[1] : d[2] d[3]
                  char[] digits = new char[4];
                  digits[0] = displayStr.charAt(0);
                  digits[1] = displayStr.charAt(1);
                  digits[2] = displayStr.charAt(3);
                  digits[3] = displayStr.charAt(4);

                  float x = GAP;
                  float cy = getHeight() / 2f;
                  float top = cy - DIGIT_H / 2f;
                  float bot = cy + DIGIT_H / 2f;

                  for (int i = 0; i < 4; i++) {
                      if (i == 2) {
                          // Dibujar separador ":"
                          float sepCx = x + SEP_W / 2f;
                          if (sepVisible) {
                              canvas.drawText(":", sepCx, cy + 14f, sepPaint);
                          }
                          x += SEP_W + GAP;
                      }

                      RectF rect = new RectF(x, top, x + DIGIT_W, bot);

                      // Fondo cápsula
                      canvas.drawRoundRect(rect, CORNER, CORNER, bgPaint);
                      // Borde glow
                      canvas.drawRoundRect(rect, CORNER, CORNER, glowPaint);

                      // Dígitos fantasma (0-9, todos superpuestos a baja intensidad — efecto nixie)
                      float digitCy = cy + 13f;
                      float digitCx = x + DIGIT_W / 2f;
                      for (int ghost = 0; ghost <= 9; ghost++) {
                          if (ghost != (digits[i] - '0')) {
                              canvas.drawText(String.valueOf(ghost), digitCx, digitCy, dimPaint);
                          }
                      }

                      // Dígito activo encima
                      canvas.drawText(String.valueOf(digits[i]), digitCx, digitCy, digitPaint);

                      x += DIGIT_W + GAP;
                  }
              }
          }
          JAVAEOF

