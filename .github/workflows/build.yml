name: Lyra Audio Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create Android Project
        run: |

          mkdir -p app/src/main/java/com/lyra/player
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          cat <<EOF > settings.gradle
          rootProject.name='LyraKernel'
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace "com.lyra.player"
              compileSdk 34

              defaultConfig {
                  applicationId "com.lyra.player"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }

          dependencies {}
          EOF

      - name: Layout UI
        run: |

          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#101214">

              <LinearLayout
                  android:orientation="vertical"
                  android:gravity="center"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent">

                  <TextView
                      android:id="@+id/time"
                      android:text="00:00"
                      android:textSize="48sp"
                      android:textColor="#ff9933"
                      android:layout_marginBottom="20dp"/>

                  <com.lyra.player.VUMeter
                      android:id="@+id/vu"
                      android:layout_width="300dp"
                      android:layout_height="120dp"/>

                  <com.lyra.player.SpectrumView
                      android:id="@+id/spec"
                      android:layout_width="match_parent"
                      android:layout_height="200dp"/>

                  <LinearLayout
                      android:layout_marginTop="30dp"
                      android:orientation="horizontal">

                      <Button android:id="@+id/prev" android:text="⏮"/>
                      <Button android:id="@+id/play" android:text="▶"/>
                      <Button android:id="@+id/next" android:text="⏭"/>

                  </LinearLayout>

              </LinearLayout>

          </FrameLayout>
          EOF

      - name: MainActivity
        run: |

          cat <<EOF > app/src/main/java/com/lyra/player/MainActivity.java
          package com.lyra.player;

          import android.app.Activity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.widget.TextView;

          public class MainActivity extends Activity {

              TextView time;
              Handler handler = new Handler();
              int seconds = 0;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);

                  time = findViewById(R.id.time);

                  handler.postDelayed(timer,1000);
              }

              Runnable timer = new Runnable() {
                  public void run() {

                      seconds++;

                      int m = seconds / 60;
                      int s = seconds % 60;

                      time.setText(String.format("%02d:%02d",m,s));

                      handler.postDelayed(this,1000);
                  }
              };
          }
          EOF

      - name: VU Meter Class
        run: |

          cat <<EOF > app/src/main/java/com/lyra/player/VUMeter.java
          package com.lyra.player;

          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.View;
          import java.util.Random;

          public class VUMeter extends View {

              Paint p = new Paint();
              float angle = 0;
              Random r = new Random();

              public VUMeter(Context c, AttributeSet a){
                  super(c,a);
              }

              protected void onDraw(Canvas c){

                  int cx = getWidth()/2;
                  int cy = getHeight();

                  p.setColor(Color.YELLOW);
                  p.setStrokeWidth(8);

                  angle = -45 + r.nextFloat()*90;

                  c.save();
                  c.rotate(angle,cx,cy);

                  c.drawLine(cx,cy,cx,cy-150,p);

                  c.restore();

                  postInvalidateDelayed(100);
              }
          }
          EOF

      - name: Spectrum Analyzer
        run: |

          cat <<EOF > app/src/main/java/com/lyra/player/SpectrumView.java
          package com.lyra.player;

          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.View;
          import java.util.Random;

          public class SpectrumView extends View {

              Paint p = new Paint();
              Random r = new Random();

              public SpectrumView(Context c, AttributeSet a){
                  super(c,a);
              }

              protected void onDraw(Canvas canvas){

                  int bars = 32;
                  int w = getWidth()/bars;

                  for(int i=0;i<bars;i++){

                      int h = r.nextInt(getHeight());

                      p.setColor(Color.CYAN);

                      canvas.drawRect(i*w,getHeight()-h,(i+1)*w,getHeight(),p);

                  }

                  postInvalidateDelayed(60);
              }
          }
          EOF

      - name: Build APK
        run: |

          wget https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip gradle-8.6-bin.zip

          ./gradle-8.6/bin/gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lyra-apk
          path: app/build/outputs/apk/debug/*.apk
