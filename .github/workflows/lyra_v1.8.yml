name: Lyra_v1.7_Full_Industrial_Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle Wrapper (Forced 8.7)
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Write Build Infrastructure (Blindaje AEGIS)
        run: |
          cat <<'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF

          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "com.lyra.audiokernel"
              compileSdk 34
              defaultConfig {
                  applicationId "com.lyra.audiokernel"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.7-stable"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
              implementation 'androidx.media3:media3-exoplayer:1.3.1'
              implementation 'androidx.media3:media3-session:1.3.1'
              implementation 'androidx.media3:media3-ui:1.3.1'
              implementation 'com.google.guava:guava:32.1.3-android'
          }
          EOF

      - name: Write AndroidManifest
        run: |
          mkdir -p app/src/main
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <application android:label="Lyra Audio" android:theme="@style/AppTheme" android:allowBackup="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".LyraPlaybackService" android:foregroundServiceType="mediaPlayback" android:exported="true">
                      <intent-filter><action android:name="androidx.media3.session.MediaSessionService"/></intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

      - name: Write UI Resources
        run: |
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          cat <<'EOF' > app/src/main/res/values/styles.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources><style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
          <item name="android:windowBackground">#0A0A0A</item>
          <item name="android:statusBarColor">#0A0A0A</item></style></resources>
          EOF
          cat <<'EOF' > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="amber">#E8900A</color>
              <color name="nixie_orange">#FF6B0A</color>
              <color name="cyan_bar">#00BCD4</color>
              <color name="green_led">#00E676</color>
              <color name="bg_dark">#0A0A0A</color>
          </resources>
          EOF

      - name: Write Layouts (Master v1.7)
        run: |
          cat <<'EOF' > app/src/main/res/layout/item_track.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="horizontal" android:padding="8dp" android:gravity="center_vertical">
              <TextView android:id="@+id/item_number" android:layout_width="32dp" android:layout_height="wrap_content" android:textColor="#444444" android:textSize="12sp" android:gravity="center"/>
              <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:paddingStart="4dp">
                  <TextView android:id="@+id/item_title" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#FFFFFF" android:textSize="13sp" android:singleLine="true" android:ellipsize="end"/>
                  <TextView android:id="@+id/item_artist" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#888888" android:textSize="11sp" android:singleLine="true"/>
              </LinearLayout>
              <TextView android:id="@+id/item_duration" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#555555" android:textSize="11sp" android:paddingStart="8dp"/>
          </LinearLayout>
          EOF
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.coordinatorlayout.widget.CoordinatorLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#0A0A0A">
              <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="96dp" android:orientation="horizontal" android:background="#0D0D0D" android:padding="8dp">
                      <com.lyra.audiokernel.VUMeterView android:id="@+id/vu_left" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                      <com.lyra.audiokernel.VUMeterView android:id="@+id/vu_right" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                  </LinearLayout>
                  <com.lyra.audiokernel.NixieDisplayView android:id="@+id/nixie_display" android:layout_width="match_parent" android:layout_height="72dp"/>
                  <SeekBar android:id="@+id/seek_bar" android:layout_width="match_parent" android:layout_height="wrap_content" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                  <com.lyra.audiokernel.SpectrumView android:id="@+id/spectrum_view" android:layout_width="match_parent" android:layout_height="110dp"/>
                  <ListView android:id="@+id/playlist_view" android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"/>
              </LinearLayout>
          </androidx.coordinatorlayout.widget.CoordinatorLayout>
          EOF

      - name: Inyectar Lógica Java (VUMeter, Spectrum, Nixie)
        run: |
          mkdir -p app/src/main/java/com/lyra/audiokernel
          
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/VUMeterView.java
          package com.lyra.audiokernel;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.View;
          public class VUMeterView extends View {
              private Paint bgPaint, scalePaint, needlePaint, redZonePaint;
              private float displayLevel = 0f;
              private static final float ATTACK = 0.45f, RELEASE = 0.05f;
              public VUMeterView(Context context, AttributeSet attrs) { super(context, attrs); init(); }
              private void init() {
                  bgPaint = new Paint(Paint.ANTI_ALIAS_FLAG); bgPaint.setColor(Color.parseColor("#080808"));
                  scalePaint = new Paint(Paint.ANTI_ALIAS_FLAG); scalePaint.setColor(Color.parseColor("#444433")); scalePaint.setStrokeWidth(2f); scalePaint.setStyle(Paint.Style.STROKE);
                  needlePaint = new Paint(Paint.ANTI_ALIAS_FLAG); needlePaint.setColor(Color.parseColor("#EEEEEE")); needlePaint.setStrokeWidth(2.5f);
                  redZonePaint = new Paint(scalePaint); redZonePaint.setColor(Color.parseColor("#550000"));
                  setLayerType(LAYER_TYPE_SOFTWARE, null);
              }
              public void setLevel(float v) {
                  if (v > displayLevel) displayLevel += (v - displayLevel) * ATTACK;
                  else displayLevel += (v - displayLevel) * RELEASE;
                  invalidate();
              }
              @Override protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  float w = getWidth(), h = getHeight(), cx = w / 2f, cy = h * 1.05f, radius = h * 0.9f;
                  canvas.drawRect(0, 0, w, h, bgPaint);
                  RectF arcRect = new RectF(cx - radius, cy - radius, cx + radius, cy + radius);
                  canvas.drawArc(arcRect, 220, 100, false, scalePaint);
                  canvas.drawArc(arcRect, 300, 20, false, redZonePaint);
                  float angle = 220 + (displayLevel * 100);
                  if (displayLevel > 0.8f) needlePaint.setShadowLayer(15f, 0, 0, Color.RED);
                  else needlePaint.setShadowLayer(5f, 0, 0, Color.parseColor("#FFAA00"));
                  canvas.save();
                  canvas.rotate(angle - 270, cx, cy);
                  canvas.drawLine(cx, cy, cx, cy - radius + 10, needlePaint);
                  canvas.restore();
              }
          }
          EOF

          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/SpectrumView.java
          package com.lyra.audiokernel;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.View;
          public class SpectrumView extends View {
              private float[] bands = new float[32], peaks = new float[32];
              private int[] peakFrames = new int[32];
              private Paint barPaint;
              public SpectrumView(Context context, AttributeSet attrs) { super(context, attrs); barPaint = new Paint(Paint.ANTI_ALIAS_FLAG); }
              public void updateFromFFT(byte[] fft, int size) {
                  for (int i = 0; i < 32; i++) {
                      float mag = (float) Math.hypot(fft[i*2], fft[i*2+1]);
                      float val = (float) (Math.log10(mag + 1) / 1.8);
                      bands[i] = bands[i] * 0.7f + val * 0.3f;
                      if (bands[i] > peaks[i]) { peaks[i] = bands[i]; peakFrames[i] = 35; }
                      else if (peakFrames[i] > 0) peakFrames[i]--;
                      else peaks[i] *= 0.95f;
                  }
                  invalidate();
              }
              @Override protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  float w = getWidth() / 32f;
                  LinearGradient grad = new LinearGradient(0, getHeight(), 0, 0,
                      new int[]{Color.CYAN, Color.GREEN, Color.YELLOW, Color.RED},
                      new float[]{0f, 0.4f, 0.8f, 1f}, Shader.TileMode.CLAMP);
                  barPaint.setShader(grad);
                  for (int i = 0; i < 32; i++) {
                      float h = bands[i] * getHeight();
                      canvas.drawRect(i * w + 1, getHeight() - h, (i + 1) * w - 1, getHeight(), barPaint);
                      canvas.drawRect(i * w + 1, getHeight() - (peaks[i] * getHeight()) - 2, (i + 1) * w - 1, getHeight() - (peaks[i] * getHeight()), barPaint);
                  }
              }
          }
          EOF

          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/NixieDisplayView.java
          package com.lyra.audiokernel;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.View;
          public class NixieDisplayView extends View {
              private Paint bgPaint, digitPaint, dimPaint, glassPaint;
              private String displayStr = "00:00";
              private float digitW;
              public NixieDisplayView(Context context, AttributeSet attrs) { super(context, attrs); init(); }
              private void init() {
                  bgPaint = new Paint(Paint.ANTI_ALIAS_FLAG); bgPaint.setColor(Color.parseColor("#150A00"));
                  digitPaint = new Paint(Paint.ANTI_ALIAS_FLAG); digitPaint.setColor(Color.parseColor("#FF9900")); digitPaint.setTextSize(50f);
                  digitPaint.setShadowLayer(15f, 0, 0, Color.parseColor("#FF6600"));
                  dimPaint = new Paint(digitPaint); dimPaint.setColor(Color.parseColor("#221100")); dimPaint.setShadowLayer(0,0,0,0);
                  glassPaint = new Paint(Paint.ANTI_ALIAS_FLAG); glassPaint.setColor(Color.parseColor("#22FFFFFF"));
                  setLayerType(LAYER_TYPE_SOFTWARE, null);
              }
              @Override protected void onSizeChanged(int w, int h, int oldw, int oldh) { digitW = w / 5.5f; }
              public void setTime(long ms, boolean p) {
                  long s = ms / 1000;
                  displayStr = String.format("%02d:%02d", (int)(s/60), (int)(s%60));
                  invalidate();
              }
              @Override protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  float x = 10f, cy = getHeight() / 2f + 15f;
                  for (char c : displayStr.toCharArray()) {
                      if (c == ':') { x += 20f; continue; }
                      RectF r = new RectF(x, 10, x + digitW, getHeight() - 10);
                      canvas.drawRoundRect(r, 15, 15, bgPaint);
                      canvas.drawText("8", x + digitW/2 - 15, cy, dimPaint);
                      canvas.drawText(String.valueOf(c), x + digitW/2 - 15, cy, digitPaint);
                      canvas.drawArc(new RectF(x+5, 15, x+digitW-5, 40), 180, 180, false, glassPaint);
                      x += digitW + 5;
                  }
              }
          }
          EOF

      - name: AEGIS_Ignition (Final Build)
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyra_Final_Kernel
          path: app/build/outputs/apk/debug/app-debug.apk
