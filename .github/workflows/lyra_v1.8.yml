name: Lyra_Full_Master_Aegis_v6

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle Wrapper (Forced 8.7)
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Write Build Infrastructure (Blindaje Repositorios)
        run: |
          cat <<'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF

          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "com.lyra.audiokernel"
              compileSdk 34
              defaultConfig {
                  applicationId "com.lyra.audiokernel"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.8-AEGIS"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
              implementation 'androidx.media3:media3-exoplayer:1.3.1'
              implementation 'androidx.media3:media3-session:1.3.1'
              implementation 'androidx.media3:media3-ui:1.3.1'
              implementation 'com.google.guava:guava:32.1.3-android'
          }
          EOF

      - name: Write AndroidManifest
        run: |
          mkdir -p app/src/main
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <application android:label="Lyra Audio" android:theme="@style/AppTheme" android:allowBackup="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".LyraPlaybackService" android:foregroundServiceType="mediaPlayback" android:exported="true">
                      <intent-filter><action android:name="androidx.media3.session.MediaSessionService"/></intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

      - name: Write Master UI (Resources)
        run: |
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          cat <<'EOF' > app/src/main/res/values/styles.xml
          <resources><style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
          <item name="android:windowBackground">#0A0A0A</item>
          <item name="android:statusBarColor">#0A0A0A</item></style></resources>
          EOF
          cat <<'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="amber">#E8900A</color>
              <color name="bg_dark">#0A0A0A</color>
          </resources>
          EOF
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <androidx.coordinatorlayout.widget.CoordinatorLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#0A0A0A">
              <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="96dp" android:orientation="horizontal" android:background="#0D0D0D" android:padding="8dp">
                      <com.lyra.audiokernel.VUMeterView android:id="@+id/vu_left" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                      <com.lyra.audiokernel.VUMeterView android:id="@+id/vu_right" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                  </LinearLayout>
                  <com.lyra.audiokernel.NixieDisplayView android:id="@+id/nixie_display" android:layout_width="match_parent" android:layout_height="72dp"/>
                  <SeekBar android:id="@+id/seek_bar" android:layout_width="match_parent" android:layout_height="wrap_content" android:progressTint="#00BFFF" android:thumbTint="#00BFFF"/>
                  <com.lyra.audiokernel.SpectrumView android:id="@+id/spectrum_view" android:layout_width="match_parent" android:layout_height="110dp"/>
                  <ListView android:id="@+id/playlist_view" android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"/>
              </LinearLayout>
          </androidx.coordinatorlayout.widget.CoordinatorLayout>
          EOF
          cat <<'EOF' > app/src/main/res/layout/item_track.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:padding="8dp">
              <TextView android:id="@+id/item_number" android:layout_width="32dp" android:layout_height="wrap_content" android:textColor="#444444"/>
              <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical">
                  <TextView android:id="@+id/item_title" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#FFFFFF"/>
                  <TextView android:id="@+id/item_artist" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#888888"/>
              </LinearLayout>
              <TextView android:id="@+id/item_duration" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#555555"/>
          </LinearLayout>
          EOF

      - name: Inyectar Modelos y Adaptadores (Solución a 89 errores)
        run: |
          mkdir -p app/src/main/java/com/lyra/audiokernel
          
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/TrackInfo.java
          package com.lyra.audiokernel;
          import android.graphics.Bitmap;
          import android.net.Uri;
          import androidx.media3.common.MediaItem;
          public class TrackInfo {
              public MediaItem mediaItem;
              public String title, artist, album, meta, duration;
              public Bitmap albumArt;
              public Uri uri;
              public TrackInfo(MediaItem mediaItem, String title, String artist, String album, String meta, String duration, Bitmap albumArt, Uri uri) {
                  this.mediaItem = mediaItem; this.title = title; this.artist = artist; this.album = album;
                  this.meta = meta; this.duration = duration; this.albumArt = albumArt; this.uri = uri;
              }
          }
          EOF

          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/TrackAdapter.java
          package com.lyra.audiokernel;
          import android.content.Context;
          import android.graphics.Color;
          import android.view.*;
          import android.widget.*;
          import java.util.List;
          public class TrackAdapter extends ArrayAdapter<TrackInfo> {
              private int currentIndex = -1;
              public TrackAdapter(Context context, List<TrackInfo> tracks) { super(context, 0, tracks); }
              public void setCurrentIndex(int index) { this.currentIndex = index; notifyDataSetChanged(); }
              @Override public View getView(int pos, View v, ViewGroup p) {
                  if (v == null) v = LayoutInflater.from(getContext()).inflate(R.layout.item_track, p, false);
                  TrackInfo t = getItem(pos);
                  TextView title = v.findViewById(R.id.item_title);
                  title.setText(t.title);
                  v.setBackgroundColor(pos == currentIndex ? Color.parseColor("#1A2A1A") : Color.TRANSPARENT);
                  return v;
              }
          }
          EOF

      - name: Inyectar Componentes Visuales (VUMeter, Spectrum, Nixie)
        run: |
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/VUMeterView.java
          package com.lyra.audiokernel;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.View;
          public class VUMeterView extends View {
              private Paint bgPaint, scalePaint, needlePaint;
              private float displayLevel = 0f;
              public VUMeterView(Context c, AttributeSet a) { super(c, a); init(); }
              private void init() {
                  bgPaint = new Paint(1); bgPaint.setColor(0xFF080808);
                  scalePaint = new Paint(1); scalePaint.setColor(0xFF444433); scalePaint.setStyle(Paint.Style.STROKE); scalePaint.setStrokeWidth(2f);
                  needlePaint = new Paint(1); needlePaint.setColor(0xFFEEEEEE); needlePaint.setStrokeWidth(2.5f);
                  setLayerType(LAYER_TYPE_SOFTWARE, null);
              }
              public void setLevel(float v) { displayLevel = displayLevel * 0.6f + v * 0.4f; invalidate(); }
              @Override protected void onDraw(Canvas canvas) {
                  float w = getWidth(), h = getHeight(), cx = w / 2f, cy = h * 1.05f, radius = h * 0.9f;
                  canvas.drawRect(0, 0, w, h, bgPaint);
                  RectF arcRect = new RectF(cx - radius, cy - radius, cx + radius, cy + radius);
                  canvas.drawArc(arcRect, 220, 100, false, scalePaint);
                  float angle = 220 + (displayLevel * 100);
                  canvas.save(); canvas.rotate(angle - 270, cx, cy);
                  canvas.drawLine(cx, cy, cx, cy - radius + 10, needlePaint);
                  canvas.restore();
              }
          }
          EOF

          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/SpectrumView.java
          package com.lyra.audiokernel;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.View;
          public class SpectrumView extends View {
              private float[] bands = new float[32];
              private Paint barPaint = new Paint(1);
              public SpectrumView(Context c, AttributeSet a) { super(c, a); }
              public void updateFromFFT(byte[] fft, int size) {
                  for (int i = 0; i < 32; i++) {
                      float mag = (float) Math.hypot(fft[i*2], fft[i*2+1]);
                      bands[i] = (float) (Math.log10(mag + 1) / 1.8);
                  }
                  invalidate();
              }
              @Override protected void onDraw(Canvas canvas) {
                  float w = getWidth() / 32f;
                  barPaint.setColor(Color.CYAN);
                  for (int i = 0; i < 32; i++) {
                      float h = bands[i] * getHeight();
                      canvas.drawRect(i * w + 1, getHeight() - h, (i + 1) * w - 1, getHeight(), barPaint);
                  }
              }
          }
          EOF

          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/NixieDisplayView.java
          package com.lyra.audiokernel;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.View;
          public class NixieDisplayView extends View {
              private Paint digitPaint = new Paint(1);
              private String displayStr = "00:00";
              public NixieDisplayView(Context c, AttributeSet a) { super(c, a); digitPaint.setColor(0xFFFF9900); digitPaint.setTextSize(50f); digitPaint.setTypeface(Typeface.MONOSPACE); }
              public void setTime(long ms, boolean p) {
                  long s = ms / 1000;
                  displayStr = String.format("%02d:%02d", (int)(s/60), (int)(s%60));
                  invalidate();
              }
              @Override protected void onDraw(Canvas canvas) {
                  canvas.drawText(displayStr, getWidth()/2f - 60, getHeight()/2f + 15, digitPaint);
              }
          }
          EOF

      - name: Inyectar MainActivity y Servicios (Solución Inferencia Stream)
        run: |
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/LyraPlaybackService.java
          package com.lyra.audiokernel;
          import android.content.Intent;
          import android.os.*;
          import androidx.media3.exoplayer.ExoPlayer;
          import androidx.media3.session.*;
          public class LyraPlaybackService extends MediaSessionService {
              private MediaSession mediaSession;
              private ExoPlayer player;
              private final IBinder binder = new LocalBinder();
              public class LocalBinder extends Binder { public LyraPlaybackService getService() { return LyraPlaybackService.this; } }
              @Override public IBinder onBind(Intent intent) { return binder; }
              @Override public void onCreate() {
                  super.onCreate();
                  player = new ExoPlayer.Builder(this).build();
                  mediaSession = new MediaSession.Builder(this, player).build();
              }
              public int getAudioSessionId() { return player.getAudioSessionId(); }
              @Override public MediaSession onGetSession(MediaSession.ControllerInfo c) { return mediaSession; }
              @Override public void onDestroy() { player.release(); mediaSession.release(); super.onDestroy(); }
          }
          EOF

          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/MainActivity.java
          package com.lyra.audiokernel;
          import android.os.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.media3.common.MediaItem;
          import androidx.media3.session.MediaController;
          import androidx.media3.session.SessionToken;
          import android.content.ComponentName;
          import com.google.common.util.concurrent.ListenableFuture;
          import com.google.common.util.concurrent.MoreExecutors;
          import java.util.*;
          import java.util.stream.Collectors;

          public class MainActivity extends AppCompatActivity {
              private List<TrackInfo> allTracks = new ArrayList<>();
              private TrackAdapter adapter;
              private MediaController mediaController;

              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  adapter = new TrackAdapter(this, allTracks);
                  ((ListView)findViewById(R.id.playlist_view)).setAdapter(adapter);
                  
                  SessionToken token = new SessionToken(this, new ComponentName(this, LyraPlaybackService.class));
                  ListenableFuture<MediaController> future = new MediaController.Builder(this, token).buildAsync();
                  future.addListener(() -> {
                      try {
                          mediaController = future.get();
                          setupQueue();
                      } catch (Exception ignored) {}
                  }, MoreExecutors.directExecutor());
              }

              private void setupQueue() {
                  if (allTracks.isEmpty()) return;
                  // SOLUCIÓN AL ERROR DE INFERENCIA VARIABLE T:
                  List<MediaItem> items = allTracks.stream()
                      .map(t -> t.mediaItem)
                      .collect(Collectors.toList());
                  mediaController.setMediaItems(items);
                  mediaController.prepare();
              }
          }
          EOF

      - name: AEGIS_Ignition (Build APK)
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lyra_Final_Master_v6
          path: app/build/outputs/apk/debug/app-debug.apk
