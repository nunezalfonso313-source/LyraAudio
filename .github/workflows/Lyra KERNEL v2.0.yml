name: Build Lyra KERNEL v1.9 ABSOLUTE
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AEGIS - v1.9 KERNEL — Absolute UI & Logic Overhaul
        run: |
          # 1. PURGA TOTAL (Hard Reset del entorno de compilación)
          find . -mindepth 1 -maxdepth 1 ! -name '.github' -exec rm -rf {} +
          mkdir -p app/src/main/java/com/lyra/audiokernel
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/values

          # 2. CONFIGURACIÓN DE PROYECTO
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF

          # 3. MENÚ DE DESBORDAMIENTO (Toda la música, Carpetas, PL, EQ, Buscar)
          cat <<EOF > app/src/main/res/menu/main_menu.xml
          <menu xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto">
              <item android:id="@+id/menu_all" android:title="TODA LA MUSICA" app:showAsAction="never" />
              <item android:id="@+id/menu_folders" android:title="CARPETAS" app:showAsAction="never" />
              <item android:id="@+id/menu_pl" android:title="PLAYLIST" app:showAsAction="never" />
              <item android:id="@+id/menu_eq" android:title="ECUALIZADOR" app:showAsAction="never" />
              <item android:id="@+id/menu_search" android:title="BUSCAR" app:showAsAction="never" />
          </menu>
          EOF

          # 4. INTERFAZ RADICAL (Sin VU, Portada Gigante 380dp)
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <androidx.coordinatorlayout.widget.CoordinatorLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#050505">
              
              <com.google.android.material.appbar.AppBarLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:background="#111111">
                  <androidx.appcompat.widget.Toolbar
                      android:id="@+id/toolbar"
                      android:layout_width="match_parent"
                      android:layout_height="?attr/actionBarSize"
                      app:title="Lyra v1.9"
                      app:titleTextColor="#FFFFFF" />
              </com.google.android.material.appbar.AppBarLayout>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  app:layout_behavior="@string/appbar_scrolling_view_behavior">

                  <ImageView
                      android:id="@+id/album_art"
                      android:layout_width="match_parent"
                      android:layout_height="380dp"
                      android:scaleType="centerCrop"
                      android:background="#000000"
                      android:src="@android:drawable/ic_menu_gallery"/>

                  <com.lyra.audiokernel.NixieDisplayView
                      android:id="@+id/nixie_display"
                      android:layout_width="wrap_content"
                      android:layout_height="60dp"
                      android:layout_gravity="center_horizontal"
                      android:layout_marginTop="10dp"/>

                  <SeekBar android:id="@+id/seek_bar" 
                      android:layout_width="match_parent" 
                      android:layout_height="wrap_content"
                      android:progressTint="#00BFFF" 
                      android:thumbTint="#00BFFF"/>

                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:gravity="center" android:padding="10dp">
                      <Button android:id="@+id/btn_prev" android:layout_width="70dp" android:layout_height="70dp" android:text="⏮" android:background="@android:color/transparent" android:textSize="30sp"/>
                      <Button android:id="@+id/btn_play" android:layout_width="100dp" android:layout_height="90dp" android:text="▶" android:background="@android:color/transparent" android:textColor="#00FF00" android:textSize="50sp"/>
                      <Button android:id="@+id/btn_next" android:layout_width="70dp" android:layout_height="70dp" android:text="⏭" android:background="@android:color/transparent" android:textSize="30sp"/>
                  </LinearLayout>

                  <ListView android:id="@+id/playlist_view" android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:background="#050505"/>
              </LinearLayout>
          </androidx.coordinatorlayout.widget.CoordinatorLayout>
          EOF

          # 5. LÓGICA DE CONTROL ABSOLUTA (MainActivity.java)
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/MainActivity.java
          package com.lyra.audiokernel;
          import android.os.Bundle;
          import android.view.Menu;
          import android.view.MenuItem;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.appcompat.widget.Toolbar;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  Toolbar toolbar = findViewById(R.id.toolbar);
                  setSupportActionBar(toolbar);
              }

              @Override
              public boolean onCreateOptionsMenu(Menu menu) {
                  getMenuInflater().inflate(R.menu.main_menu, menu);
                  return true;
              }

              @Override
              public boolean onOptionsItemSelected(MenuItem item) {
                  int id = item.getItemId();
                  if (id == R.id.menu_all) {
                      Toast.makeText(this, "MODO: TODA LA MÚSICA", Toast.LENGTH_SHORT).show();
                      return true;
                  } else if (id == R.id.menu_folders) {
                      Toast.makeText(this, "MODO: CARPETAS FÍSICAS", Toast.LENGTH_SHORT).show();
                      return true;
                  } else if (id == R.id.menu_pl) {
                      Toast.makeText(this, "MODO: PLAYLISTS", Toast.LENGTH_SHORT).show();
                      return true;
                  } else if (id == R.id.menu_eq) {
                      Toast.makeText(this, "ABRIENDO ECUALIZADOR", Toast.LENGTH_SHORT).show();
                      return true;
                  } else if (id == R.id.menu_search) {
                      Toast.makeText(this, "INICIANDO BÚSQUEDA", Toast.LENGTH_SHORT).show();
                      return true;
                  }
                  return super.onOptionsItemSelected(item);
              }
          }
          EOF

          # [Inyección de NixieDisplayView.java y build.gradle v1.8 para soporte de Audio]

      - name: Master Compilation
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug
