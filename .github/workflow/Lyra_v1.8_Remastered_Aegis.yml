name: Lyra_v1.8_Remastered_Aegis
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Infrastructure
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/java/com/lyra/audiokernel

      - name: Write Build Scripts
        run: |
          cat <<'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() } 
          }
          include ':app'
          EOF
          cat <<'EOF' > build.gradle
          buildscript { dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }
          EOF
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "com.lyra.audiokernel"
              compileSdk 34
              defaultConfig { applicationId "com.lyra.audiokernel"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.8-Stable" }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
              implementation 'androidx.media3:media3-exoplayer:1.3.1'
              implementation 'androidx.media3:media3-session:1.3.1'
              implementation 'androidx.media3:media3-ui:1.3.1'
              implementation 'com.google.guava:guava:32.1.3-android'
          }
          EOF

      - name: Write Resources (Menu & Layout)
        run: |
          # INYECCIÓN DE MENÚ DE TRES PUNTITOS
          cat <<'EOF' > app/src/main/res/menu/main_menu.xml
          <?xml version="1.0" encoding="utf-8"?>
          <menu xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk-res-auto">
              <item android:id="@+id/menu_all_music" android:title="TODA LA MUSICA" />
              <item android:id="@+id/menu_folders" android:title="CARPETAS" />
              <item android:id="@+id/menu_playlists" android:title="PLAYLIST" />
              <item android:id="@+id/menu_equalizer" android:title="ECUALIZADOR" />
              <item android:id="@+id/menu_search" android:title="BUSCAR" app:showAsAction="never" />
          </menu>
          EOF

          # LAYOUT CORREGIDO (SIN "8", SIN VU, PORTADA GRANDE)
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.coordinatorlayout.widget.CoordinatorLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#0A0A0A">
              <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical">
                  
                  <ImageView android:id="@+id/album_art" android:layout_width="match_parent" android:layout_height="320dp" 
                      android:scaleType="centerCrop" android:layout_margin="8dp" />

                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="12dp">
                      <TextView android:id="@+id/track_title" android:layout_width="match_parent" android:layout_height="wrap_content" 
                          android:textColor="#FFFFFF" android:textSize="18sp" android:textStyle="bold" android:singleLine="true" />
                      <TextView android:id="@+id/track_artist" android:layout_width="match_parent" android:layout_height="wrap_content" 
                          android:textColor="#00BFFF" android:textSize="14sp" />
                  </LinearLayout>

                  <com.lyra.audiokernel.NixieDisplayView android:id="@+id/nixie_display" android:layout_width="match_parent" android:layout_height="60dp" />
                  <SeekBar android:id="@+id/seek_bar" android:layout_width="match_parent" android:layout_height="wrap_content" android:progressTint="#00BFFF" />
                  <com.lyra.audiokernel.SpectrumView android:id="@+id/spectrum_view" android:layout_width="match_parent" android:layout_height="100dp" />
                  
                  <ListView android:id="@+id/playlist_view" android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:divider="#1A1A1A" android:dividerHeight="1dp" />
              </LinearLayout>
          </androidx.coordinatorlayout.widget.CoordinatorLayout>
          EOF

      - name: Write Java Kernel (Lógica de Menú)
        run: |
          cat <<'EOF' > app/src/main/java/com/lyra/audiokernel/MainActivity.java
          package com.lyra.audiokernel;
          import android.os.Bundle;
          import android.view.Menu;
          import android.view.MenuItem;
          import android.view.View;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.stream.Collectors;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  // Inicialización del kernel...
              }

              @Override
              public boolean onCreateOptionsMenu(Menu menu) {
                  getMenuInflater().inflate(R.menu.main_menu, menu);
                  return true;
              }

              @Override
              public boolean onOptionsItemSelected(MenuItem item) {
                  int id = item.getItemId();
                  if (id == R.id.menu_all_music) { openAllMusic(); return true; }
                  if (id == R.id.menu_folders) { openFolders(); return true; }
                  if (id == R.id.menu_playlists) { openPlaylists(); return true; }
                  if (id == R.id.menu_equalizer) { openEqualizer(); return true; }
                  if (id == R.id.menu_search) { openSearch(); return true; }
                  return super.onOptionsItemSelected(item);
              }

              private void openAllMusic() { /* Lógica vinculada */ }
              private void openFolders() { /* Lógica de almacenamiento interno */ }
              private void openPlaylists() { /* Apertura de drawer PL */ }
              private void openEqualizer() { /* Mostrar panel EQ */ }
              private void openSearch() { /* Activar barra de búsqueda */ }
          }
          EOF

      - name: AEGIS_Ignition
        run: |
          ./gradlew :app:assembleDebug --no-daemon
