name: Lyra Audio Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          cat <<'EOF' > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew \
            -o gradlew 2>/dev/null || \
          cat <<'GRADLEW' > gradlew
          #!/bin/sh
          exec gradle "$@"
          GRADLEW
          chmod +x gradlew

      - name: Write build scripts
        run: |
          cat <<'EOF' > settings.gradle
          rootProject.name = 'LyraAudio'
          include ':app'
          EOF

          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace "com.lyra.audiokernel"
              compileSdk 34
              defaultConfig {
                  applicationId "com.lyra.audiokernel"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.7"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
              implementation 'androidx.media3:media3-exoplayer:1.3.1'
              implementation 'androidx.media3:media3-session:1.3.1'
              implementation 'androidx.media3:media3-ui:1.3.1'
              implementation 'com.google.guava:guava:32.1.3-android'
          }
          EOF

      - name: Write AndroidManifest
        run: |
          mkdir -p app/src/main
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <application
                  android:label="Lyra Audio"
                  android:theme="@style/AppTheme"
                  android:allowBackup="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".LyraPlaybackService"
                      android:foregroundServiceType="mediaPlayback"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="androidx.media3.session.MediaSessionService"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

      - name: Write resources
        run: |
          mkdir -p app/src/main/res/values
          cat <<'EOF' > app/src/main/res/values/styles.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#0A0A0A</item>
                  <item name="android:statusBarColor">#0A0A0A</item>
                  <item name="android:navigationBarColor">#0A0A0A</item>
              </style>
          </resources>
          EOF
          cat <<'EOF' > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="amber">#E8900A</color>
              <color name="nixie_orange">#FF6B0A</color>
              <color name="cyan_bar">#00BCD4</color>
              <color name="green_led">#00E676</color>
              <color name="bg_dark">#0A0A0A</color>
          </resources>
          EOF

      - name: Write activity_main.xml
        run: |
          mkdir -p app/src/main/res/layout
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.coordinatorlayout.widget.CoordinatorLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#0A0A0A">

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:padding="12dp"
                      android:background="#111111">
                      <ImageView
                          android:id="@+id/album_art"
                          android:layout_width="80dp"
                          android:layout_height="80dp"
                          android:scaleType="centerCrop"
                          android:background="#222222"
                          android:src="@android:drawable/ic_media_play"/>
                      <LinearLayout
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:orientation="vertical"
                          android:paddingStart="12dp"
                          android:gravity="center_vertical">
                          <TextView
                              android:id="@+id/track_title"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="Cargando..."
                              android:textColor="#FFFFFF"
                              android:textSize="15sp"
                              android:textStyle="bold"
                              android:ellipsize="marquee"
                              android:singleLine="true"/>
                          <TextView
                              android:id="@+id/track_artist"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:textColor="#00BFFF"
                              android:textSize="13sp"
                              android:singleLine="true"/>
                          <TextView
                              android:id="@+id/track_album"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:textColor="#888888"
                              android:textSize="12sp"
                              android:singleLine="true"/>
                          <TextView
                              android:id="@+id/track_meta"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:textColor="#00FF00"
                              android:textSize="11sp"/>
                      </LinearLayout>
                  </LinearLayout>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="96dp"
                      android:orientation="horizontal"
                      android:background="#0D0D0D"
                      android:paddingStart="8dp"
                      android:paddingEnd="8dp"
                      android:paddingTop="6dp"
                      android:paddingBottom="6dp">
                      <com.lyra.audiokernel.VUMeterView
                          android:id="@+id/vu_left"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:layout_marginEnd="4dp"/>
                      <com.lyra.audiokernel.VUMeterView
                          android:id="@+id/vu_right"
                          android:layout_width="0dp"
                          android:layout_height="match_parent"
                          android:layout_weight="1"
                          android:layout_marginStart="4dp"/>
                  </LinearLayout>

                  <com.lyra.audiokernel.NixieDisplayView
                      android:id="@+id/nixie_display"
                      android:layout_width="match_parent"
                      android:layout_height="72dp"
                      android:paddingStart="16dp"
                      android:paddingEnd="16dp"
                      android:paddingTop="4dp"
                      android:paddingBottom="4dp"/>

                  <SeekBar
                      android:id="@+id/seek_bar"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginStart="8dp"
                      android:layout_marginEnd="8dp"
                      android:progressTint="#00BFFF"
                      android:thumbTint="#00BFFF"/>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:paddingStart="12dp"
                      android:paddingEnd="12dp"
                      android:paddingBottom="2dp">
                      <TextView
                          android:id="@+id/time_current"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="0:00"
                          android:textColor="#00FF00"
                          android:textSize="11sp"/>
                      <TextView
                          android:id="@+id/track_number"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:gravity="center"
                          android:textColor="#888888"
                          android:textSize="11sp"/>
                      <TextView
                          android:id="@+id/time_total"
                          android:layout_width="0dp"
                          android
